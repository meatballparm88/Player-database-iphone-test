label":"Knee (played through)","games":"Played through","detail":"A Grade 1 knee strain in the divisional round, but he did not miss a snap."}]},"Matthew Stafford":{"summary":"A long career with recurring back trouble; he lost big chunks of 2019 (back fractures) and 2022 (concussion + spinal cord contusion), but is otherwise a workhorse.","timeline":[{"year":"2019","label":"Back fractures","games":"Missed 8","detail":"Back fractures ended his season after eight games in Detroit."},{"year":"2022","label":"Concussion + Spine","games":"Missed 8","detail":"A concussion cost one game, then a spinal cord contusion cost the final seven."},{"year":"2023","label":"Thumb (UCL)","games":"Missed ~2","detail":"A UCL sprain in his throwing thumb cost roughly a game and a half."},{"year":"2024","label":"Ribs/Ankle/Back","games":"Missed 1","detail":"Played through cracked ribs from Week 15 on plus ankle and back issues, sitting only Week 18."}]},"C.J. Stroud":{"summary":"Durable aside from concussions, which cost him multiple games in both 2023 and 2025; he played a full 17-game slate in 2024.","timeline":[{"year":"2023","label":"Concussion","games":"Missed 2","detail":"A concussion cost him Weeks 15-16 as a rookie."},{"year":"2024","label":"Fully healthy","games":"Missed 0","detail":"Started all 17 games for Houston."},{"year":"2025","label":"Concussion","games":"Missed 3","detail":"A Week 9 concussion versus Denver cost him three games."}]},"Dak Prescott":{"summary":"Two season-enders define his ledger: a gruesome 2020 ankle fracture and a 2024 avulsed hamstring, plus a 2022 thumb fracture.","timeline":[{"year":"2020","label":"Ankle fracture","games":"Missed 11","detail":"A compound ankle fracture and dislocation in Week 5 required surgery and ended his season."},{"year":"2021","label":"Calf strain","games":"Missed 1","detail":"A calf strain cost him one game around the bye."},{"year":"2022","label":"Thumb fracture","games":"Missed 5","detail":"Fractured his throwing thumb in the Week 1 opener and had surgery, returning in Week 7."},{"year":"2024","label":"Hamstring (avulsion)","games":"Season-ending","detail":"Part of his hamstring tendon tore off the bone in November, requiring season-ending surgery."}]},"Trevor Lawrence":{"summary":"Durable early (49 straight starts) before a rough 2024, when a shoulder injury and a concussion cost seven games and ended his season on IR.","timeline":[{"year":"2023","label":"Ankle/Shoulder/Concussion","games":"Missed 1","detail":"Played through a high-ankle sprain, a shoulder sprain and a concussion, missing one game for the first time in his career."},{"year":"2024","label":"Shoulder + Concussion","games":"Missed 7","detail":"A Week 9 shoulder injury cost two games, then a Week 13 concussion sent him to IR for the rest of the year."}]},"Jordan Love":{"summary":"A banged-up 2024 headlined by an opening-week MCL sprain and a Week 7 groin strain he largely played through, plus a late elbow nerve issue.","timeline":[{"year":"2024","label":"Knee (MCL) + Groin","games":"Missed 2","detail":"An MCL sprain in his right knee in Week 1 cost two games; he then played through a Grade 1 groin strain and a late ulnar nerve elbow issue."}]},"Aaron Rodgers":{"summary":"A future Hall of Famer whose career has been punctuated by two broken collarbones and, most dramatically, a torn Achilles four snaps into his Jets tenure.","timeline":[{"year":"2013","label":"Broken collarbone","games":"Missed 7","detail":"Broke his left collarbone in Week 9 and missed seven games."},{"year":"2017","label":"Broken collarbone","games":"Missed ~7","detail":"Broke his right collarbone in Week 6, had surgery, and missed most of the season."},{"year":"2018","label":"Knee (played through)","games":"Missed 0","detail":"Hurt his left knee in the opener and was carted off, but returned and played on it all year."},{"year":"2023","label":"Torn Achilles","games":"Season-ending","detail":"Tore his left Achilles just four plays into his Jets debut."}]},"Baker Mayfield":{"summary":"Toughness is his calling card: he famously played most of 2021 on a torn shoulder labrum plus a fracture before offseason surgery; a 2022 high-ankle sprain also cost time.","timeline":[{"year":"2021","label":"Shoulder (labrum + fracture)","games":"Missed 1","detail":"A partially torn left labrum in Week 2, later a shoulder fracture; he played through most of the year, missed one game, then had surgery."},{"year":"2022","label":"High-ankle sprain","games":"Missed 3","detail":"A high-ankle sprain in Week 5 with Carolina cost three games."},{"year":"2025","label":"Shoulder (AC sprain)","games":"Played through","detail":"A low-grade AC sprain in his left shoulder, but he kept playing."}]},"Daniel Jones":{"summary":"An injury-marred stretch: a 2021 neck injury, a 2023 neck issue then a torn ACL, and a reported 2025 Achilles tear, with roughly 28 career games missed.","timeline":[{"year":"2021","label":"Neck","games":"Missed 5","detail":"A neck injury cost him the final five games."},{"year":"2023","label":"Neck + Torn ACL","games":"Missed ~11","detail":"A Grade 1 neck pinch cost three games, then a torn ACL in Week 9 ended his season after six games played."},{"year":"2025","label":"Achilles (reported)","games":"Season-ending","detail":"Reportedly tore his Achilles in December with the Colts at Jacksonville."}]},"Bryce Young":{"summary":"Durability has not been the headline (a 2024 benching was), though he has dealt with ankle sprains in both 2023 and 2024.","timeline":[{"year":"2023","label":"Ankle","games":"Missed 1","detail":"An ankle injury cost him Week 3 as a rookie."},{"year":"2024","label":"High-ankle sprain","games":"Missed 1","detail":"Sprained his ankle versus the Jets and missed the following game; his early-season benching was performance-based, not injury."}]},"Bo Nix":{"summary":"Durable, starting every game as a rookie while playing through nagging injuries; his notable setback was a late ankle fracture in the playoffs.","timeline":[{"year":"2024","label":"Played through","games":"Missed 0","detail":"Started every game as a rookie despite fractures/knocks, including a Week 12 issue he managed."},{"year":"Playoffs","label":"Ankle fracture","games":"Postseason","detail":"Broke a bone in his ankle late in the win over Buffalo and missed the rest of the postseason."}]},"Drake Maye":{"summary":"A high-contact rookie who took several head-injury checks in 2024 but barely missed any time.","timeline":[{"year":"2024","label":"Concussion","games":"Missed ~0","detail":"A Week 8 concussion versus the Jets, but he cleared protocol quickly and missed only a series; he passed a later head check versus the Chargers and had a minor knee MRI."}]},"Caleb Williams":{"summary":"A durable rookie who took a league-high sack total but started every game, playing through knee and ankle scares.","timeline":[{"year":"2024","label":"Iron rookie","games":"Missed 0","detail":"Sacked 67-plus times behind a banged-up line; a Thanksgiving knee scare and a playoff ankle roll, but he never missed a game."}]},"Malik Willis":{"summary":"A limited injury history in a mostly backup role; late-2025 shoulder and hamstring issues were his main dings.","timeline":[{"year":"2025","label":"Shoulder + Hamstring","games":"Played through","detail":"A right shoulder injury in Week 16 and a hamstring in Week 17; he played through both and was questionable for the playoffs."}]},"J.J. McCarthy":{"summary":"A rough injury start to his career: a torn meniscus wiped out his entire rookie year, and 2025 brought an ankle sprain, a concussion and a hand fracture.","timeline":[{"year":"2024","label":"Torn meniscus","games":"Missed all (rookie)","detail":"Tore the meniscus in his right knee in the preseason and needed surgery, missing his entire rookie season."},{"year":"2025","label":"Ankle + Concussion + Hand","games":"Missed 6+","detail":"A Week 2 high-ankle sprain cost five games, then a concussion cost another, and later a hairline hand fracture."}]},"Jaxson Dart":{"summary":"A high-contact rookie whose main injury was a 2025 concussion; the Giants urged him to reduce contact after repeated head checks.","timeline":[{"year":"2025","label":"Concussion","games":"Missed 2","detail":"A concussion in Week 10 versus Chicago cost him the next two games; he had been checked for concussions five times in his first ten games."}]},"Cam Ward":{"summary":"An ironman rookie who started all 17 games and played every snap until a season-finale shoulder sprain.","timeline":[{"year":"2025","label":"Shoulder (AC sprain)","games":"Missed 0","detail":"An AC joint sprain in his right shoulder in the Week 18 finale, no surgery needed and no games missed."}]},"Christian McCaffrey":{"summary":"Elite dual-threat when healthy, but a real injury history: durable from 2017-19, then major time lost in 2020, 2021 and 2024. He has missed roughly 37 games in his career.","timeline":[{"year":"2020","label":"Ankle + Shoulder","games":"Missed ~13","detail":"A high-ankle sprain in Week 2 (six games) and a shoulder sprain in Week 9 limited him to just three games with Carolina."},{"year":"2021","label":"Hamstring + Thigh","games":"Missed ~7","detail":"A Grade 2 hamstring strain in Week 3 cost five games, and a later thigh strain sidelined him further; he played 10 games."},{"year":"2022-2023","label":"Healthy stretch","games":"Missed 0","detail":"After the midseason trade to San Francisco he stayed healthy with no injury absences through 2023."},{"year":"2024","label":"Calf/Achilles + PCL","games":"Missed 13","detail":"A calf/Achilles sprain wiped out the first eight games; he returned for four before a knee (PCL) injury ended his season."}]},"Bijan Robinson":{"summary":"A very clean professional track record: no games missed to injury through 2024. His only notable setback came in college, and a shared backfield helps limit the wear.","timeline":[{"year":"2021","label":"Elbow (college)","games":"Missed 2 (college)","detail":"Dislocated his left elbow at Texas in November and had surgery, but recovered fully before his pro career."},{"year":"2024","label":"Shoulder","games":"Missed 0","detail":"Dealt with a shoulder injury before Week 4 but started and played through it."}]},"Jahmyr Gibbs":{"summary":"Largely durable; his only injury absence to date was a rookie-year hamstring. Otherwise a full workload for Detroit.","timeline":[{"year":"2023","label":"Hamstring","games":"Missed 2","detail":"A hamstring flare-up before Week 5 kept him out Weeks 5-6; he played every other game including the playoffs."},{"year":"2024","label":"Hamstring (minor)","games":"Missed 0","detail":"A minor hamstring tweak in an August practice, but no regular-season time lost."}]},"Saquon Barkley":{"summary":"Explosive but carrying a heavy early-career injury ledger, headlined by a 2020 torn ACL/MCL and recurring ankle issues. He has been healthier of late.","timeline":[{"year":"2019","label":"High-ankle sprain","games":"Missed 3","detail":"Sprained his ankle in Week 2 versus Tampa Bay and sat three weeks before returning."},{"year":"2020","label":"Torn ACL + MCL","games":"Missed ~14","detail":"A Week 2 knee injury (torn ACL, sprained MCL, partial meniscus) ended his season."},{"year":"2021","label":"Ankle","games":"Missed 3","detail":"Re-injured the ankle in Week 5 versus Dallas and missed three games."},{"year":"2022","label":"COVID protocol","games":"Missed 4","detail":"Placed in COVID protocol in November; a non-injury absence of four games."},{"year":"2023","label":"Ankle","games":"Missed 3","detail":"Left the Week 2 game at Arizona with another ankle issue and missed three games."},{"year":"2024","label":"Hip (played through)","games":"Missed 0","detail":"A Week 15 hip contusion, but he returned and finished the season."}]},"De'Von Achane":{"summary":"A rookie knee injury cost him time, but he has been durable since, playing a full 17-game slate in 2024.","timeline":[{"year":"2023","label":"Knee (IR)","games":"Missed 6","detail":"Hurt his knee in Week 5 versus the Giants and landed on IR as a rookie, missing about six games."},{"year":"2024","label":"Ribs/Calf (played through)","games":"Missed 0","detail":"Played all 17 games; dealt with minor rib and calf issues without missing time."}]},"Ja'Marr Chase":{"summary":"Remarkably available, missing only about five games in five seasons. His lone significant absence was a 2022 hip fracture.","timeline":[{"year":"2022","label":"Hip fracture","games":"Missed 4","detail":"A hairline hip fracture in Week 6, aggravated in Week 7, cost him four games before he returned in Week 13."},{"year":"2023","label":"Shoulder","games":"Missed 1","detail":"A late-season shoulder injury kept him out of the December game at Pittsburgh."},{"year":"2024","label":"Fully healthy","games":"Missed 0","detail":"Played every game on his way to the receiving triple crown."}]},"Justin Jefferson":{"summary":"Durable his first three seasons before a high-grade 2023 hamstring cost significant time; he bounced back healthy.","timeline":[{"year":"2023","label":"Hamstring (high-grade)","games":"Missed 7","detail":"A high-grade hamstring strain in Week 5 sent him to IR for seven games; he also took a rib/lung bruise later but missed no further time."},{"year":"2025","label":"Hamstring (minor)","games":"Missed 0","detail":"A minor training-camp hamstring, but he was cleared for Week 1."}]},"CeeDee Lamb":{"summary":"Mostly durable, known for playing through a 2024 shoulder AC sprain until Dallas shut him down late; more recently a high-ankle sprain.","timeline":[{"year":"2021","label":"Concussion","games":"Missed 1","detail":"A concussion versus Kansas City cost him one game."},{"year":"2024","label":"Shoulder (AC sprain)","games":"Missed 2","detail":"Played through an AC joint sprain from Week 9 on before being shut down for the final two games."},{"year":"2025","label":"High-ankle sprain","games":"Missed 3","detail":"A high left-ankle sprain sidelined him for three games."}]},"Puka Nacua":{"summary":"Elite production, but a knee (PCL) issue defined his 2024. Explosive whenever he is on the field.","timeline":[{"year":"2024","label":"Knee (PCL)","games":"Missed 6","detail":"Burst the bursa sac in his right knee in the preseason, aggravated it in Week 1 (PCL sprain), and landed on IR; he missed Weeks 2-7 but still posted 990 yards."}]},"A.J. Brown":{"summary":"An explosive WR1 with a recurring soft-tissue and knee ledger: bilateral knee surgery after 2020, plus hamstring issues in 2024-25.","timeline":[{"year":"2020","label":"Both knees","games":"Missed 2","detail":"Knee sprains with a torn meniscus and bone bruise nagged all year; he missed two games and had surgery on both knees that offseason."},{"year":"2021","label":"Chest (IR)","games":"Missed ~4","detail":"A chest injury in Week 11 sent him to IR before he was activated in late December."},{"year":"2024","label":"Hamstring","games":"Missed 3","detail":"A hamstring injury cost three games; he also had a late-season knee scare but kept playing."},{"year":"2025","label":"Hamstring","games":"Missed 1+","detail":"Aggravated the hamstring versus Minnesota and was ruled out around the Eagles bye."}]},"Malik Nabers":{"summary":"A productive rookie campaign with only a concussion costing him time; frequently on the report but rarely out.","timeline":[{"year":"2024","label":"Concussion","games":"Missed 2","detail":"A Grade-1 concussion in Week 4 versus Dallas cost him Weeks 5-6; he also managed minor ankle, hip and groin issues without missing more time."}]},"Amon-Ra St. Brown":{"summary":"One of the NFL's most durable receivers, missing just about two games in five years while routinely playing through significant pain.","timeline":[{"year":"2023","label":"Oblique + Toe","games":"Missed 1","detail":"Tore an oblique off the bone and dealt with a toe injury, yet missed only one game while catching 119 passes for 1,515 yards."},{"year":"2025","label":"Ankle (played through)","games":"Missed 0","detail":"A low-ankle sprain on Thanksgiving, but he returned to play the following week."}]},"Nico Collins":{"summary":"A big-play talent who has missed at least one game in each pro season; a 2024 hamstring was the most costly.","timeline":[{"year":"2024","label":"Hamstring (IR)","games":"Missed 4","detail":"Tore off a 67-yard touchdown then exited with a hamstring injury in Week 5; he landed on IR and missed about four games."},{"year":"2025","label":"Concussion","games":"Protocol","detail":"Suffered his first diagnosed NFL concussion and had to clear protocol."}]},"Brian Thomas Jr.":{"summary":"A record-setting rookie who played through a chest/rib issue and an ankle sprain, still starting 16 of 17 games.","timeline":[{"year":"2024","label":"Chest/Rib","games":"Played through","detail":"A Week 8 chest/rib contusion raised a 2-4 week concern, but positive imaging kept him mostly on the field."},{"year":"2024","label":"Ankle sprain","games":"Missed ~1","detail":"Sprained his ankle in Week 9; despite the nicks he set Jaguars rookie records with 1,282 yards and 10 touchdowns."}]},"Drake London":{"summary":"Durable his first three seasons (just one absence), before 2025 brought multiple missed games capped by a late-season PCL sprain.","timeline":[{"year":"2023","label":"Groin (played through)","games":"Missed 0","detail":"A groin strain in Week 8 versus Tennessee, but he stayed in the lineup."},{"year":"2025","label":"Hip + Knee (PCL)","games":"Missed ~5","detail":"A Week 8 hip injury, then a Week 11 PCL sprain that cost the final four games."}]},"Jaxon Smith-Njigba":{"summary":"Durable as a pro, never missing a regular-season game despite an early wrist surgery; his real injury time came in college.","timeline":[{"year":"2022","label":"Hamstring (college)","games":"Missed ~10 (college)","detail":"A hamstring strain in the Ohio State opener limited him to just two more games that season."},{"year":"2023","label":"Wrist (scaphoid)","games":"Missed 0","detail":"Fractured his scaphoid and had preseason surgery, but returned for the opener and played all 17 games."}]},"Ashton Jeanty":{"summary":"A high-volume workhorse who was durable in college aside from a late elbow injury he played through. Pro sample is still small.","timeline":[{"year":"2024","label":"Elbow (college)","games":"Missed 0 (college)","detail":"Wore a brace for a November elbow injury at Boise State but played through it during a 2,601-yard season, and it healed by December."},{"year":"2025","label":"Ankle","games":"Missed ~1","detail":"Suffered an ankle injury versus Cleveland as a rookie with the Raiders."}]},"Brock Bowers":{"summary":"An ironman rookie (all 17 games in 2024), then a 2025 knee (PCL + bone bruise) limited him and ended his season on IR.","timeline":[{"year":"2024","label":"Fully healthy","games":"Missed 0","detail":"Played all 17 games as a rookie, leading the Raiders with 112 catches for 1,194 yards."},{"year":"2025","label":"Knee (PCL)","games":"Missed ~5","detail":"Suffered a PCL sprain and bone bruise in Week 1, played through it, then missed several games before a season-ending IR stint (12 games played)."}]},"Trey McBride":{"summary":"Broadly available; his notable absence was a 2024 concussion, and he has played through shoulder, rib and groin issues.","timeline":[{"year":"2024","label":"Concussion","games":"Missed 1","detail":"A collision put him in concussion protocol and cost him Week 4; he also managed an AC shoulder sprain, ribs and a groin issue without missing more time."}]},"George Kittle":{"summary":"Elite but with a long injury ledger: recurring hamstring and groin issues over the years, plus a torn Achilles in a recent playoff game.","timeline":[{"year":"2023","label":"Groin","games":"Missed 2","detail":"A groin injury cost the first two games; he played through it and had offseason surgery."},{"year":"2024","label":"Hamstring","games":"Missed 2","detail":"Hamstring injuries sidelined him in Weeks 3 and 11."},{"year":"2025","label":"Hamstring (Grade 3)","games":"Missed 5","detail":"A Grade 3 hamstring tear kept him out five games early in the season."},{"year":"Playoffs","label":"Torn Achilles","games":"Season-ending","detail":"Tore his right Achilles in a wild-card playoff game versus Philadelphia."}]},"Josh Allen":{"summary":"An ironman: only four career games missed (rookie-year elbow), with no missed starts since 2018 despite playing through UCL, shoulder and hand issues.","timeline":[{"year":"2018","label":"Elbow","games":"Missed 4","detail":"An elbow injury in Week 6 versus Houston cost four games as a rookie."},{"year":"2022","label":"Elbow (UCL, played through)","games":"Missed 0","detail":"Played through a UCL/elbow tear in November without missing a start."},{"year":"2024","label":"Hand (played through)","games":"Missed 0","detail":"A September hand injury, but no time lost; his start streak now exceeds 125 games."}]},"Lamar Jackson":{"summary":"A dynamic dual-threat with periodic injuries: late-season ankle (2021) and knee (2022) absences plus a 2025 hamstring, roughly 17 games missed over eight years.","timeline":[{"year":"2021","label":"Ankle sprain","games":"Missed 4","detail":"A significant ankle sprain in Week 14 ended his regular season; he also missed a game with illness."},{"year":"2022","label":"Knee (PCL)","games":"Missed 5","detail":"A sprained PCL cost the final five regular-season games and the wild-card playoff."},{"year":"2025","label":"Hamstring + Back","games":"Missed 4+","detail":"A hamstring injury cost four games, and a later back contusion versus New England sidelined him again."}]},"Jayden Daniels":{"summary":"A tough rookie who played through a rib injury in 2024, but 2025 was wrecked by knee, hamstring and a dislocated elbow.","timeline":[{"year":"2024","label":"Ribs (played through)","games":"Missed 0","detail":"Left much of a Week 7 game with a rib injury and sat the second half of the finale with leg soreness, but did not miss a start."},{"year":"2025","label":"Knee + Elbow","games":"Missed 10+","detail":"A Week 2 knee sprain, then hamstring trouble, then a dislocated left elbow in Week 9; he was active for only about six games before being shut down."}]},"Jonathan Taylor":{"summary":"A workhorse who has battled recurring ankle problems from 2022-24, plus a 2023 torn thumb ligament.","timeline":[{"year":"2022","label":"Ankle (surgery)","games":"Missed 6","detail":"Ankle trouble across multiple stints from Week 4 on, ultimately requiring surgery, cost him six games."},{"year":"2023","label":"Ankle (PUP) + Thumb","games":"Missed 7","detail":"Opened on PUP with the ankle (first four games), then tore his thumb UCL in Week 12 for three more."},{"year":"2024","label":"High-ankle","games":"Missed 1","detail":"A high-ankle injury versus Pittsburgh cost him the following game."}]},"Derrick Henry":{"summary":"Remarkably durable for his enormous workload; the glaring exception was a 2021 Jones fracture in his foot that required surgery.","timeline":[{"year":"2021","label":"Jones fracture (foot)","games":"Missed 9","detail":"Broke the fifth metatarsal in his right foot in Week 8 and had surgery (a plate and five screws), missing nine games before a playoff return."}]},"Kyler Murray":{"summary":"Kyler Murray's most significant NFL injuries include a Grade 3 torn ACL in 2022 and a Grade 1 foot sprain in 2025, each causing him to miss extended time. Despite a reputation for being frequently injured, he played full seasons in 2019, 2020, and 2024, with only a few minor ailments otherwise.","timeline":[{"year":"2025","label":"Foot Sprain","games":"Missed 12","detail":"Suffered a Grade 1 pedal foot sprain in Week 5 against the Tennessee Titans. After consulting out-of-state specialists and experiencing a lack of progression, he was placed on injured reserve on November 5 and missed the remaining 12 games."},{"year":"2022–2023","label":"Torn ACL","games":"Missed 13+","detail":"Suffered a non-contact, Grade 3 torn ACL in his right knee while scrambling early in Week 14 against the New England Patriots. He missed the final 13 games of the 2022 season and didn't return until Week 10 of 2023."},{"year":"2022","label":"Hamstring","games":"Missed 2","detail":"Sustained a Grade 2 thigh hamstring strain in Week 8. He played one game before being sidelined for two additional games."},{"year":"2022","label":"Wrist","games":"Missed 0","detail":"Dealt with a Grade 1 hand/wrist bruise during training camp, though it didn't cause him to miss any regular-season games."},{"year":"2021","label":"Ankle","games":"Missed 3","detail":"Suffered a Grade 2 pedal ankle sprain in Week 8 against the Green Bay Packers, which forced him to miss three games."},{"year":"2020","label":"Shoulder/Hamstring","games":"Missed 0","detail":"Sustained a shoulder injury in Week 10 against the Buffalo Bills and later dealt with a hamstring strain that limited his mobility. Despite these ailments, he played through the pain and didn't miss any games."},{"year":"2019","label":"Hamstring","games":"Missed 0","detail":"Dealt with a minor hamstring issue during his rookie campaign, but played all 16 games."}]}},"nick":{"cmc":"Christian McCaffrey","run cmc":"Christian McCaffrey","king henry":"Derrick Henry","the king":"Derrick Henry","cheetah":"Tyreek Hill","ceedee":"CeeDee Lamb","cd lamb":"CeeDee Lamb","jamo":"Jameson Williams","jmo":"Jameson Williams","jsn":"Jaxon Smith-Njigba","amon ra":"Amon-Ra St. Brown","arsb":"Amon-Ra St. Brown","sun god":"Amon-Ra St. Brown","ajb":"A.J. Brown","mhj":"Marvin Harrison Jr.","marv":"Marvin Harrison Jr.","puka":"Puka Nacua","jj":"Justin Jefferson","scary terry":"Terry McLaurin","jt":"Jonathan Taylor","etn":"Travis Etienne Jr.","etienne":"Travis Etienne Jr.","saquads":"Saquon Barkley","saquon":"Saquon Barkley","breece":"Breece Hall","bijan":"Bijan Robinson","gibby":"Jahmyr Gibbs","gibbs":"Jahmyr Gibbs","jeanty":"Ashton Jeanty","waddle":"Jaylen Waddle","dk":"DK Metcalf","scadaboo":"Cam Skattebo","skattebo":"Cam Skattebo","lamar":"Lamar Jackson","mahomes":"Patrick Mahomes","showtime":"Patrick Mahomes","pitts":"Kyle Pitts","tlaw":"Trevor Lawrence","jd":"Jayden Daniels","nabers":"Malik Nabers"},"research":{"Ja'Marr Chase":[{"t":"Tier 1 slam dunk","d":"alongside Puka and JSN, with a healthy Burrow and no real concerns."},{"t":"The field is the bet","d":"one of three picks where if any of Chase, Puka, or JSN is the overall WR1, that's the expected outcome."},{"t":"Elite volume","d":"200 targets over his last 17 games with Joe Burrow — bankable."}],"Puka Nacua":[{"t":"Meatballers' clear WR1","d":"ranked ahead of even Ja'Marr Chase, with a 2,000-yard ceiling."},{"t":"Top scorer since entering the league","d":"outscoring every receiver per game (edging Chase 20.0 to 19.99)."},{"t":"Otherworldly efficiency","d":"3.57 yards per route last year — the only active player over three for his career."},{"t":"Davante Adams arrival","d":"should unlock his growth into an every-area receiver."},{"t":"Knock:","d":"a reckless, kamikaze style that leads to frequent injuries — the cost of a top-three dynasty asset.","w":true}],"Justin Jefferson":[{"t":"Fading the situation, not the talent","d":"last year was rough, but the QB play was horrific."},{"t":"WR1-overall upside intact","d":"still only about six months older than Ja'Marr Chase."},{"t":"Best QB of his career","d":"Kyler Murray is a real upgrade."},{"t":"Tier 2 value","d":"with Amon-Ra, CeeDee, and Drake London; likable price, great paired with a late RB1 like Omarion Hampton."}],"Rachaad White":[{"t":"Dependable late-round RB","d":"(~Round 11) — a floor pick, not a league-winner; take him over Croskey-Merritt."},{"t":"Elite passing-down back","d":"receiver and pass protector with the clearest path to touches in a wide-open Washington backfield."},{"t":"Reunites with Jayden Daniels","d":"Arizona State teammates; an easy-button chain-mover, and full-PPR lifts his value."},{"t":"Efficiency trending up","d":"rushing EPA jumped 1 /* Value verdict (bhsEval, simplified & faithful) */
function verdict(p){
  let s=0; const r=[];
  const ecr=posRank(p.n), ad=adpFor(p.n);
  const adr = ad? parseInt(String(ad.pos).replace(/[^0-9]/g,''),10) : null;
  if(ecr!=null && adr!=null && !isNaN(adr)){
    const d=adr-ecr;
    if(d>=6){ s+=2; r.push(`ADP value — ranked ${p.p}${ecr}, drafted ${p.p}${adr}`); }
    else if(d>=3){ s+=1; r.push('mild ADP value'); }
    else if(d<=-6){ s-=2; r.push(`overpriced — ${p.p}${adr} cost vs ${p.p}${ecr} rank`); }
    else if(d<=-3){ s-=1; r.push('slightly pricey vs his rank'); }
  }
  const o=oppOf(p.n);
  if(o && typeof o.xdiff==='number' && o.gp){
    const g=o.xdiff/o.gp;
    if(g<=-1.5){ s+=2; r.push(`${Math.abs(g).toFixed(1)} pts/g below expected`); }
    else if(g<=-0.6){ s+=1; r.push('slightly unlucky vs usage'); }
    else if(g>=1.5){ s-=2; r.push(`${g.toFixed(1)} pts/g above expected`); }
    else if(g>=0.6){ s-=1; r.push('running hot vs usage'); }
  }
  if(o){
    const opp = p.p==='RB' ? (typeof o.oppRB==='number'?o.oppRB:o.snap) : (typeof o.ts==='number'?o.ts:o.snap);
    if(typeof opp==='number'){
      if((p.p==='RB'&&opp>=65)||(p.p!=='RB'&&opp>=24)){ s+=1; r.push('elite opportunity'); }
      else if((p.p==='RB'&&typeof o.snap==='number'&&o.snap<50)||(p.p!=='RB'&&typeof o.ts==='number'&&o.ts<=11)){ s-=1; r.push('limited role'); }
    }
  }
  if(p.s==='pos'){ s+=1; r.push('Meatballparm is high on him'); }
  else if(p.s==='neg'){ s-=1; r.push('Meatballparm is sour'); }
  if(/(injur|questionable|surgery|torn|acl|hamstring)/i.test(p.o||'')){ s-=1; r.push('injury / availability risk'); }
  const rec = s>=2?'BUY' : (s<=-2?'SELL':'HOLD');
  return {rec, why:r.slice(0,3)};
}
function lean(p){ return p.s==='pos'?'BUY':(p.s==='neg'?'FADE':'HOLD'); }

/* ---------- Silhouette photos (canvas, cached; lazy via IntersectionObserver) ---------- */
const SIL = new Map();
function nebula(size, c){
  const cv=document.createElement('canvas'); cv.width=cv.height=size;
  const x=cv.getContext('2d');
  const g=x.createRadialGradient(size*.5,size*.42,size*.05,size*.5,size*.5,size*.72);
  g.addColorStop(0,c.p2); g.addColorStop(.55,c.p1); g.addColorStop(1,'#0b0c0a');
  x.fillStyle=g; x.fillRect(0,0,size,size);
  return cv;
}
function silhouette(img,size){
  const cv=document.createElement('canvas'); cv.width=cv.height=size;
  const x=cv.getContext('2d');
  const sc=Math.max(size/img.naturalWidth,size/img.naturalHeight)*1.05;
  const dw=img.naturalWidth*sc, dh=img.naturalHeight*sc;
  x.drawImage(img,(size-dw)/2,(size-dh)*.14,dw,dh);
  const d=x.getImageData(0,0,size,size), a=d.data;
  for(let i=0;i<a.length;i+=4){ if(a[i+3]>12){a[i]=0;a[i+1]=0;a[i+2]=0;a[i+3]=255;} else a[i+3]=0; }
  x.putImageData(d,0,0); return cv;
}
function photoURL(name, team){
  const id=DB.espn[name]; if(!id) return Promise.resolve(null);
  const key=id+'_'+team;
  if(SIL.has(key)) return SIL.get(key);
  const col = DB.silColors[team] || DB.silColors['Free Agent'] || {p1:'#2a2a35',p2:'#4a4a55'};
  const pr=new Promise(res=>{
    const im=new Image(); im.crossOrigin='anonymous';
    im.onload=()=>{ const w=im.naturalWidth,h=im.naturalHeight;
      if((w<=200&&h<=150)||!w||!h) return res(null);
      try{ const cv=document.createElement('canvas'); cv.width=cv.height=192; const x=cv.getContext('2d');
        x.drawImage(nebula(192,col),0,0); x.drawImage(silhouette(im,192),0,0);
        res(cv.toDataURL('image/png'));
      }catch(e){ res(null); } };
    im.onerror=()=>res(null);
    im.src=`https://a.espncdn.com/combiner/i?img=/i/headshots/nfl/players/full/${id}.png&w=350&h=254`;
  });
  SIL.set(key,pr); return pr;
}
function loadPic(el){
  const {n,t}=el.dataset;
  photoURL(n,t).then(u=>{ if(!u) return; const im=el.querySelector('img'); const ini=el.querySelector('.ini');
    if(im){ im.src=u; im.style.display='block'; } if(ini) ini.style.display='none'; });
}

const photoIO = (typeof IntersectionObserver!=='undefined') ? new IntersectionObserver(es=>{
  es.forEach(e=>{ if(!e.isIntersecting) return; const el=e.target; photoIO.unobserve(el); loadPic(el); });
},{rootMargin:'500px 0px'}) : null;
function obsPic(el){ if(photoIO) photoIO.observe(el); else loadPic(el); }

  age:p=>parseFloat(bioOf(p.n).age)||null,
  snap:p=>{const o=oppOf(p.n); return o&&typeof o.snap==='number'?o.snap:null;},
  ts:p=>{const o=oppOf(p.n); return o&&typeof o.ts==='number'?o.ts:null;},
  yprr:p=>{const o=oppOf(p.n); return o&&typeof o.yprr==='number'?o.yprr:null;},
  route:p=>{const o=oppOf(p.n); return o&&typeof o.rp==='number'?o.rp:null;},
  rztgt:p=>{const o=oppOf(p.n); return o&&typeof o.rzTgt==='number'?o.rzTgt:null;},
  games:p=>{const o=oppOf(p.n); return o&&typeof o.gp==='number'?o.gp:null;}
};
const ALIAS={targets:'ts',target:'ts',targetshare:'ts',snaps:'snap',routes:'route',redzone:'rztgt',gp:'games'};
function parseFilters(raw){
  if(!raw||!/[<>=:]/.test(raw)) return {f:[],rest:raw||''};
  const f=[],used=[]; const re=/([a-z][a-z%]{1,14})\s*(<=|>=|<|>|=|:)\s*(\d+\.?\d*)/g; let m;
  while((m=re.exec(raw))){ const k=ALIAS[m[1]]||m[1]; if(FIELDS[k]){ f.push({fn:FIELDS[k],op:m[2],v:parseFloat(m[3])}); used.push(m[0]); } }
  let rest=raw; used.forEach(u=>rest=rest.split(u).join(' '));
  return {f, rest:rest.replace(/\s+/g,' ').trim()};
}
function applyFilters(p,f){ for(const x of f){ const v=x.fn(p); if(v==null||isNaN(v)) return false;
  if(x.op==='<'&&!(v<x.v))return false; if(x.op==='<='&&!(v<=x.v))return false;
  if(x.op==='>'&&!(v>x.v))return false; if(x.op==='>='&&!(v>=x.v))return false;
  if((x.op==='='||x.op===':')&&Math.round(v)!==Math.round(x.v))return false; } return true; }
function nl(raw){
  if(!raw) return raw||'';
  let s=' '+raw.toLowerCase()+' '; const add=[];
  s=s.replace(/\b(wide receivers?|receivers?|wideouts?|wrs)\b/g,' wr ').replace(/\b(running backs?|rbs)\b/g,' rb ')
     .replace(/\b(quarterbacks?|qbs)\b/g,' qb ').replace(/\b(tight ends?|tes)\b/g,' te ');
  const rule=(re,t)=>{ if(re.test(s)){ if(t) add.push(t); s=s.replace(re,' '); } };
  rule(/\byoung(er)?\b/g,'age<24'); rule(/\b(old(er)?|aging|veterans?)\b/g,'age>28');
  rule(/\b(cheap|late[ -]?round|bargains?)\b/g,'adp>60'); rule(/\b(early pick|first[ -]?round|high pick)\b/g,'adp<=24');
  rule(/\b(high snaps?|snap share|every[ -]?down)\b/g,'snap>60'); rule(/\b(target hogs?|target share|target[ -]?heavy)\b/g,'ts>22');
  if(/\b(bell[ -]?cows?|workhorses?|three[ -]?down)\b/.test(s)) add.push('snap>55');
  s=s.replace(/\b(show|find|give|me|my|some|any|a|an|the|of|for|in|on|to|and|with|who|that|are|is|good|best|top|guys?|players?)\b/g,' ');
  return (s+' '+add.join(' ')).replace(/\s+/g,' ').trim();
}
function nameScore(p,words){
  const nm=norm(p.n), nw=nm.split(' '), tm=norm(p.t), pos=(p.p||'').toLowerCase();
  const extra=tm+' '+norm(teamAbbr(p.t))+' '+pos+' '+({QB:'quarterback',RB:'running back',WR:'wide receiver',TE:'tight end'}[p.p]||'');
  const j=words.join(' '); let s=0;
  if(nm===j) s+=1000; else if(nm.indexOf(j)===0) s+=500; else if(nm.indexOf(j)>=0) s+=250;
  for(const q of words){
    let best=0;
    for(const w of nw){ if(w===q){best=100;break;} else if(w.indexOf(q)===0) best=Math.max(best,60); else if(w.indexOf(q)>=0) best=Math.max(best,30); }
    if(best<20 && extra.indexOf(q)>=0) best=20;
    if(best===0){ const cb=contentScore(p,q); if(!cb) return null; best=cb; }
    s+=best;
  }
  return s;
}
function search(raw){
  const nick=DB.nick[norm(raw)];
  let q=nl(raw); const {f,rest}=parseFilters(q);
  const words=rest?norm(rest).split(' ').filter(Boolean):[];
  let out=PLAYERS.filter(p=>{
    if(f.length && !applyFilters(p,f)) return false;
    if(words.length && nameScore(p,words)==null) return false;
    return true;
  });
  if(words.length) out.forEach(p=>p._s=nameScore(p,words));
  out.sort((a,b)=>(b._s||0)-(a._s||0) || (posRank(a.n)??999)-(posRank(b.n)??999) || a.n.localeCompare(b.n));
  if(nick && byName[nick]) out = [byName[nick], ...out.filter(p=>p.n!==nick)];
  return out;
}

/* chunked rendering keeps scrolling at 60fps even with 331 rows */
function renderList(el, arr, empty){
  el.innerHTML='';
  if(!arr.length){ el.innerHTML=`<div class="empty"><div class="big">􀓎</div>${empty||'No players match.'}</div>`; return; }
  let i=0;
  const chunk=()=>{
    const frag=document.createDocumentFragment(), end=Math.min(i+40,arr.length);
    const box=document.createElement('div'); box.innerHTML=arr.slice(i,end).map(rowHTML).join('');
    while(box.firstChild) frag.appendChild(box.firstChild);
    el.appendChild(frag);
    el.querySelectorAll('.pic:not([data-io])').forEach(pe=>{ pe.setAttribute('data-io','1'); obsPic(pe); });
    i=end; if(i<arr.length) requestAnimationFrame(chunk);
  };
  chunk();
}

function sentences(t){ return String(t||'').split(/(?<=[.!?])\s+(?=[A-Z(0-9])/).map(x=>x.trim()).filter(x=>x.length>18); }

/* Drag-to-dismiss */
(function(){
  const sh=document.getElementById('sheet'), grab=document.getElementById('grab');
  let y0=0, dy=0, on=false;
  const start=e=>{ on=true; y0=(e.touches?e.touches[0]:e).clientY; dy=0; sh.classList.add('drag'); };
  const move=e=>{ if(!on) return; dy=Math.max(0,(e.touches?e.touches[0]:e).clientY-y0); sh.style.transform=`translateY(${dy}px)`; };
  const end=()=>{ if(!on) return; on=false; sh.classList.remove('drag');
    if(dy>110){ closeSheet(); } else { sh.style.transform=''; } };
  grab.addEventListener('touchstart',start,{passive:true});
  grab.addEventListener('touchmove',move,{passive:true});
  grab.addEventListener('touchend',end);
  grab.addEventListener('mousedown',start); window.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
})();

}
document.getElementById('q').addEventListener('input',()=>{ clearTimeout(sT); sT=setTimeout(doSearch,110); });
document.getElementById('q-clear').onclick=()=>{ const q=document.getElementById('q'); q.value=''; doSearch(); q.focus(); };

/* Delegated row taps */
document.addEventListener('click',e=>{
  const r=e.target.closest('.row'); if(r){ openSheet(r.dataset.n); return; }
  const t=e.target.closest('.tcard'); if(t){ openTeam(t.dataset.t); return; }
});
document.getElementById('sheet-close').onclick=closeSheet;
document.getElementById('scrim').onclick=closeSheet;
document.getElementById('teams-back').onclick=closeTeam;

/* Boot */
buildTabs(); buildSegs(); renderPlayers(); renderTeams(); renderTargets();
document.addEventListener('gesturestart',e=>e.preventDefault());
</script>
</body>
</html>
