duction and yards-after-contact stand out even if the passing-game role is still a question."},{"n":"George Holani","p":"RB","t":"Seattle Seahawks","s":"pos","o":"A Week 1 Seahawks committee dart while Charbonnet rehabs his ACL: it's likely Holani or the rookie speedster carrying early-season touches (with Emanuel Wilson in the mix). A cheap way to buy a potential Week 1 lead role in a backfield with a real opening. The meatballers' sleeper angle: 'trust' is his superpower — Seattle leaned on him as a passing-down back in the playoffs and speaks glowingly of him, so they expect him to lead this backfield in early touches over the raw rookie while Zach Charbonnet recovers. Sneaky deep-league and best-ball value."},{"n":"Zach Charbonnet","p":"RB","t":"Seattle Seahawks","s":"neutral","o":"The injury isn't an ACL/knee, so long-term is fine; it's purely a short-term ready-for-Week-1 question. Got in light field work (15 min of high knees) at minicamp; the realistic expectation is October at best, which is exactly why Jadarian Price has the early runway. If he gets back for any of training camp he'll feel better about it. A stash/upside play whose value spikes if he returns ahead of schedule; skip in redraft if you need Week 1 production. Coming off February ACL surgery, the meatballers expect him back in the second half, maybe by the fantasy playoffs. Worth a stash only if you have an IR spot or deep bench; otherwise they would pass to keep the roster spot churning waivers."},{"n":"Kyler Murray","p":"QB","t":"Minnesota Vikings","s":"pos","o":"The meatballers' QB10 going as QB16-17 (rounds 9-10), a clean discount on Kevin O'Connell's offense, which finished 8th-9th in scoring in 2022 and 2024 and turned even mediocre QBs into QB7-8 producers (Cousins 20+ ppg; Darnold/Mullens QB8-level; Josh Dobbs QB17-level with no rushing). Murray adds around 37 rush yds/game for his career and is fully past the ACL. Weapons (Jefferson/Addison/Hockenson), a better line, and a scheme that ranked 1st in deep-ball success and 2nd in play-action (his PA success 51% vs 43% without) make him a league-long starter at a backup price. On the QB pods the meatballers love him as the late-round dual-threat to build around: out of Arizona and into Kevin O'Connell's system with Justin Jefferson, with no real competition from JJ McCarthy for QB1. If the rushing comes back to peak levels, top-five upside at a round-10 price, and a great trade chip in home leagues. The meatballers' boom-bust leverage swing: a still-mobile dual threat (600-700 rushing yards in a peak year) now paired with Kevin O'Connell, Justin Jefferson, Jordan Addison and T.J. Hockenson. They admit it is a bet on whether he does the work, but few players this late can single-handedly offset a quarterback an opponent drafted rounds earlier. Dynasty caveat from the meatballers: he is on a short deal with a lot to prove, and with the 2027 quarterback class loaded, he is one of the names who must deliver in 2026 or risk being pushed out of a job."},{"n":"J.J. McCarthy","p":"QB","t":"Minnesota Vikings","s":"neg","o":"The Vikings QB battle with Kyler Murray that wasn't supposed to be a battle: Murray came in on a cheap deal and made it competitive. McCarthy was horrible last year (the Justin Jefferson connection numbers were ugly), and if he keeps failing to step up in the pocket he creates problems that lose games. Minnesota may give him one more try before pivoting to the rich 2027 QB class. Players in that offense (Jefferson, Addison, Hockenson) may underperform their team-talent baseline if McCarthy doesn't click. Fade the QB; monitor the Jefferson fallout."},{"n":"Cam Skattebo","p":"RB","t":"New York Giants","s":"pos","o":"An RB1 when healthy (90 yds/game until a week-8 ankle dislocation and fibula fracture). Underrated rookie tape: fights for every yard, gets skinny between the tackles, refuses to go down, and a 40-inch vert (the backflip landed). The Giants want to run and invested nothing else at RB, so the volume is there; Tracy and Singletary are behind him. A Mark Ingram career comp. The only real worry is whether he bounces back from that specific injury, and how much is already priced into the 4th-round cost. The meatballers are very high on him — a healthy Skattebo is a first-to-second-turn-caliber player in their view, and he is a little easier to roster in managed leagues where you can feel out the workload week to week."},{"n":"Trey Harris","p":"WR","t":"LA Chargers","s":"pos","o":"Cheap, getting consistent work with the first/second units in the new Chargers system. The meatballers are taking lots of him in best-ball as a free upside swing in a good offense; the Slater/Alt return creates a passing-game spike. The kind of late dart that hits more often than the market expects."},{"n":"Marshawn Lloyd","p":"RB","t":"Green Bay Packers","s":"mixed","o":"The health case is real: Green Bay's staff appears to have fixed the root cause. Lloyd was compensating for old injuries in ways that stressed other parts of his body and never unlearned it. This is the same group that quietly solved Christian Watson's hamstrings and Eric Stokes. A first fully healthy offseason; the talent was never the question. The meatballers find him more interesting than his priced-to-not-play tag suggests: he is healthy and running RB1/RB2 in Packers drills, and he reportedly saw Dr. John Mayer to fix the ankle and hip tightness (from compensating for his 2020 ACL) that drove his hamstring issues, a similar process to Christian Watson's turnaround. The Josh Jacobs legal situation adds standalone upside beyond just injury."},{"n":"Jonathon Brooks","p":"RB","t":"Carolina Panthers","s":"mixed","o":"One of the meatballers' sleepers. The first RB taken in 2024 whom we have barely seen, two ACLs, but still younger than Hampton, Skattebo and Henderson at 22. Carolina let Rico Dowdle walk, signaling commitment, and the offensive-line investment is the most money committed to an O-line in football. More burst than Chuba Hubbard and a real pass-catcher. The only question is health; reports run hot and cold daily. The meatballers are tempted by the league-winning upside: more talent than the backs drafted around him (hands, lateral shiftiness, finishes through contact) and Carolina barely addressed the position behind him. The giant caveat is two ACL tears in the same knee, so treat it as a best-ball upside swing more than a weekly play, with Chuba Hubbard still in the way."},{"n":"Nico Collins","p":"WR","t":"Houston Texans","s":"pos","o":"The meatballers' top pick: a true alpha, only 27, just paid. 79 yards and 15.8 PPR per game across 38 games with CJ Stroud, second only to Puka in yards per route since 2023. Top-3 positional upside if he plays 17 and sees around 160 targets. Positive-regression buttons everywhere: a 62% catchable rate last year (was 76% prior), a 3% screen rate (was 16%), and the Texans were 32nd in red-zone TD rate. Betting on a Stroud bounce-back and three new O-linemen helping. Three straight 1,000-yard seasons, but name fatigue and last year's injury have him at a tier-3 price the meatballers would happily buy."},{"n":"Bucky Irving","p":"RB","t":"Tampa Bay Buccaneers","s":"mixed","o":"A genuine value-vs-fade split: drafted around ECR 20/RB20, around pick 54. The bull case (some are actively rostering him on lots of teams): Bucky is Tampa's lead back, a better pass-catcher than Gainwell (1.56 career YPRR vs 1.19), led all qualifying backs in some 2024 efficiency marks, and a healthy Bucky can't be taken off the field enough to tank his value. The bear case (most Twitter experts are fading him): the shoulder still not healthy, Bowles already called him 1A to Gainwell's 1B in late March, and Sean Tucker may keep the goal-line work. Real RB2 upside if the shoulder holds."},{"n":"Colston Loveland","p":"TE","t":"Chicago Bears","s":"pos","o":"The breakout TE call of the offseason: a bold prediction he leads ALL tight ends in TDs AND yards, and leads the Bears in both. The receipts: Weeks 16-20 last year he posted a 25.6% target share, 81.6 yards/game, 2.49 YPRR, 34% first-read share, beating both Trey McBride's 2025 and Brock Bowers' 2024 in per-route efficiency over that sample. The same take-the-late-season-rookie-signal-seriously lesson as Amon-Ra and Rashee Rice. Going as TE3 in redraft, massive value if he leaps McBride. The one cap: the target share won't be as dominant as Bowers' since the Bears spread it around (Burden, Odunze, DJ Moore). Buy aggressively at TE3 cost. The meatballers increasingly think he ends up as the Bears' No. 1 target — the biggest hurdle to both Luther Burden and Rome Odunze cashing in. A meatballers league-winner: one host's favorite player in the entire 2025 draft and his most-drafted tight end. An elite route-runner (1.97 yards per route as a rookie) who can isolate and win one-on-one on slants and digs, he became a full-time player down the stretch (6-94-1, 10-91-1, 8-137 in the playoffs). In a Bears offense set to lead the NFL in 12/13-personnel with a thin receiver room, they expect a near-100% snap rate, rate him the best of the three pass-catchers, and would take him a full round ahead of Luther Burden — a legitimate TE1-overall dark horse."},{"n":"Tucker Kraft","p":"TE","t":"Green Bay Packers","s":"mixed","o":"The highest Tier-1 upside in Tier 2 if he's healthy — and he's coming off a torn ACL with PCL and meniscus damage, which is no small thing. He offers elite YAC, very George Kittle-like, and with Doubs and Wicks gone the targets consolidate; he could be the No. 2 option behind a Watson/Reed/Golden receiver room (both Watson and Reed have injury history). Jordan Love is a good real-life quarterback. Big upside if he's back by Week 1. The meatballers like him and just hope he stays healthy; one even calls him the main alpha of the Green Bay passing game — a productive, ascending tight end they would bet on."},{"n":"Sam LaPorta","p":"TE","t":"Detroit Lions","s":"neg","o":"Bottom of Tier 2 or top of Tier 3 depending on the ranker. There are too many mouths to feed in Detroit (St. Brown, Gibbs, Williams), and he hasn't been as productive since the Jameson Williams breakout. Petzing arriving as OC (heavy tight-end usage in Arizona) could spark a bounce-back, but the injury history makes some unwilling to spend a top-100 pick — they'd rather piecemeal the position."},{"n":"Kyle Pitts","p":"TE","t":"Atlanta Falcons","s":"neg","o":"Quietly had a nice bounce-back season nobody cared about. The signed 3-year/$54M extension ($36M guaranteed) locks him in. The hidden lever: if Kirk Cousins starts the early games before Mendoza/Penix, Cousins force-feeds TEs a guaranteed around-30% target clip regardless of who it is; that's the recipe for the 166-yard, 3-TD type games Pitts has flashed. Kevin Stefanski's arrival also points to 100+ targets and red-zone looks. Going around 63-86 overall. The knock: he disappears when Drake London is healthy and on the field. A late-round TE upside swing that's burned bulls before but the price finally fits. The meatballers see a settled, solid pick after pick 100: the clear No. 2 target behind Drake London (Darnell Mooney gone), still only 25 after a 1,000-yard, 88-catch finish, and now with a Kevin Stefanski staff that has a strong history with pass-catching tight ends. Five or six touchdowns is a reasonable outcome; they would take Tua over Penix for his accuracy."},{"n":"Christian Watson","p":"WR","t":"Green Bay Packers","s":"pos","o":"A perennial league-winner tease at a WR3 price. The bull case: Doubs and Wicks gone, he earned the WR1 role and got paid, and in his sample he was ultra-efficient. The Will Fuller upside (boom weeks, deep shots) is real if healthy. The bear case: he's been a fantasy heartbreaker year after year (injuries), and even in his good stretch only had a 68% route share. Coming off injury history that keeps recurring. The my-friends-peer-pressure-me-into-drafting-him-again player. Cheap enough to swing on. The meatballers frame the ceiling as a Mike Evans-style career: a 6'4 burner who makes defenders look like traffic cones on crossers. The catch is availability, having missed roughly 20 games in four years, and the real cost is not just the misses but the weekly questionable tags. Elite upside, shaky floor. The meatballers are intrigued but cautious: he has never run 300 routes in a season, yet Green Bay paid him and cleared the room (Doubs and Dubs gone), which may signal belief. They project a big year if the routes finally come, but call him a boom-or-bust, roster-context-dependent hold."},{"n":"Jordan Love","p":"QB","t":"Green Bay Packers","s":"mixed","o":"Much better in real life than the QB18 ranking, but the Packers run a low-volume offense and Love barely uses his legs, which caps the fantasy upside. He's not far off a QB9-type finish in a normal year; the loss of Romeo Doubs is a small skill-group ding. A fine, cheap pocket-passer fallback. The meatballers see real upside: he already has a QB5 season on his resume, and the only thing holding him back is volume — Green Bay ranked 31st and 22nd in pass rate over expected the last two years. But with a thin backfield behind an aging Josh Jacobs and a defense that may be without Micah Parsons for a stretch, Love could be asked to win some shootouts."},{"n":"Caleb Williams","p":"QB","t":"Chicago Bears","s":"pos","o":"Finished QB7 in points per game as a rookie despite a poor TD rate and sub-7 YPA. One of the most physically gifted QBs alive; cut sacks from 68 to 24 (the biggest year-1-to-2 leap in NFL history). Year two of Ben Johnson with Loveland, Burden, Odunze, D'Andre Swift around him. Rushing-TD upside (only 3 last year) could push him top-3. The meatballers see top-5 NFL QB upside and sneaky-MVP potential. Great value at QB6 cost. The meatballers are fading the price, not the player: going QB6 right after Drake Maye is rich when his floor looks more like a back-end QB1. The Ben Johnson system wants everything on script, and Caleb's magic is off-script; his on-target rate (bottom 10), catchable-ball rate (bottom five) and completion percentage (bottom three) show the gap. Only worth it if you are stacking the Bears (Loveland, Odunze, Burden). He will still run for double-digit scores. The meatballers are scared to fade him — huge off-script talent that could 'break fantasy' — but flag the tension of that improvisational style inside Ben Johnson's on-script system (Ben Johnson turning Jared Goff around is the bull case). In the QB tiers they call him a balanced archetype much like Drake May who just has not shown the passing yards yet, and a screaming value — he goes 50-ish picks later than May in home leagues, likely their most-drafted QB there. In dynasty the meatballers slot him in the second tier and would take him over Joe Burrow purely on age — he is five years younger. They note he CAN run but has been choosing not to, growing into a more mature, pocket-first version of himself much like Drake Maye did."},{"n":"Luther Burden","p":"WR","t":"Chicago Bears","s":"pos","o":"One of the best YAC threats in the game, with elite start-stop juice in a bigger body, and Ben Johnson schemes it up (25% of his targets were screens, plus jet motion). Refuses to go down on first contact even on downfield catches. The per-route metrics flatter him (2.5 YPRR shrinks to around 1.7 once you strip screens/the flea-flicker), and he's still raw as a real route runner. Now has a clear two-WR-set runway with no competition for it. The meatballers' WR28, a boom-bust prospect looking like a boom, but a round too expensive. The meatballers (well, one very loud voice) think he could be special: elite, maybe unmatched first-step quickness, and he out-produced Rome Odunze by nearly a yard per route as a rookie. A freak; putting him in the WR-tier-three range this early is aggressive, but they are betting he gets there. A meatballers favorite — the Zap model loved him, his rookie per-route efficiency was elite, and Ben Johnson hand-picked and reportedly loves him. They think he ends the year as the Bears' No. 2 receiver and dismiss the snap-share worry (he would lose only a handful of routes to 13-personnel), comping him closer to Amon-Ra St. Brown than to Rome Odunze. Colston Loveland is the real hurdle for the target share. Fresh nugget from the meatballers: he averaged roughly a full yard per route run MORE than Rome Odunze last year, and his first-step quickness is 'pretty extraordinary and maybe unmatched by any other receiver in the league.' One of them would already slot him in an elite dynasty tier and admits that is a bridge too far for most — for now."},{"n":"Jalen McMillan","p":"WR","t":"Tampa Bay Buccaneers","s":"mixed","o":"Ended his rookie season on fire, scoring in each of the final five games (two, one, one, two, one). The problem is the competition: he has to beat out Ted Hurst for an outside role, then contend with Egbuka and Godwin for targets. Useful in deep best-ball leagues, but there's too much traffic for reliable weekly starts. The meatballers like the sleeper angle: with Chris Godwin possibly running out of juice, he could carve out a bigger Tampa role than people expect, maybe the biggest-impact guy in his tier. The meatballers flag a classic best-ball deep sleeper (around WR153): he showed real separation improvement late last year, enough to play some boundary receiver, and they bet he holds off the rookie for most of the season in a pass-heavy Tampa Bay offense."},{"n":"Ted Hurst","p":"WR","t":"Tampa Bay Buccaneers","s":"pos","o":"Tampa drafted him on Day 2 to help fill the Mike Evans void — a 6-foot-4 field-stretcher with Evans-like routes. The receiver room is deep (Godwin, Egbuka, McMillan, Tez Johnson) but nobody's locked in, leaving room for Hurst as the WR3, with Tez Johnson the likely odd man out. The draft capital signals commitment, and the meatballers prefer him over Jalen McMillan for the outside role — he caught 80% of his targets over four games late in 2025."},{"n":"Emeka Egbuka","p":"WR","t":"Tampa Bay Buccaneers","s":"mixed","o":"WR9 in PPG through week 11, then WR64 weeks 12-18, and the crash was Baker Mayfield's AC sprain (his catchable-ball rate fell to a league-worst 50%), his own week-6 hamstring (11 fast routes after the injury vs 11 in the first five weeks), and Mike Evans's on/off availability (a 29% target share without Evans vs 19% with). Evans is gone now. Zac Robinson is handing him the Cooper-Kupp Z role. A top-5/10 ceiling tied to Baker's health. The meatballers' WR14. After a strong rookie year the meatballers would not be shocked to see him crack the top 10 — a high-variance, high-upside dynasty hold."},{"n":"DeVonta Smith","p":"WR","t":"Philadelphia Eagles","s":"pos","o":"With A.J. Brown traded away, Smith inherits the clear No. 1 role and a career-best target share, a borderline top-10 real-life talent who profiles as a high-floor WR2 with low-end WR1 upside. New coordinator Sean Mannion is reshaping the offense toward a Shanahan/McVay zone mold that could move Smith around more (motion, inside-out). A confident buy around a WR11 price; over one five-game stretch he posted top-three WR yards-per-game usage even as the clear No. 2. The meatballers flag the A.J. Brown dependency: over the past three seasons he is targeted on 30% of his routes without Brown on the field, but just 20% with him. With A.J. Brown gone this is his true shot at a No. 1 role, and the meatballers are all-in for redraft; in dynasty, though, they warn this may be peak value — he is nearly 28, so a strong year could be a smart sell before the age discount hits."},{"n":"A.J. Brown","p":"WR","t":"New England Patriots","s":"mixed","o":"Traded to New England for a 2028 first and a 2027 fifth, taking over for the released Stefon Diggs as Drake Maye's clear No. 1. A strong buy-the-dip: Josh McDaniels' offenses funnel huge volume to the alpha (Davante Adams saw 180 then 175 targets under him), Maye is among the league's most accurate downfield passers, and the scheme is faster and more pass-leaning than the run-heavy Eagles attack he left behind. He's topped a 23% target share four straight years (a 30%+ peak in 2023) and offers WR9-10 upside if healthy. The meatballers love the move to New England — a clean No. 1 role for Drake Maye and, in their words, top-5 upside from a middle-second-round price. He is fourth in the NFL in receiving yards and touchdown catches since 2019 and finished last year strong; if he hits, he is impossible to draft at value next year."},{"n":"Makai Lemon","p":"WR","t":"Philadelphia Eagles","s":"mixed","o":"The 20th overall pick — a sign the Eagles are preparing for life after A.J. Brown — and they also took Eli Stowers, both first- and second-round dynasty values. As the meatballers put it, 'Good for you, Makai, you don't have to go to Pittsburgh.' He'll take time to develop, but the landing spot with Jalen Hurts is strong. They had him as a top-five dynasty pick (nickname 'the Snake'), and he won't meaningfully hurt DeVonta Smith as a rookie. The meatballers call the rookie unproven — an archetype they want to see translate before buying in."},{"n":"Rashee Rice","p":"WR","t":"Kansas City Chiefs","s":"neg","o":"The biggest dynasty SELL. 30 days in jail (a probation violation, marijuana) plus a knee cleanup surgery (about 2 months) he'll rehab while incarcerated; expected back around training camp, but far from ideal. Beyond the off-field stuff, the deeper flaw: KC's offense underperformed even when Rice was productive (a great zone-beater/YAC, but a scammy-targets profile). The KC WR room is thin behind him (Worthy specific-usage, Thornton deep-only, Cyrus Allen R5 sleeper, a declining Kelce); the meatballers think KC should just sign Stefon Diggs. On the QB pods the meatballers debated him as the linchpin of the Chiefs' passing game, but the caveats are real: he is essentially running the same middle-of-the-field route as the clear WR1, and a possible suspension clouds the picture. A bet on the offense as much as the player. A tier-4 dynasty receiver for the meatballers with a wide range of outcomes in the Kansas City offense."},{"n":"Kenneth Gainwell","p":"RB","t":"Tampa Bay Buccaneers","s":"mixed","o":"A value pick some rank above consensus: was unbelievable for Pittsburgh last year and now the clear receiving threat in Tampa as Bucky Irving's 1B (Bowles literally set the stage in March). The bull case: if Aaron Rodgers stays check-down-Charlie, Gainwell could reprise a 70%-of-last-year role. The bear case: he averaged only 6.7 carries a game for Pittsburgh (a career high) and Bucky is the better pass-catcher and clear lead back, so a healthy Bucky caps Gainwell hard. Useful where he's going but role-dependent."},{"n":"Isaiah Likely","p":"TE","t":"New York Giants","s":"mixed","o":"Signed a three-year, $40M deal ($26M guaranteed) and reunited with Jim Harbaugh. When he was the primary tight end in Baltimore without Mark Andrews, he put up 50 receiving yards and 12.5 fantasy points a game, and Harbaugh has hyped him as Pro Bowl-caliber. The caution: he's entering Year 5, and 78% of tight end breakouts happen before then, plus Theo Johnson is still around and tight with Jaxson Dart. The meatballers are split — one read sees a breakout, the other is skeptical ('Isaiah Unlikely') — but they're still holding him in dynasty."},{"n":"Theo Johnson","p":"TE","t":"New York Giants","s":"mixed","o":"Underrated, cheap and young. Best friends with Jaxson Dart and on the same page with him; profiles as the in-line Mark-Andrews role (a red-zone monster, plus blocker) to Likely's move-TE. The market parrots that he sucks, but the athleticism, youth and rookie flashes plus QB rapport make him a sneaky dart in a run-heavy offense that needs pass-catchers."},{"n":"Keenan Allen","p":"WR","t":"LA Chargers","s":"mixed","o":"The Chargers' GM said the door is 'not closed' on a return. If he comes back, it mainly eats into Ladd McConkey's role rather than Quentin Johnston's. The meatballers have low confidence he actually returns, but flag it as a McConkey risk."},{"n":"Bo Nix","p":"QB","t":"Denver Broncos","s":"pos","o":"Finished QB1 last year and was good enough from a fantasy perspective; now Jaylen Waddle joins as his reported favorite target, which raises the offensive ceiling but also splits the target pie (Sutton, Franklin, RB targets). The Waddle fit is genuinely good. Bo Nix as a streaming/QB2 with a real supporting cast; the question is whether Sean Payton leans pass enough to support multiple fantasy WRs plus the QB."},{"n":"Jaylen Waddle","p":"WR","t":"Denver Broncos","s":"pos","o":"The polarizing pick of the offseason after the trade to Denver; reportedly becoming Bo Nix's favorite target, with the bull case being a passing-volume infusion under Sean Payton (who just signed an extension, so the run-first scripts aren't going away as much as feared). Bull case: 1,100-1,200 yards with 7-10 TDs, WR1 upside. Bear case: the Broncos are 5-deep at the position (Sutton, Franklin, plus RB targets to Dobbins/Harvey), a tough early schedule, and the ADP is aggressive for a guy who's been a check-down/run-script casualty. He smashed historically whenever Tyreek missed time in Miami; that's the precedent the bulls lean on. Going WR2 range with WR1 ceiling. The meatballers lean mildly bullish as part of a Denver offense they like more than the market. The meatballers are very high on him — one host calls himself as bullish on Waddle as anyone in fantasy this year. They read Denver upgrading past Courtland Sutton and Troy Franklin as proof they wanted the real deal, and Waddle is it."},{"n":"R.J. Harvey","p":"RB","t":"Denver Broncos","s":"neg","o":"A hard fade: being drafted as the Broncos' RB1 (RB21 in early drafts, RB31 in best ball) but profiles as the auxiliary/third-down back, not the lead. The beat reporters were right last year: it was J.K. Dobbins as the starter, and Denver re-signed Dobbins (2yr/$16M, $8M guaranteed) after failing to upgrade. Same team, same O-line where Dobbins ran 5+ a carry. The one thing that's sticky: Harvey's receiving (56 catches, 12 TDs as a rookie) keeps him usable in full-PPR if you're light at RB. But the early-down ceiling needs a Dobbins injury. Failed the audition after Dobbins got hurt last year. The meatballers are higher than the market: he is the primary pass-catcher in the Denver backfield, used heavily in the red zone, and the most explosive back there — they think the market overreacted to the Jonah Coleman addition."},{"n":"J.K. Dobbins","p":"RB","t":"Denver Broncos","s":"mixed","o":"The value play of the Denver backfield: going mid-30s in best ball while drafted as a clear starter. Beat reporters insisted all along he'd be the guy over Harvey, and Week 1 proved it. When healthy he's awesome (ran 5+ a carry last year); the injury history is the only real risk, and the price already bakes it in (going outside the top 30 RBs because they brought Dobbins back and drafted Justice Hill). Also the back the Jaguars originally wanted before settling on Chris Rodriguez, a point in Tuten's favor. Strong RB value where currently going. The meatballers think he is overvalued on full-PPR — a 4% target share last year, real injury risk, and both Jonah Coleman and R.J. Harvey eating into the work."},{"n":"Patrick Mahomes","p":"QB","t":"Kansas City Chiefs","s":"neg","o":"A top value call. Going QB14/89th overall despite being the QB2 in points per game last year and posting 8 straight top-12 seasons (4 top-5, 2 overall QB1s). The ACL question is why he's falling, but QB passing numbers historically aren't hurt much by ACLs, and athletic over-30 ACL returns (Reggie Wayne, Jordy Nelson, Edelman, Diggs) all bounced back. Even if he misses early time, stream a Week-1 fill-in (Justin Fields is there) and plug in a QB1 when he returns. QB4-caliber once on the field. The meatballers are nervously fading: last year split in half, a hot start with Rice out, then just one top-12 finish from Week 9 on. He is coming off the injury, the receiving group is uninspiring (Rice, an aging Kelce, an unproven Worthy), and adding Kenneth Walker should pull red-zone dropbacks away from him. Still the best QB alive at a palatable price, so it is a hold-your-nose fade. The meatballers are below market: he was not great the two years before last, and last year's fantasy spike was rushing-driven — coming off the ACL and with Kenneth Walker in the fold, they are skeptical he repeats that rushing production, and would rather take Justin Herbert or Trevor Lawrence near his price. Dynasty read from the meatballers: expect a down year coming off the injury, and understand the real problem is the supporting cast — Rashee Rice gets hurt and suspended, Xavier Worthy popped for half a season, Kelce is old, and all the money is tied up in Mahomes. They badly want Kansas City to get him a true X receiver (they wish the Chiefs had signed Mike Evans)."},{"n":"Jameson Williams","p":"WR","t":"Detroit Lions","s":"pos","o":"Boom-bust personified, going right around ECR 50. The allure is the explosive games, but when he's not booming (like weeks 1-7 last year) he's a cut/waiver-wire casualty. The 2026 concern: a new playcaller (Drew Petzing) and the offense flowing through more established pieces. Overvalued relative to the consistency for some. A spike-week WR with a low floor; draft knowing you'll have to stomach the dead weeks. A dynasty roller-coaster the meatballers say has been all over the map; he got the extension, but some question the work ethic. Big-play and touchdown upside keep him interesting."},{"n":"DeAndre Swift","p":"RB","t":"Chicago Bears","s":"pos","o":"A projection surprise the meatballers almost didn't want to print — he grades as a mid-RB2 even though he's not a player they're inclined to like. Chicago's offense projects to be outstanding, and Swift should be a major beneficiary of Caleb Williams and the improvements around him. The meatballers triple-checked, and he keeps coming out well ahead of TreVeyon Henderson."},{"n":"TreVeyon Henderson","p":"RB","t":"New England Patriots","s":"mixed","o":"RB21, about right. Standalone he's roughly an RB3/desperation flex behind Rhamondre Stevenson, but the athleticism and draft capital mean top-5 upside if Stevenson misses time (he posted 28+ in two of his three big games last year, both with Stevenson out). New England's committee history (the Belichick/McDaniels tree) is the cap. The meatballers are neutral: he could eventually take over the New England backfield if he cleans up his weaknesses, but expect a shorter leash than fantasy managers want — they are not betting on the breakout this year, though they are fine drafting him."},{"n":"CeeDee Lamb","p":"WR","t":"Dallas Cowboys","s":"pos","o":"Getting a 'default' Tier 2 ranking because everyone behind him has quarterback or injury questions. His numbers fell off hard with George Pickens on the field — zero top-10 half-PPR weeks in 2025 and a big touchdown drop — though he still saw about 10 targets a game in his 11 full games. Best case is WR8-12 unless Pickens gets hurt or holds out. The targets are there; the production is capped. The meatballers think name fatigue plus last year's injury have made him quietly undervalued — he was excellent when healthy, they expect a big bounce-back, and he is gettable for a touch less than the other WR1 studs."},{"n":"James Cook","p":"RB","t":"Buffalo Bills","s":"pos","o":"A favorite, disrespected after leading the NFL in rushing. Keeps clearing the regression bar (efficiency, TDs) every year. Adding DJ Moore just makes a top-5 scoring Bills offense better. Pass-catching is the last bit of untapped upside (he was a receiving back at Georgia). An RB3 with a very high floor; worst case he repeats RB6. In his prime, and younger than the other tier-1 backs. The meatballers are drafting more of him this year on reports he will catch more passes out of the Buffalo backfield."},{"n":"Chig Okonkwo","p":"TE","t":"Washington Commanders","s":"pos","o":"Signed in Washington for around $27M and David Blough showed him Sam LaPorta film telling him these are the things you're going to do. Profiles as the Deebo Samuel-type slot/gadget weapon Ertz used to be: get him the ball at the line and let him run through people. Double-digit TD upside on creative usage alone with Jayden Daniels and no target competition beyond McLaurin. The meatballers are higher than market (around 128 overall). A late-round TE with a real number-two-target ceiling. The meatballers like the upside dart: now with Washington and finally catching passes from a real quarterback in Jayden Daniels after years of Levis and Tannehill, he steps into a Deebo-style scheme role of bootlegs, pop passes, and touches in space for an offense that loves to manufacture them. Athletically he is in the Bowers and Kittle tier and had a 70-yard score two years back; a sky-high-ceiling tight end going round 16-20."},{"n":"Oronde Gadsden II","p":"TE","t":"LA Chargers","s":"pos","o":"An elite receiver in a TE body (no TE with as many catches averaged more than his 13.6 yards per reception) but an atrocious blocker (3 positive blocks to 34 negative). A Gesicki-to-Waller range of receiving outcomes. The problem is snaps: the Chargers added blockers (Kolar, Njoku), so project him a 50%-or-less player who spikes in shootouts. Dynasty value tops his redraft value; chase the spike weeks but keep expectations in check."},{"n":"Javonte Williams","p":"RB","t":"Dallas Cowboys","s":"pos","o":"A value at RB19/36th. Finished as an RB1 last year with career highs in rushing yards and TDs; Dallas added zero backfield competition in the draft. Top-five in carries and yards inside the 5 (behind only Derrick Henry and Jonathan Taylor). Still just 25-26 and further removed from the old knee injury; he catches passes, scores, breaks tackles. The meatballers have him RB14, well ahead of consensus and ahead of Bucky, Etienne, Kyren and K. Walker. The meatballers call him one of the most underrated backs in dynasty startups — RB19 in ECR makes no sense given Dallas re-upped him for three years, he was the RB11 in points per game with no one threatening his workload, and he was efficient (16th in explosive-run rate). Go gobble the value."},{"n":"Michael Pittman Jr.","p":"WR","t":"Pittsburgh Steelers","s":"pos","o":"Traded to Pittsburgh to be the Aaron Rodgers possession/short-area guy: glance routes, RPOs, slants, crossers, the quick stuff Rodgers loves at age 40-ish. The Rodgers-turned-DK-into-Pittman-last-year bet, except now he gets the real thing. Played through an ugly back injury in 2024 (a warrior). A solid first-WR-off-your-bench floor, around 775 yards, but no big ceiling in a balanced low-octane Pittsburgh offense. Roughly a coin flip with DK Metcalf."},{"n":"Ashton Jeanty","p":"RB","t":"Las Vegas Raiders","s":"pos","o":"An exceptional forced-missed-tackle rate (29 vs the 16 NFL avg) and a throwback bell-cow, but in by far the worst situation of this group (0.6 yards before contact, worst OL). Still earned 84% of backfield touches late. Ranked RB9, not RB6/12th-overall; Josh Jacobs is the baseline, with JT/Henry/Saquon the dream. As high a floor as anyone given how bad it was around him; the Kubiak system is a real upgrade. The meatballers' biggest first-round stand (top-8 for one of them): the one back after the consensus top four they trust for a full every-down role — receptions, carries and goal-line work with no real competition (~300 carries, 80 targets in Kubiak's run game). Last year's inefficiency was a 30th-ranked offensive line (now upgraded with Kolton Miller and Tyler Linderbaum), and Market Score has him RB4 — an easy buy at an RB8 price, same tier as James Cook and Jonathan Taylor."},{"n":"Quinshon Judkins","p":"RB","t":"Cleveland Browns","s":"pos","o":"The meatballers' best rookie RB tape in the class: runs hard, great build (6'/221), and plays so in control with his feet under him that he's more athletic than his testing. A brutal situation (0.7 ybc, 3rd-worst; hit at/behind the line on 55% of carries; an NFL-high 45% of carries vs 8-man boxes). A Derrick-Henry-on-the-edge comp; a Todd Monken connection. A week-16 ankle dislocation/fibula fracture but participating more than Skattebo. In love with the 5th-round ADP; Dylan Sampson is the pass-game complement."},{"n":"Saquon Barkley","p":"RB","t":"Philadelphia Eagles","s":"mixed","o":"A fair-to-good value at the 2-3 turn; arguably being drafted near his floor. Last year's efficiency dip is largely chalked up to Patullo's scheme (decoy routes run into zones, breakaway runs vanished), not decline. Sixth-best odds to lead the league in rushing. The catch: Hurts rarely checks down so the pass-game ceiling is capped, more Derrick Henry-ish unless they build the offense around him like the title year. Will Shipley and Tank Bigsby are the handcuffs. The meatballers are drafting him above ADP, but note that heavy-usage backs like him are the most likely to miss time, which is exactly what makes Tank Bigsby such a coveted handcuff."},{"n":"Brian Thomas Jr.","p":"WR","t":"Jacksonville Jaguars","s":"pos","o":"Don't overreact to his 2025 struggles. He's one of only a handful of receivers ever to finish top-five as a rookie, then slumped in Year 2 — WR43, 700 yards, two touchdowns, 53% catch rate. But after the bye his catch rate rose to 58% on better usage, and 25% of his routes were pure go routes, which artificially suppressed that number. Liam Coen has said he needs to use Thomas differently. The comp path — Mike Evans, Cooper Kupp, Garrett Wilson — all struggled in Year 2 and then exploded. Median outcome is around WR22, and he's going behind Sutton, Metcalf, and even Jakobi Meyers in ADP. After a catastrophic season the meatballers have tumbled him down the dynasty tiers — a cautionary tale of how fast a 'can't-miss' young receiver can crater."},{"n":"Travis Hunter","p":"WR","t":"Jacksonville Jaguars","s":"mixed","o":"The wild card that makes the entire Jacksonville WR room muddy: his breakout last year was legit but, like the BTJ situation, it was concentrated and then injury hit. He's reportedly added weight this offseason, with conflicting reports on usage. When healthy in the lineup last year, he commanded targets that left Parker Washington uninvolved entirely. Ultra-talented but the role/health combo is genuinely unpredictable in a crowded room. A late-round upside dart, route share is the question. The meatballers think the market has grossly overcorrected: a No. 2 overall pick who wore the offense's teal jersey all minicamp, with the beat (Gladstone, Cohen, Shipley) insisting he will be heavily involved on offense. In his last three healthy games he played 65%-plus of the snaps with 15 catches on 24 targets before an LCL tear ended his year. Even as a rotational piece he is a flex; if the role grows past Parker Washington and Jakobi Meyers he can win you weeks. Going round 12-plus, it is an easy click. The dynasty counter from the meatballers: they just cannot see a path to a 60% offensive snap share, and without that he is hard to start, with Jacksonville stacked at receiver (Parker Washington, Brian Thomas, a Jakobi Meyers extension). A talented two-way unicorn, but a tough weekly fantasy bet. Note the split, since other rooms are far more bullish on his upside at this price."},{"n":"Eli Stowers","p":"TE","t":"Philadelphia Eagles","s":"pos","o":"The meatballers love him more than Kenyon Sadiq — 'Stowers is so good, man.' The catch is he has to get past Dallas Goedert first; behind Goedert, Year 1 is a waiting game, but if Goedert misses time, Stowers could be incredible. Everyone loves him — they've called him a 'monster.' Unlike the Sadiq case, this is about landing-spot timing, not talent."},{"n":"Lamar Jackson","p":"QB","t":"Baltimore Ravens","s":"pos","o":"He finished around QB20 in ADP value last year while being drafted as a top-two or three quarterback — a down year by his standards, but the same player. The mobile-QB floor is the key: run 100-plus times and he's nearly guaranteed a top-12 finish, and his scramble rate and volume still lead the league. Now he's falling as far as the sixth round in mocks — a massive discount. As the meatballers put it: don't let last year's disappointment brainwash you; mobile QBs still slap. The meatballers see a bounce-back buy: last year's dip (16.5 fantasy points per game) was injury-driven (hamstring, knee, ankle, back), and new coordinator Declan Doyle brings Ben Johnson's motion-and-play-action scheme to Baltimore. Still one of the very few who can throw for 4,000 and run for 700, and he's a discount in Round 3-4 on recency bias."},{"n":"Travis Etienne Jr.","p":"RB","t":"New Orleans Saints","s":"mixed","o":"A wide range of outcomes for the Saints' new free-agent back. He swung from RB41 in points per game (2024) to RB10 (2025), but didn't post a 100-yard game after Week 4, and Kellen Moore's offenses have ranked near the bottom in expected fantasy points to running backs. New Orleans rebuilt the offensive line (a first-round receiver added, a veteran guard, strong tackles) behind a second-year Tyler Shough, so behind good blocking he can rip explosives, but the scheme-usage questions make him a polarizing round-three call."},{"n":"Alvin Kamara","p":"RB","t":"New Orleans Saints","s":"neg","o":"Among the top-5-to-10 RBs of the past 5-7 years, though on the lower end of that now; still capable of a top-5 season given his versatility and receiving chops. Used mostly as the talent comp for Jeremiah Love (an aspiring Kamara-like talent, used like Kamara, the receiving sets him apart). At his age the floor is the question, but the pass-game role keeps him relevant. An aging RB2 with upside if the volume holds. The meatballers still see a classic PPR specialist — a back who can finish top-10 in targets and scam his way to a relevant season on receiving work alone."},{"n":"Drake Maye","p":"QB","t":"New England Patriots","s":"pos","o":"A special QB talent, repeatedly cited as the upgrade that lifts the whole Patriots offense. The A.J. Brown trade gives Maye a real WR1 and makes Brown's TD ceiling spike (Maye is the best pure passer Brown has ever played with). QB6 ADP is borderline too hot for some given he's around Allen/Lamar/Burrow/Hurts, but the rushing floor plus the year-2 leap in an improving offense is the same arc as last year's Jayden Daniels. Strong QB1 with stacking upside. The meatballers are all-in on the QB tier: only Josh Allen averaged more fantasy points per game in the regular season last year, yet he is going as the QB5. Add a real alpha in A.J. Brown (a bigger passing-offense mover than Stefon Diggs was) and a second year in the McDaniel system, and a top-three scramble rate gives him a floor even if the designed-run rate stays modest. The meatballers think you are drafting him near his floor. A meatballers favorite in the mid-range QB1 tier: he posted an elite passing ceiling last year with a bare-bones receiver room, and now adds A.J. Brown (plus a healthier Stefon Diggs and Romeo Doubs). Heading into Year 3 with 4,000-pass, 400-500-rush upside, they think he's very hard to bust. In dynasty the meatballers push him even higher: he is already one of the best pure passers in the game (the Burrow, Stafford, Dak conversation) with real rushing juice on top, and he is young — one host puts him in a two-man top tier with Josh Allen."},{"n":"David Njoku","p":"TE","t":"LA Chargers","s":"neg","o":"Signed a 1-yr deal with the Chargers, joining Oronde Gadsden II and blocking TE Charlie Kolar in Mike McDaniel's offense (3 Dolphins TEs caught 15+ passes last year). A pass-catching complement to Gadsden with Justin Herbert throwing, so touchdown/red-zone upside, but the crowded TE room and Gadsden's emergence cap his ceiling. A streamable TE2."},{"n":"Dak Prescott","p":"QB","t":"Dallas Cowboys","s":"pos","o":"The meatballers are all in. Dallas improved its defense through the draft but won't jump from worst to best overnight with three rookie starters. As long as Dak stays upright, that's top-12 quarterback production — the every-other-year injury pattern is the main risk. Some of his volume was garbage-time driven, but even with a better defense, Dallas is still bottom-third and still throwing a lot. The meatballers put him in the QB breakout tier: with CeeDee Lamb and George Pickens outside, the touchdown upside is loud if he stays healthy. The meatballers frame him as 'Joe Burrow at a discount' — a pocket passer on a pass-happy Cowboys team with a loaded receiver room (CeeDee, Pickens, an emerging third option); QB4 and QB9 in his last two healthy seasons. Safe volume, just less ceiling than the runners."},{"n":"Tyler Shough","p":"WR","t":"New Orleans Saints","s":"pos","o":"A very competent 26-year-old in clearly the best situation of the second-year group. Kellen Moore's pace and trust shows up (6th-most motion at 70% of snaps); a top-12 QB in half his starts with real rushing flashes. Ryan Tannehill is the ceiling comp, and the additions (Jordyn Tyson, Oscar Delp, David Edwards, Travis Etienne) raise the floor. The drags: 2nd-worst pressure-to-sack rate (only Geno was worse), an antsy internal clock, and limited rushing. The meatballers prefer paying up a round for Kyler Murray or Purdy, but happily have him over Cam Ward. The meatballers are warming up: he took over as the Saints' starter in Week 8 and closed as the QB8 down the stretch (no game under 17 points in Weeks 13-17), and the team went 5-3 with him. New Orleans invested around him, adding offensive-line help, Oscar Delp, and Jordyn Tyson to pair with Chris Olave, making this a make-or-break season with no real competition. A perfect late-round QB with top-10 upside; better in redraft than dynasty given his age. A meatballers upside QB2 sleeper: over nine starts he showed a 250-yards-per-game arm (well above last year's league average) and was sneaky on the ground, and the Saints add Jordyn Tyson — a balanced-archetype dart worth a late pick in deeper leagues."},{"n":"Chris Olave","p":"WR","t":"New Orleans Saints","s":"pos","o":"A make-or-break target with real upside now that the QB picture improved: Kellen Moore (loves to push volume) is a fantasy-friendly fit, and the Tyler Shough situation ended up better than feared. Olave's still the clear WR1 in New Orleans. The risks to weigh: can he repeat, does Jordan Tyson eat into the workload, and the health file (blood-thinners for blood clots, concussion history). But the talent plus Kellen Moore volume make him a buy. Target him. The meatballers lean sell-high: the production is real, but he is a volume receiver who catches and falls down, and the concussion history plus a blood-clot scare make the injury risk scary. Cash the value before it dips. The meatballers flag late-season touchdown luck with Tyler Shough and a multi-year injury history; they would even rather have Jordyn Tyson in New Orleans a year from now."},{"n":"Malachi Fields","p":"WR","t":"New York Giants","s":"pos","o":"The Giants traded up (R3, #74) for the 6'4', 218-lb Notre Dame/Virginia WR. A former high-school QB and power slot who's elite vs zone and on stop routes, a great schematic fit for Jaxson Dart, who loves boundary stops. Not a burner, but wins contested catches. With Malik Nabers the clear alpha, Fields projects as a physical No. 2 who could lead the team in the dirty-work role; a sleeper in a run-heavy Giants offense."},{"n":"Malik Nabers","p":"WR","t":"New York Giants","s":"pos","o":"Avoiding at cost (WR9, around 17 overall). The late ACL cleanup surgery took longer than expected, putting Week 1, and PUP, in question. Most reports have been pessimistic, which is a red flag in the optimistic month of May. Rankers would rather take the names they KNOW produce from day one (Nico, Olave, Rice, Pickens, London) plus RBs like Henry/Kyren in that range. The new Harbaugh staff may play a patient long game. The talent is unquestioned; the timeline is the fade. The meatballers view him as tier-2 with tier-1 talent; the ACL recovery likely means a slow start (PUP or not 100%) and peak Nabers may not arrive until next season, but at just 23 they are still all-in."},{"n":"Zachariah Branch","p":"WR","t":"Atlanta Falcons","s":"mixed","o":"A third-round pick with real speed, but 51% of his college routes were screens — a big red flag for translating to the NFL. The meatballers don't expect a big producer, but if he hits, he has Tyreek Hill-ish stop-start speed nobody else replicates. Call it a scratcher ticket: probably a loss, but a big win if it cashes. Atlanta's thin receiver depth gives him a real shot at snaps, though a weak quarterback situation (Shedeur Sanders) caps the ceiling."},{"n":"Chuba Hubbard","p":"RB","t":"Carolina Panthers","s":"pos","o":"Vulnerable to Jonathan Brooks: going around RB45-50, but his history isn't as glorious as the market thinks (one of the most inefficient backs on a per-touch basis last year, regardless of metric). The Panthers' offseason inaction at RB (no Dowdle re-sign, no draftee, only AJ Dillon/Etienne to compete) actually signals they may be clearing the path for Brooks. The veteran-captain status insulates him somewhat, but if Brooks shows 90% health, Hubbard's the one who loses work. Fade in favor of Brooks. The meatballers call him a fine enough starter, but not one who will hold off a healthy Jonathan Brooks if Brooks gets back to his early-second-round profile."},{"n":"Kalen Black","p":"RB","t":"San Francisco 49ers","s":"mixed","o":"A 49ers third-round pick who wasn't invited to the combine but had top-30 visits with 10 teams. The meatballers are skeptical — Shanahan keeps reaching for backs who don't hit (Sermon, Davis-Price, Guerendo) — but they note that if he's the best back, he'll play, since Shanahan has no loyalty to draft slot (see Brock Purdy). They took him in dynasty as McCaffrey insurance, though at 24.5 he's not a typical upside pick, and Jordan James is probably the real threat."},{"n":"George Pickens","p":"WR","t":"Dallas Cowboys","s":"mixed","o":"Coming off career highs across the board in his first Dallas year, now in a contract year (motivation plus). The catch: CeeDee Lamb is by far the best WR on that team and was playing hurt / missed time last year, which inflated Pickens' share; when Lamb's healthy, Pickens' target ceiling compresses. The Dak-Pickens fit is genuinely good (what Dak does well is what Pickens does well). But A.J. Brown post-trade, Rashee Rice, DeVonta Smith, and McMillan are all names some would rather draft in his range. A boom-week WR2 with target-share volatility. The meatballers note that in games alongside CeeDee Lamb he drew 8.3 targets per game, eighth-best among receivers. In dynasty the meatballers see a borderline top-tier receiver: he posted 17.2 points per game (nearly 300 points), and being tied to Dak is a great spot. The one gate is himself, cleaning up the once-a-game off-field stuff and being a better teammate; do that and the sky is the limit. The meatballers are bullish on the explosive, spike-week talent (top-10 for one of them) but flag the risk that he is not tied to a long-term, top-tier quarterback beyond this year. If he and CeeDee Lamb stay healthy with Dak all 17, they think both finish top-12; a cash-out candidate if someone overpays for last year."},{"n":"Tyrone Tracy Jr.","p":"RB","t":"New York Giants","s":"mixed","o":"A hot-start plus opportunity play. Cam Skattebo's gruesome leg injury could open a bigger early role. A soft opening slate (Dallas, Rams, Tennessee, Arizona) with two top-5 RB matchups in the first four weeks; the Rams game is also great for pass-catching backs. Efficient 2025 (12th in target share, 22nd in yards per touch), a former-WR athletic profile, and a Harbaugh run-heavy scheme (the Ravens were last in pass-rate-over-expectation). RB1 upside through the first month at a discount draft cost."},{"n":"Josh Allen","p":"QB","t":"Buffalo Bills","s":"pos","o":"The clear, on-an-island QB1. Even in a season that wasn't his statistical best, the rushing floor is untouchable: he led all NFL ball carriers (running backs included) with 13 rushing scores inside the 10 and roughly 1.1 carries per game inside the 5. The staff is stable after an internal promotion, the receiver group is upgraded with DJ Moore added, and a healthier Dalton Kincaid only helps. There's essentially nothing to nitpick. On the Fantasy Life QB tiers the meatballers keep him the overall QB1 — an elite dual-threat league-winner (on 55%-plus of ESPN playoff rosters three years running) whose round-2/3 price they call correct given how consistently he shifts gears passing or on the ground; he gets the carries inside the five for double-digit rushing scores."},{"n":"Cam Ward","p":"QB","t":"Tennessee Titans","s":"pos","o":"Tier arm talent and an old-school gunslinger, but the rookie data is grim: QB38 in EPA/dropback, 39th in success rate, 40th of 41 in catchable-ball rate, plus a league-high 11 fumbles (tiny hands, self-inflicted) and a habit of holding the ball way too long. A brutal environment (OL/scheme/receivers) is the excuse, and Carnell Tate, Wan'Dale Robinson and Daboll help, but the accuracy and decision warts are on him. Jordan Love is the high-end comp, but the meatballers see a multi-year project (eyes on 2027-28), and there's an AC-joint shoulder sprain to monitor. The meatballers give the rough rookie year a pass: he had almost no help (a terrible offensive line and a pair of day-three rookies as his top receivers). Now Tennessee adds Carnell Tate, gets Calvin Ridley back and has improved up front, and his first-in-last-out work ethic gives them hope — though they concede a real chance of failure remains."},{"n":"Ja'Marr Chase","p":"WR","t":"Cincinnati Bengals","s":"pos","o":"Top of the elite tier (with JSN and Puka), the meatballers' clear dynasty WR1 on the strength of the established Joe Burrow connection. The Big Three has shuffled (Jefferson and Lamb showed they're mortal in 2025) but Chase remains the safest bet at the top. Fast fact: over his last 17 games with Joe Burrow the meatballers count 200 targets, elite and bankable volume. The meatballers keep him untouchable and some rank him the No. 1 dynasty receiver, largely on the Joe Burrow connection; he profiles like a guy who produces for years."},{"n":"Justin Jefferson","p":"WR","t":"Minnesota Vikings","s":"pos","o":"Finished WR37 in points per game last year but that was entirely QB-driven (J.J. McCarthy was awful). From 2022-2024 he led all WRs at 20 PPR per game. Kyler Murray is plenty good enough to feed him and wants to throw the back-shoulder and downfield stuff KOC's scheme produces. Treat 2025 as an outlier, reset to baseline. Expect a result much closer to WR6 than WR37, with WR1 overall upside. An easy end-of-Round-1 pick. The meatballers are not fading the talent, only the situation: last year was objectively rough, but the quarterback play was horrific, and he still has clear WR1-overall upside, and he is only about six months older than Ja'Marr Chase. The meatballers frame 2025 as a fluke floor: 84-1,048-2 on 140-plus targets (one of only eight receivers ever to post that line) was about brutal quarterback play and uncharacteristic drops, not decline. He cannot be that bad twice, so they see a real buy window if you trust Kyler Murray in Kevin O'Connell's scheme — the QB question is the only thing capping his dynasty ceiling. A separate short take echoes it: still real WR1 upside, and only about six months older than Ja'Marr Chase."},{"n":"Amon-Ra St. Brown","p":"WR","t":"Detroit Lions","s":"pos","o":"Tier 2. He's finished as the half-PPR WR3 three straight years but is never drafted there, so he's consistently a value. If a LaPorta target reduction flows anywhere, it's to him — he's the most likely of this tier to finally break into the WR1 group as Detroit's clear No. 1. The meatballers note he leads all receivers in red-zone points per game, rare for a player who is not a big-bodied outside type. In dynasty the meatballers prize the floor: he has finished as a top-three PPR receiver three years running, arguably the safest bet at the position. The meatballers call him maybe the most consistent receiver year to year, with Jared Goff locked in — a steady tier-2 dynasty anchor."},{"n":"Zay Flowers","p":"WR","t":"Baltimore Ravens","s":"pos","o":"A bust call: WR24 vs an ADP of 15-21. The WR7 finish is a mirage, bookended by week 1 and week 18 overall-WR1 games, but over the middle 12 weeks (71% of the season) he averaged about 8 ppg as the WR41, with just one top-24 week. Only one red-zone TD; not a goal-line threat behind Henry/Andrews/Lamar. A consistency rank of 16 vs a finish of 7 is a red flag; similar deltas saw 69% finish outside the top 15 next year. The meatballers see ceiling if new HC Declan Doyle's offense unlocks 8-9 TDs. Fast fact the meatballers like: in year three he averaged 2.72 yards per route with Lamar on the field, behind only Puka and JSN among all receivers."},{"n":"Tee Higgins","p":"WR","t":"Cincinnati Bengals","s":"pos","o":"Elite 27-year-old producer tier. Round-2 draft capital but he checks every box; one of the most situation-agnostic WRs in fantasy, his value barely moves regardless of team context. The only knock is age nearing the top of the WR curve. Got paid by Cincinnati. The meatballers love the explosive, spike-week upside — the kind of receiver who drops a 180-and-2 and wins your week outright."},{"n":"Courtland Sutton","p":"WR","t":"Denver Broncos","s":"neg","o":"Two straight WR1-territory finishes, but the Waddle trade complicates the picture. Sutton's a very good big receiver who wins boundary/middle-of-field breaking routes, but Waddle reportedly beat him in every per-route metric that matters last year and is becoming Bo Nix's favorite target. Going WR36 (vs Waddle WR24). The read: divide the Denver WR rankings by two (maybe three) because they'll cannibalize each other plus Troy Franklin and RB targets. Usable but capped now that Waddle's in town. The meatballers flag the touchdown dependency: in games where he did not find the end zone, he averaged just eight points. A firm meatballers fade — they point out he has never finished a season as a top-20 receiver in points per game and even lost his job to Troy Franklin for a stretch; they 'do not understand the love.'"},{"n":"Chris Godwin","p":"WR","t":"Tampa Bay Buccaneers","s":"mixed","o":"Initially WR50-plus, then bumped to WR37 when that looked too low. He was a per-game WR2 two years ago, but he's recovering from ankle trouble on the wrong side of 30 after multiple ankle injuries last year. Tampa will rely on him — Egbuka's in Year 2 and the WR3 is unclear — so WR37-44 is the right range. A rookie is coming, but Godwin is the veteran presence the team needs."},{"n":"Rachaad White","p":"RB","t":"Washington Commanders","s":"pos","o":"A sneaky value: basically free as an RB3/RB4 with RB1 upside he's flashed before. Lost his job and touches to Bucky Irving and Sean Tucker (two day-three backs), but that's fully baked into the price. The bull case: if Bucky's shoulder issues linger, White is a proven receiving-game producer (caught nearly everything thrown his way with Baker Mayfield). The bear case is just the committee muddle. Going around the 70-127 range depending on the ranker; at the back end of that, he's a strong contingency bet. The meatballers note he is one of the league's best passing-down backs, a receiver and pass protector with the clearest path to touches in a wide-open Washington backfield, even if he has been an inefficient runner on a cheap one-year deal. Likely the Week 1 starter. Fresh angle from the pods: the meatballers point to his rushing EPA climbing from 139th (2023) to 20th (2024) to 9th last year, plus a big jump in broken-tackle rate, so he is actually earning his touches now. He also reunites with college teammate Jayden Daniels (they ran for 2,000-plus together at Arizona State), and his contract matches the Rico Dowdle and Kenneth Gainwell tier. A dependable late back you do not have to draft as your RB1. Full-circle for the meatballers: they now see the highest floor AND ceiling in the Washington backfield. A top-10 long-down-and-distance back with great hands and pass protection, he has an Austin Ekeler floor and real snap-consolidation upside (70-80%) if Jacory Croskey-Merritt stays boom-bust and rookie Kaytron Allen does not seize it — and whoever plays next to Jayden Daniels tends to be efficient."},{"n":"Khalil Shakir","p":"WR","t":"Buffalo Bills","s":"neg","o":"A rising-tide beneficiary of DJ Moore's arrival. Last year he was break-glass-in-case-of-emergency (8 tgt/game in losses, 5 in wins) and the Bills handled him with kid gloves since they had no other slot option. With Moore plus rookie Skyler Bell adding profile depth, Shakir is freed to be a balanced, likely TD-dependent WR3 flex without being overtaxed."},{"n":"Stefon Diggs","p":"WR","t":null,"s":"pos","o":"A favorite Round 12 pick, climbing from Round 14 to 13 to 12 in DraftKings ADP and expected to keep rising. He was found not guilty on assault charges and put up 1,000-plus yards and 85 catches for the Patriots last year. He'll land somewhere meaningful — 'a guy who can step into an offense and immediately contribute' — and the meatballers would take him here. The meatballers would happily grab him before round 10: he played well and efficiently last year coming off the ACL, even if he was not an every-down player, and as a likely WR2 wherever he lands he is underpriced."},{"n":"Tetairoa McMillan","p":"WR","t":"Carolina Panthers","s":"pos","o":"Underrated even at his ADP, the meatballers' WR12 after a deep dive. A veteran-feeling route runner with a huge catch radius who owned 43.3% of the Panthers' air yards as a rookie (2nd in the NFL). A Drake London / Mike Evans comp. The year-2 unlock is usage: around 80% of his snaps were outside on the line, so more slot/movement work should spike production. Added 15-17 lbs (his Arizona weight). A foot injury has cost him OTAs; the first day of camp resolves it. A top-15 season call. The meatballers love the trajectory: a 70-catch, 1,000-yard, seven-touchdown rookie year while shackled to one of the league's worst quarterbacks in Bryce Young. This is likely his last season tied to Young, and he is just scratching the surface. The meatballers love the target profile (26% target share, 31% first-read share as a rookie, a path to 130-150 targets) but tie his ceiling to Bryce Young and Dave Canales' run-lean — a frustrating 'good but not elite' outlook that makes them reluctant to pay for a tier jump."},{"n":"Terry McLaurin","p":"WR","t":"Washington Commanders","s":"mixed","o":"A pound-the-table value at a depressed price. When on the field he commanded a 31% target share and 46% of the air yards, with 55% of his targets producing a first down or touchdown (third in the NFL). A new playcaller from the Ben Johnson tree should unlock motion, pre-snap and play-action looks plus more intermediate crossers, a big change from a hitch-heavy, static role. With Jayden Daniels healthy in year three, the projection (around 949 yards) tops players going rounds earlier. The meatballers highlight tremendous volume upside — Washington's new additions do not come close to replacing the 171 targets left behind by Zach Ertz and Deebo Samuel, funneling even more work to McLaurin."},{"n":"A.J. Barner","p":"TE","t":"Seattle Seahawks","s":"pos","o":"Meatballparm's favorite true TE sleeper with low-end TE1 upside — he played 90-95% of snaps in the biggest games (conference title and Super Bowl), an elite blocker growing as a receiver on a heavy 12/21-personnel team (only 42% three-WR sets). Scored five of six touchdowns in the red zone, the No. 2 pass-catcher job is wide open, and the new OC comes from a tight-end-friendly San Francisco tree."},{"n":"Parker Washington","p":"WR","t":"Jacksonville Jaguars","s":"pos","o":"A breakout sleeper — rankers argue he's the real Jaguars WR1, well ahead of Jakobi Meyers and Brian Thomas. Trevor Lawrence favors first reads and short-intermediate slot work, which is exactly Washington's game ('he has Lawrence's eyes,' a Tyler Lockett-to-Russell-Wilson style fit). He had a mini-breakout late in 2025: 26 catches over the last four games, 100-plus yards in three of four, a touchdown in three of four, and double-digit targets in three of four. OTA buzz is already building — great value around WR34 with room to outperform. The meatballers think he might be the most talented receiver on Jacksonville (he looked like a star down the stretch), but they cannot buy in yet: the offense looks built to push receivers off the field (a Jakobi Meyers extension, a Brian Thomas emphasis, Travis Hunter), so regression or even getting buried is on the table. A nervous hold. The meatballers are talking themselves into him — an 'Amon-Ra-light' profile if last year was real, and he was a genuinely good prospect. The meatballers are bullish and keep it simple: Liam Cohen found something that worked late last year and will keep doing it. Washington put up top-5 WR numbers over the final four-to-five games as Trevor Lawrence got comfortable, an extension is reportedly coming, and at a sixth-round price they think there is far too much skepticism baked in."},{"n":"Justin Herbert","p":"QB","t":"LA Chargers","s":"mixed","o":"Polarizing — ECR QB7 with a wide QB6-to-QB14 range. Bulls (QB6) point to 24 points a game in five games with a healthy Joe Alt (versus 16.2 in the 12 without), four boom weeks (tied with Josh Allen), Mike McDaniel arriving, and a finally-healthy line plus David Njoku. Bears see a Baker-Mayfield-style risk — he needs the career-high rushing to carry over, and the Chargers and Dolphins are low-pace, two-tight-end heavy. He's finished outside the top-12 quarterbacks in two of his last four seasons, so buying at QB6 means buying all the risk. The meatballers love the Mike McDaniel hire (he turned Tua into a fantasy asset) and the motion-heavy scheme, but caution you are paying a 'Mike McDaniel tax' — the ceiling is huge, yet you are projecting an efficiency jump on lower volume. A boom bet where Ladd McConkey and Quentin Johnston need to click."},{"n":"Caleb Douglas","p":"WR","t":"Miami Dolphins","s":"pos","o":"A deep dynasty/redraft dart who's badly buried in ADP. A freakish athlete (6'3, 200+, 95th-percentile speed) the Dolphins invested in. His only real knock is consistency and not playing to his listed weight, both fixable. With only Tolbert, Malik Washington, and Tutu Atwell around (and questions on Bell's Week 1 status), Douglas has an inside track to an outside-WR starting role. No reason he should be undrafted."},{"n":"Joe Burrow","p":"QB","t":"Cincinnati Bengals","s":"mixed","o":"Carries one of the highest point-per-game projections at the position, purely a health bet. If he stays upright with Chase and Higgins around him, an improved defense and a settled offensive line set up a possible 4,500-yard season and a return to top-five fantasy QB form. Five of his final six starts last year finished as QB11 or better. The meatballers rate him the rare non-runner good enough for the mid-QB1 tier — an elite passer with Chase and Higgins whose touchdown rate they do not even regress to league average. The one nitpick is a slightly lower ceiling (no rushing) and the small risk Cincinnati finally runs more, which would hit him harder than the dual threats. The dynasty case from the meatballers: nobody healthy gives you a higher floor. Nothing has changed in Cincinnati — the defense is still bad and the offense is still good — so the volume is baked in. The extensive injury history is the only thing keeping him out of the very top tier."},{"n":"Jahmyr Gibbs","p":"RB","t":"Detroit Lions","s":"pos","o":"Co-1.01 in a true toss-up with Bijan Robinson; the lean to him rests on trusting Detroit's infrastructure. Drew Petzing takes over playcalling, and when the staff fed Gibbs more last year he jumped roughly seven targets per game while holding around 14 carries, even with David Montgomery still around. With Montgomery now traded and only Isiah Pacheco added behind him, career-high touches are in range. The meatballers call him the 1.01 — and think he could flat-out crush fantasy football this year now that David Montgomery is out of the Detroit backfield."},{"n":"Bijan Robinson","p":"RB","t":"Atlanta Falcons","s":"pos","o":"A pick-1-tier RB, the bell-cow benchmark (feed that guy and you win with him) alongside CMC, Henry, Saquon. Wouldn't be passed for Bowers at the 1-2 turn. Tyler Allgeier plays clear second fiddle (8 TDs as the backup, which limits Bijan's goal-line monopoly slightly but not his workload). An elite RB1 lock; deserves the top pick."},{"n":"Chase Brown","p":"RB","t":"Cincinnati Bengals","s":"pos","o":"Potential top-5 ceiling and a hero-RB favorite for WR-heavy drafters. From Week 7 on (with a healthy Burrow) he was RB7 in ppg and RB5 in expected points, a three-down workhorse in Zac Taylor's McVay-tree scheme. RB3 weeks 13-17 (about 20 half-PPR ppg) when it mattered. Only Samaje Perine competes for touches. A contract-year, day-3 pick who's improved every season; comp to the Kyren Williams McVay-system-gem arc. Undervalued at RB12."},{"n":"Trey Sermon","p":"RB","t":"New England Patriots","s":"mixed","o":"A polarizing tier-4 back. He flashed explosiveness in spurts last year, but rankers are split on whether anything changes: the Patriots want to be a boring, run-Rhamondre-Stevenson-a-lot, defense-first team. The talent is there; the projected role and committee usage are the question marks."},{"n":"David Montgomery","p":"RB","t":"Houston Texans","s":"mixed","o":"A massive best-ball value: RB20 in best ball, RB24 in ECR, and people have forgotten what Joe Mixon did in this exact Ben Johnson-style offense. Was awesome in Detroit (12th in YAC/attempt, 22nd in YPRR, 12th in first downs per route run), beat Woody Marks on every per-touch efficiency metric AND as a pass protector, and should shove Marks into a clear change-of-pace role. Drafters gravitate to sexier younger names, pushing Montgomery down; that's the value. A floor-plus-volume RB2 at an RB3 cost."},{"n":"Jaylen Warren","p":"RB","t":"Pittsburgh Steelers","s":"mixed","o":"The Steelers backfield muddle: some are stay-the-hell-away, others see value. The Warren case: Aaron Rodgers (or whoever) won't stand in the pocket and take hits, so he needs a back who can block AND be a safety-valve pass-catcher, and that's Warren (2.6 catches/game career, 1.41 YPRR) not Rico Dowdle (1.4 catches/game). Steelers RBs got 25.4% of team targets last year (2nd only to SF/CMC). But Mike McCarthy's committee history and the Dowdle/Kenneth Gainwell-type vultures cap it. A late-6th-round price for hidden upside if he wins the passing-down role. The meatballers note he would historically be a pure PPR-merchant, but because he can also handle 10-14 carries when needed he is a genuinely relevant back, not just a receiving specialist."},{"n":"Rico Dowdle","p":"RB","t":"Pittsburgh Steelers","s":"mixed","o":"A talent some are investing in, but the Steelers backfield role is the question: Dowdle's a week-winner type, but the worry is he won't get the passing-game work (only 1.4 career catches/game vs Jaylen Warren's 2.6). If Aaron Rodgers stays check-down-Charlie, the receiving back has real value, and that may not be Dowdle. The flip side: if Dowdle gets the goal-line/early-down touches and TDs, he's the upside play. Team-Rico vs team-Warren vs stay-away, a genuine three-way muddle."},{"n":"Tutu Atwell","p":"WR","t":"Carolina Panthers","s":"pos","o":"Terrace Marshall, and one of the meatballers has him as a fantasy WR1 (WR12), well above the WR15 consensus. Was WR16 PPR as a rookie with about 1,014 yards on a 25% target share, the featured guy from day one. The Panthers skipped TE/WR in the draft (only added vertical-stretcher Chris Brazell), so his target load is safe. A back-end WR1 / high-end WR2. His ceiling is capped by Bryce Young's low passing volume; Carolina plays balanced, conservative, low-total games."},{"n":"Travis Kelce","p":"TE","t":"Kansas City Chiefs","s":"mixed","o":"Farewell-tour territory at 35-36, used as the historical was-he-worth-a-first-round-pick comp for how good a TE can be, but the present-day read is age-driven decline. The Chiefs' thin reliable-target situation (Rice suspension risk, Worthy never 100% last year after the Kelce friendly-fire collision) means Kelce still ends up around the ball enough for TE1 weeks. A late-round TE only; the volume's there but the juice is fading. The meatballers are nudging him down the board: married life aside, it is genuinely hard to know what to expect at this stage, and they are not paying up to find out."},{"n":"Jahan Dotson","p":"WR","t":"Washington Commanders","s":"mixed","o":"A bounce-back dart if healthy, as a clearer secondary target for Jayden Daniels behind Terry McLaurin. His rookie-year flashes suggest upside, but he's behind McLaurin and third-round rookie Antonio Williams in the pecking order."},{"n":"Brock Bowers","p":"TE","t":"Las Vegas Raiders","s":"pos","o":"The TE to pay up for, willing to take him over Trey McBride as TE1. The track record: as a rookie he produced with Gardner Minshew/Aidan O'Connell/Desmond Ridder (Raiders QBs had an 82.4 collective rating, 92.9 when throwing to Bowers, 10+ points higher). Last year a Week 1 PCL sprain plus bone bruise wrecked his season and he STILL produced. The setup is great in 2026: a clear alpha with no target competition (the Raiders' next-best receiver is Nailor/Tucker/Bech). Lock him in early. Buy over McBride. The meatballers call him the 'JSN of the Raiders' — the tight end who gets the true target-hog treatment in Klint Kubiak's system; the only caveat is that defenses now know it is coming."},{"n":"Tony Pollard","p":"RB","t":"Tennessee Titans","s":"mixed","o":"An underrated RB value: going RB31 (lowest of the board) in best ball and ECR but should be a clear RB2. Tennessee has been a one-back team for years (Pollard owns this backfield) and he wasn't washed last year: 22nd in YAC/attempt among 49 qualifying backs, 13th in yards-before-contact even without a competent passing game. If the Titans improve on offense, he could crack top-10 in that metric and the holes open up. Don't understand why he's not an RB2 in rankings. Buy the discount."},{"n":"Rhamondre Stevenson","p":"RB","t":"New England Patriots","s":"mixed","o":"A contrarian buy: the market is fading him (going around 2 rounds after TreVeyon Henderson) and down-weighting the Patriots' playoff push and improved situation. Normally you chase the ascending year-2 back, but the value has flipped to Stevenson here. A solid pick as the cheaper of the New England backfield. The meatballers call him the better value of the New England committee early: safer in pass protection, and with a tougher Patriots schedule and more negative game scripts, they expect the team to lean on him to open the season even as TreVeyon Henderson pushes for the job."},{"n":"JaMycal Hasty","p":"RB","t":"Jacksonville Jaguars","s":"mixed","o":"A polarizing depth back debated against Bhayshul Tuten at RB25-26. A passing-down/change-of-pace option in the Jacksonville committee. Low standalone value unless an injury opens the role."},{"n":"Kyle Monangai","p":"RB","t":"Chicago Bears","s":"pos","o":"Ben Johnson liked this 7th-round rookie enough to give him 169 carries last year, and Johnson loves to run (Bears 22nd in pass rate over expected, 11th-highest run-play rate). Appropriately priced, maybe a tad overpriced; the bigger value is D'Andre Swift, who Monangai couldn't displace (Swift was RB16 in PPG even after Monangai's week-9 emergence, and bested him in every per-touch metric). A fine mid-round flier; the backfield is Swift-led. The meatballers like him as a cheap Chicago-backfield stash — a back who should carve out real work with genuine contingency upside if the situation opens up."},{"n":"Taysom Hill","p":"QB","t":"New Orleans Saints","s":"mixed","o":"The Saints have built around him: added Jordan Tyson and Travis Etienne to make it a more complete offense, and he's now preparing a full offseason as the established starter (vs not starting the full season before). Kellen Moore's volume-pushing scheme helps. The dual-threat usage pays off in best-ball with weekly spike potential. A late-round dart with a real role now that the supporting cast improved."},{"n":"Jalen Coker","p":"WR","t":"Carolina Panthers","s":"mixed","o":"A best-ball/dynasty flier. Looked like the true No. 2 late in 2025 but has played only 11 games in each of his first two seasons (a recurring quad). The Panthers added a rookie WR (Brazzell) behind a clear No. 1 in McMillan, plus Legette and Metchie, so it's crowded. Boggs is out on availability concerns; upside exists if he can stay on the field. The meatballers admit a blind spot but stay out — too boom-bust to trust even as a WR3, with big games too few and far between despite Carolina paying him (around WR55)."},{"n":"Jakobi Meyers","p":"WR","t":"Jacksonville Jaguars","s":"mixed","o":"A steady veteran slot who got paid by Jacksonville; his superpower is catching the football. Out-snapped Parker Washington badly after the trade. The Jags are expected to run heavy 13-personnel (two rookie TEs plus Engram), which caps the WR room. A reliable producer, not a difference-maker; he and Parker Washington limit each other. A meatballers value pick — the safest, cheapest Jacksonville piece (around WR42): his superpower is not dropping the ball, he has Trevor Lawrence's trust, and his 6-7 targets a game are not much affected by Brian Thomas Jr., Parker Washington or Travis Hunter."},{"n":"Fernando Mendoza","p":"QB","t":"Las Vegas Raiders","s":"mixed","o":"The Raiders' #1 overall pick; the panel's split: one read has gone on record that Mendoza starts Week 1 (the last #1-overall QB to not start Week 1 was Baker Mayfield in 2018), while others think Clint Kubiak rolls with Kirk Cousins early. Either way he's the future, and a Mendoza-led offense supports Brock Bowers' big season. A deep dynasty stash; not a redraft fantasy QB until the job's clearly his. A meatballers favorite prospect: the football intelligence, character and pinpoint accuracy point to a smooth NFL transition. They expect a genuinely high floor — at minimum a league-average starter for a long time — even while acknowledging you cannot fully price a floor before he takes an NFL snap."},{"n":"Drew Allar","p":"QB","t":"Pittsburgh Steelers","s":"neg","o":"Steelers Round 3. Elite tools and size (6'5'') but maddening decision-making at Penn State: pick the right play and you see Drake Maye, pick the wrong one and it's Tim Tebow. Buried behind Aaron Rodgers (if he returns), Mason Rudolph and Will Howard. Needs to sit while McCarthy fixes the footwork and processing. A two-year project / flyer-of-a-flyer."},{"n":"Cole Payton","p":"QB","t":"Philadelphia Eagles","s":"mixed","o":"Eagles Round 5 (#178), North Dakota State, the same QB pipeline as Carson Wentz. A lefty with size, speed and rushing equity who completed 72% in 2025. Pushed back hard on the Tim Tebow comps (way better arm talent). QB4 now behind Hurts, Dalton and McKee; Dalton and McKee are free agents after the year, so he could be the clear QB2 by 2027."},{"n":"Nick Singleton","p":"RB","t":"Tennessee Titans","s":"mixed","o":"Titans Round 5 (#165), Penn State. A one-cut, Tevin-Coleman-style runner with receiving chops that fit Brian Daboll's scheme (Daboll forced Tyrone Tracy int
