o a big role with the Giants). Pollard and Spears are both free agents after 2026, so there's a clearer path in 2027. RB2 ceiling if a lane opens, especially if the injury-prone Spears goes down."},{"n":"Seth McGowan","p":"RB","t":"Indianapolis Colts","s":"mixed","o":"Colts Round 7 (#237), Kentucky. The meatballers' pick as the automatic RB2 in Indy: DJ Giddens did nothing as a rookie and McGowan could hop him as the Jonathan Taylor handcuff. Taylor's health history makes that cuff valuable."},{"n":"Bryce Lance","p":"WR","t":"New Orleans Saints","s":"mixed","o":"Saints Round 4 (#136), North Dakota State, Trey Lance's brother. Part of the Kellen Moore weapons build alongside Jordyn Tyson and Travis Etienne. Scouting note: the more the meatballers watch Bryce Lance tape, the more they like him. Long-term dynasty value; not an immediate redraft need."},{"n":"Kevin Coleman Jr.","p":"WR","t":"Miami Dolphins","s":"pos","o":"Dolphins Round 5 (#177), Missouri. The meatballers' sleeper to win a starting slot role over Tolbert/Washington by Week 1. Plays bigger than his 179 lbs, with a 99th-percentile college target share and a strong contested-catch rate. Comp: the Jayden Reed of South Beach. 4.49 speed with some verticality."},{"n":"Jonah Coleman","p":"RB","t":"Denver Broncos","s":"mixed","o":"Sean Payton's added pass-catching back behind Dobbins: drafted in the 4th round, and Payton's history is to spread work to multiple backs. The real value: if (when) Dobbins gets hurt, Coleman is the capable pass-catcher who takes over passing downs, not R.J. Harvey. Could even make it a three-way timeshare. A strong handcuff with standalone pass-game value; a better contingency bet than Harvey at a similar cost. One meatballer's highest-drafted late-round back: a young, pass-pro-capable pounder in a good offense who should carve out work — exactly the round-15 rookie dart they love, even if he lacks breakaway speed."},{"n":"Kaytron Allen","p":"RB","t":"Washington Commanders","s":"mixed","o":"A rookie (Penn State) the meatballers like: the #2 graded college rusher last year behind only Jeremiah Love, and a better receiver than Croskey-Merritt. Could carve out the early-down/red-zone work in a wide-open committee. The Chris-Rodriguez-style efficient gap-runner archetype. Touch distribution is the question on a crowded depth chart. The meatballers like the pro-ready bruiser: a physical between-the-tackles back who posted a career-best 6.1 yards per touch against loaded boxes once Drew Allar went down at Penn State. He is the cheapest of the Washington backfield and profiles as the Chris Rodriguez-style early-down and goal-line piece."},{"n":"Mike Washington Jr.","p":"RB","t":"Las Vegas Raiders","s":"mixed","o":"Raiders Round 4 (#122), Arkansas. Blazing 4.33 speed at 223 lbs; 1,070 yds, 8 TDs, 6.4 YPC in 2025. The automatic RB2 behind Ashton Jeanty in Kubiak's run-heavy scheme on a rebuilding team, so he could see 100-120 carries. Flex/handcuff value, a league-winner if Jeanty gets hurt. Must cut the fumbles (10 in college)."},{"n":"Keon Coleman","p":"WR","t":"Buffalo Bills","s":"mixed","o":"A year-3 breakout bet and one of the best late-round clicks (going round 18-20 in best ball). Just-missed-R1 draft capital and the big-bodied profile that often pops in year three. Even as a bust floor, there's a Gabe-Davis-2.0 path to 8-12 TDs purely from playing with Josh Allen. DJ Moore's arrival should let Buffalo pin Keon to the boundary and ask less of him. Cheap upside. The meatballers are cautious — an early-second-round pick now going around WR86 who has not lived up to his draft slot; the 'is it over?' question is fair even if the talent leaves a crack of hope."},{"n":"Malik Washington","p":"WR","t":"Miami Dolphins","s":"mixed","o":"Took over the WR1 role in Miami's gutted room after Tyreek Hill (released) and Jaylen Waddle (traded to Denver) left. Bobby Slowik (now OC) knows him best, giving him a leg up. But the Dolphins are rebuilding with Malik Willis at QB and a throw-six-darts-hit-one receiver room (Tutu Atwell, Tolbert, rookies Caleb Douglas/Chris Bell/Kevin Coleman Jr.). Near-line-of-scrimmage usage caps the ceiling; around 30% odds he even leads the team in targets. The meatballers liked him as a prospect and stay interested in the NFL player, though they temper it — probably not a fantasy home run, more a name to monitor."},{"n":"Geno Smith","p":"QB","t":"New York Jets","s":"mixed","o":"Reunites with the Lions tree (new OC Frank Reich, HC Aaron Glenn) as the Jets' Week 1 starter. Two years ago in Seattle he supported multiple elite weapons; last year in Vegas was a mess behind a broken line. A bad defense plus talented young pass-catchers (Garrett Wilson, rookies) equals a slim but real top-10/12 QB path on volume. A serviceable veteran, an at-least-it-won't-go-completely-wrong bridge, until rookie Cade Klubnik looms."},{"n":"Romeo Doubs","p":"WR","t":"New England Patriots","s":"mixed","o":"Signed in NE and briefly hyped as the WR1, but the A.J. Brown trade pushes him back into the boom/bust flex role he had in Green Bay, useful as a blocker and versatile piece, better as a secondary option than a true No. 1. Will find the end zone in spurts; not a week-to-week start. Brown projects as the alpha and Doubs as the complement."},{"n":"Mason Taylor","p":"TE","t":"New York Jets","s":"mixed","o":"A solid rookie and arguably the best blocker of this group with reliable hands, but a low receiving ceiling (Dalton Schultz level) and now stuck behind a first-round rookie TE. An extremely replaceable talent who hangs around; annoying if the rookie is merely a Noah Fant, a non-factor if the rookie is a Vernon Davis."},{"n":"Hunter Henry","p":"TE","t":"New England Patriots","s":"mixed","o":"Late-round TE value (around pick 155). Back-to-back top-12 TE seasons; 6th in the league in red-zone targets last year (where TE points come from). Romeo Doubs in and A.J. Brown expected post-June 1 could push him to 3rd in targets, but the sticky red-zone role keeps his floor. Rookie Eli Raridon is the heir, not a Year-1 threat; year-one TEs rarely hit."},{"n":"C.J. Stroud","p":"QB","t":"Houston Texans","s":"pos","o":"A hot-start target. A cake early schedule: Buffalo in Week 1 is the toughest matchup, then Cincinnati (7th-most pts to QBs), Indianapolis and Dallas (most pts to QBs of any defense). Year two in the Nick Caley system gives continuity. An improved O-line (Braden Smith, Wyatt Teller, a rookie), David Montgomery added at RB, Nico Collins and the WR room healthier, Tank Dell possibly back. 2025 wasn't as bad as perceived: 18.6 ppg excluding the game he left injured. An ideal early plug-and-play QB while you wait on a higher-ceiling option. The meatballers are buying the rebound: last year got away from him behind a bad offensive line where he took too many hits and tried to do too much. With the line finally addressed, David Montgomery added, Tank Dell back and Jayden Higgins developing — and still just 24 — they expect a real step up. The one catch: an elite defense and a run game could cap how much he has to throw."},{"n":"Wan'Dale Robinson","p":"WR","t":"Tennessee Titans","s":"mixed","o":"A prime vet on a new team: he followed OC Brian Daboll from the Giants to Tennessee on a 4yr/$78M deal, coming off his first 1,000-yard season. The asterisk of the prime-vets tier since he keeps his same scheme/play-caller. A legit concern about whether a 5-foot-8 underneath target sustains that volume in a new offense, but the investment and Daboll connection give him a clear role right away. The meatballers say there is no receiver going this late they would rather have — a sure-handed target reuniting with Brian Daboll in Tennessee, coming off back-to-back 90-catch seasons, and especially valuable early while rookie Carnell Tate acclimates (WR46, Round 8)."},{"n":"Oscar Delp","p":"TE","t":"New Orleans Saints","s":"pos","o":"The Saints' third-round TE (Georgia) and part of the leaguewide move-TE wave, drafted for deep-threat and seam upside out of the tight end spot. A deep-dynasty flier; not a 2026 factor, but the usage intent is notable."},{"n":"Trevor Etienne","p":"RB","t":"Carolina Panthers","s":"neg","o":"The drumbeat for him is coming only from fantasy/dynasty Twitter, not from Carolina, a 6% snap share last year and viewed mostly as a special-teamer. Not in the real Brooks-vs-Hubbard conversation."},{"n":"LeQuint Allen","p":"RB","t":"Jacksonville Jaguars","s":"pos","o":"Locks up the Jaguars' passing-down role, a prolific college receiver (64 catches his final Syracuse year) and an excellent pass protector (61 pass-pro snaps, zero sacks, three pressures in 2025). His presence is part of what squeezes Bhayshul Tuten's high-value-touch ceiling. The meatballers keep him on the deep-sleeper and dynasty radar as the passing-down piece of a Jacksonville backfield with almost no invested capital, where anything can happen."},{"n":"Sean Tucker","p":"RB","t":"Tampa Bay Buccaneers","s":"pos","o":"The forgotten Bucs backfield piece. At 215+ lbs, he's the size profile that could absorb goal-line work when Bucky can't punch it in from short, a third in line if Bucky misses time and Gainwell handles passing downs. Caps the upside of both Gainwell as a handcuff and any deep-league dart on the third Tampa back."},{"n":"Ray Davis","p":"RB","t":"Buffalo Bills","s":"pos","o":"Behind Breece Hall and Braelon Allen in the Jets backfield. Aaron Glenn's three-headed-monster quote is classic coach-speak; the meatballers didn't move anything on Hall because of it. Davis stays a deep-dynasty stash only."},{"n":"Jacory Croskey-Merritt","p":"RB","t":"Washington Commanders","s":"mixed","o":"Bill, the most explosive back in Washington, with surprisingly good vision/patience for the complicated Kingsbury scheme and long, wide-stance strides that chew up ground (but limit sudden cuts). No receiving proof of concept (just 9 catches), and 4 fumbles. A true committee with Rachaad White, but he's better than where he was drafted and a fine value at this cost; the meatballers say draft both Commanders backs. The meatballers like the post-hype angle in Washington: he led the backfield in touches, scrimmage yards and touchdowns as a seventh-round rookie and paced the NFL in yards per carry on outside zone (7.6). Four fumbles and fading late-season usage are the worry, and Rachaad White likely opens as the passing-down starter, but this dirt-cheap backfield could hand him real flex value. One counter the meatballers keep in mind: he might lead this Washington backfield in raw touches yet finish third in fantasy points, since the high-leverage work (passing downs to Rachaad White, goal line to Kaytron Allen) may go elsewhere. A lot of low-calorie carries."},{"n":"Aaron Jones","p":"RB","t":"Minnesota Vikings","s":"neg","o":"A capital-V veteran whose tank may be empty: graded among the worst (tied with the dead-last Chris Rodriguez in elusive rating last year), and a lot of people wonder if he's cooked. The Packers backfield is muddled (Jordan Mason the efficient early-down journeyman, rookie speed behind him). Jones is a fade unless you're desperate; his role is vulnerable to both Mason and a younger back. Avoid at cost. The meatballers are out: he fell off a cliff on 150 touches last year with poor underlying metrics, is back on a smaller contract, and looks headed for an Alvin Kamara-style passing-down role while Jordan Mason grinds the early downs. A summer fade."},{"n":"Jordan Mason","p":"RB","t":"Minnesota Vikings","s":"neg","o":"The efficient early-down journeyman in the Packers/49ers-type committee: incredibly efficient on early downs but not a pass-catcher, which caps his ceiling. Useful when called upon but a capital-J journeyman. The handcuff math points to the younger speed back (needing an Aaron Jones-type injury) for upside. A depth/bye-week piece; not a target unless the room thins. The meatballers are buying: per a Matthew Coller report he is set to be the Vikings' early-down RB1 with Aaron Jones fading and limited, and his efficiency (top-12 in yards per carry, top-10 in yards after contact) plus an outside-zone lean and a potentially strong line give him a real 1,000-yard, 10-touchdown path. They rank him ahead of Aaron Jones."},{"n":"Kirk Cousins","p":"QB","t":"Las Vegas Raiders","s":"mixed","o":"Still on the Falcons as the TE-friendly insurance behind Penix (note: this transcript predates clarity on the Falcons QB room). The relevant fantasy point: Cousins throws a guaranteed around-30% target clip to TEs, which is the lever for Kyle Pitts' upside in any games Cousins starts. Not a fantasy QB target himself; matters as a Pitts/London multiplier."},{"n":"Tua Tagovailoa","p":"QB","t":"Atlanta Falcons","s":"mixed","o":"Signed on a minimum deal after his Miami release and likely the early Atlanta starter while Michael Penix Jr. recovers from a torn ACL (a 9-12 month timeline). Steady when healthy in a Kevin Stefanski offense with Drake London and Bijan, a streamer with a stable floor if he holds the job."},{"n":"Daniel Jones","p":"QB","t":"Indianapolis Colts","s":"mixed","o":"The Colts expect him ready Week 1 and built around him; Shane Steichen wants an extension-of-himself QB (think Brock Purdy to Shanahan) and Jones fits better than Richardson did. Even a middling passing offense clears about 3,000+ yards, and Jones' rushing plus a strong run game give him streamer-plus appeal. The meatballers flag him as one of the best quarterback values out there (going after Baker Mayfield around QB22): the Indianapolis offense was high-powered when he played last year, and with Tyler Warren and a healthy Alec Pierce, they think that if he puts it together again he is a real streaming-plus asset."},{"n":"Juwan Jennings","p":"WR","t":"Minnesota Vikings","s":"mixed","o":"Likely gone / squeezed out in SF: every report is about Mike Evans, and the room (Evans, Pearsall, CMC, Kittle, rookie Stribling) is crowded. He was last year's surprise beneficiary in a CMC/Kittle-fueled year, but the bar to repeat is high with Evans added. Off the redraft radar; project a depth role wherever he ends up."},{"n":"Adam Randall","p":"RB","t":"Baltimore Ravens","s":"pos","o":"A 6'3/235 converted-WR rookie with off-the-charts speed but little vision, a battering ram who can rip off long plays if he breaks loose. The piece you'd want to hold as the Derrick Henry handcuff, though Baltimore would likely also explore the trade/free-agent market (a Najee Harris type) if Henry went down."},{"n":"Cole Kmet","p":"TE","t":"Chicago Bears","s":"mixed","o":"A tier 2 TE on the list but the read is the Bears are funneling targets to Loveland (the second-highest-scoring TE down the stretch as a rookie). Kmet is the secondary option; a usable bye-week TE in deep leagues but not a target."},{"n":"Chris Bell","p":"WR","t":"Miami Dolphins","s":"pos","o":"A Texans rookie WR being highlighted as the second-highest-drafted Houston WR option (around WR92). The Houston WR room behind Nico Collins is essentially empty; Malik Washington and Bell are the only names. A deep dart if Texans pass-game opportunity opens up."},{"n":"Jared Goff","p":"QB","t":"Detroit Lions","s":"pos","o":"A reliable upside QB2 with a fantastic skill group (St. Brown, Gibbs, Williams, LaPorta) and a new playcaller installing a fresh version of the offense. The line is closer to average than its elite peak, but on any given week Detroit can be projected for 30-plus at home, which puts Goff in streaming-as-a-QB8 range in good spots. A 'statue' who gives you nothing on the ground, but the meatballers call him the safest QB2-range pick — 17-19 fantasy points per game three years running with a loaded Detroit receiver room."},{"n":"Baker Mayfield","p":"QB","t":"Tampa Bay Buccaneers","s":"mixed","o":"Three straight top-12 fantasy QB seasons, going as QB21. Zac Robinson in as OC with a built-in rapport from their Rams days, and Robinson was third in motion rate in Atlanta (motion boosts efficiency around 17%). Mike Evans moving on but Egbuka and a healthier Godwin/McMillan remain. Started using his legs again in his 30s, raising floor and ceiling. Wait-on-QB drafters can land a likely season-ending QB1 at a steep discount."},{"n":"Isiah Pacheco","p":"RB","t":"Detroit Lions","s":"mixed","o":"Signed in Detroit as the clear RB2 behind Jahmyr Gibbs after David Montgomery was traded to Houston; an angry, physical runner whose explosiveness was sapped by injuries the last two years (a broken fibula and missed time). Standalone flex value is thin, but he's a valuable Gibbs handcuff in an elite offense if he's healthy. A meatballers fade — a former 'Pacheco truther' is now off him, arguing he is not close to David Montgomery and will not approach Montgomery's touch total in that backfield."},{"n":"Brian Robinson Jr.","p":"RB","t":"Atlanta Falcons","s":"neg","o":"A super JAG, referenced as the back Chris Rodriguez couldn't even beat out until Robinson got cut from Washington. The read is the same on both: uninspiring just-a-guy grinders you're waiting to see replaced. Wherever he lands, low-ceiling depth. Fade unless injury thrusts him into clear volume."},{"n":"Odell Beckham Jr.","p":"WR","t":"New York Giants","s":"neg","o":"A Giants signing tagged the mediocre signing of the week. OBJ has been mediocre for a long time, part of a sad pile of vet WR additions (with Berrios, JuJu, Mooney) that worsen the Nabers vibes."},{"n":"Chris Rodriguez","p":"RB","t":"Jacksonville Jaguars","s":"neutral","o":"Underwhelming, a JAG (just-a-guy) who graded as a bottom-10 rusher last year, dead last in elusive rating (tied with washed Aaron Jones). He grinds between the tackles with a high success rate and some goal-line work, but that's the ceiling. He was a complete afterthought until Brian Robinson got cut. The Liam Coen coaching connection is real but overblown; Tuten did everything Rodriguez does, better, against a tougher backfield last year. Fade; he's the reason to be slightly cautious on Tuten's volume, nothing more. On the summer pods the meatballers pegged him as a sneaky committee value in Jacksonville: a Liam Cohen thumper built for the goal-line and short-yardage work (among the NFL's best in EPA per carry inside five yards to go), with Bhayshul Tuten handling the passing-down and explosive touches. A left-foot procedure cost him the spring, but he is expected full-go by camp and his ADP has quietly slid toward RB42."},{"n":"Michael Penix Jr.","p":"QB","t":"Atlanta Falcons","s":"neg","o":"The QB film didn't hold up; a takeaway from the offseason watch-throughs was they didn't remember how freaking bad Penix was. He's the swing factor for the whole Atlanta passing game: when Kirk Cousins played the first around 11 weeks, Kyle Pitts was the TE21 averaging 7.3 PPG; the Pitts/London ceiling depends on whether Penix (or Tua-level QB play) can support them. Stylistically there's a case he features Pitts, but the tape is a real concern. Fade as a fantasy QB; his development caps the entire Falcons skill group."},{"n":"Adonai Mitchell","p":"WR","t":"New York Jets","s":"pos","o":"A deep Jets playmaker with a loud breakout drumbeat. Reportedly has a strong connection with Geno Smith, who lives on downfield chances, and Mitchell is the X-receiver clearing out deep with speed, acceleration, ball skills and quickness. With Garrett Wilson as the alpha and a young, improving offensive line, Mitchell could be the field-stretcher that unlocks the whole offense. A real playmaker who finally has a QB to unlock him. The meatballers land in the middle on the Jets' X-receiver — a 'new Darius Slayton' whose separation reputation is a bit overrated (solid vs man, a poor zone-beater), but with speed and ball skills he could be a deep-clearing complement to Garrett Wilson if a quarterback finally unlocks him."},{"n":"Brandon Aiyuk","p":"WR","t":"San Francisco 49ers","s":"mixed","o":"Pat is drafting him as a late upside dart. The market prices in around 80% he does not play; Pat thinks it is closer to 50-50. The 49ers hanging onto him (rather than releasing) for trade value suggests the talent is intact. A pure expected-value swing. The meatballers are staying away: the offseason has been all red flags, odd social-media behavior, a reported falling-out with Jayden Daniels, and no signs of reporting, with inertia pointing toward him not playing. Too much risk of a zero; they would rather take late-round rookies or a Deebo Samuel."},{"n":"Treveyon Henderson","p":"RB","t":"New England Patriots","s":"mixed","o":"A Raheem Mostert comp who wins every race once he has space: 4 TD runs of 50+ (most by a rookie since Saquon in 2018). But the pass-pro was shockingly bad for a 200-lber, and he pinballs on contact rather than falling forward. Rhamondre Stevenson keeps the goal-line (12 of 16 inside-5 carries) and the passing-down edge. RB4 stuff when Rhamondre missed, and a much-improved OL helps. Real upside, real split-backfield caveat."},{"n":"Tre Harris","p":"WR","t":"LA Chargers","s":"pos","o":"Already in the Chargers note above; the meatballers are taking lots of him in best-ball as a free upside swing in a good offense. The Slater/Alt return creates a passing-game spike, and Lemon being out of OTAs opens his snaps. The kind of late dart that hits more often than the market expects."},{"n":"Jeremiyah Love","p":"RB","t":"Arizona Cardinals","s":"pos","o":"Top of the rookie-RB board (around RB13), a notch ahead of Kyren Williams, with premium draft capital in Arizona. Ranked a low-end RB1 by some despite a likely-bad Cardinals offense; the bull case is draft capital plus the history of early-drafted RBs hitting. Caveat: a crowded Arizona skill group (Harrison, McBride, Michael Wilson)."},{"n":"Tre Tucker","p":"WR","t":"Las Vegas Raiders","s":"pos","o":"An overlooked breakout candidate. The Raiders run a Kubiak / Shanahan-tree system that reliably elevates the quarterback a full level, whether it's Kirk Cousins or rookie Fernando Mendoza under center, and Tucker has the profile to ride that lift. The situation is right; he's the classic you-have-the-situation-now-get-the-player bet at a cheap price. The meatballers see an overlooked Raiders pass-catcher — a pint-sized, Tyreek-Hill-style playmaker entering his Year-3 window in a Klint Kubiak system that tends to elevate the quarterback. The caveat: the best Raiders receiver will be whoever builds chemistry with Kirk Cousins or rookie Fernando Mendoza, and Brock Bowers is the real target hog."},{"n":"Kayshon Boutte","p":"WR","t":"New England Patriots","s":"mixed","o":"Stuck down the New England depth chart, but proven to make big plays when deployed downfield; usable weeks here and there. If traded (a Washington/KC-type spot) his ADP would rise in around 90% of landing spots."},{"n":"Shedeur Sanders","p":"QB","t":"Cleveland Browns","s":"mixed","o":"Projects as a career backup: 37th of 37 qualifiers in EPA/dropback, 36th in success rate, underwhelming athleticism, and (once screens are removed) the lowest catchable-ball rate and highest interceptable-ball rate. Deshaun Watson runs away with the job. There's top-64 talent and he's clearly better than Dillon Gabriel, but the bail-out-of-the-pocket habit has to go before he's even a stable backup. A quiet offseason is a small plus."},{"n":"Jayden Higgins","p":"WR","t":"Houston Texans","s":"pos","o":"The quietest good rookie line in the class (68/525/6). Does more real-WR stuff than almost anyone: pacing, toe-drags, contested catches over the middle, a big frame off which uncoverable back-shoulder throws land. A locked-in WR2 behind Nico Collins with built-in contingent upside if the injury-prone Nico misses. CJ-Stroud-dependent, but the floor is real and the price is a steal; a team drafting him late round one wouldn't be shocking. The meatballers view him as cemented into the Texans' WR2 role after a strong finish, but temper it — a great Houston defense plus David Montgomery could shrink the passing volume, so they like him as a cheap depth play (around WR54) more than a weekly starter."},{"n":"Bryce Young","p":"QB","t":"Carolina Panthers","s":"neg","o":"The fixable-vs-not debate: you can read his tape as not-consistent/accurate-enough, or as there's-an-easy-fix if he gets on the same page with his young receivers. The receiver he was most out-of-sync with (DJ Moore) is gone, and those targets shift to improving young WRs (McMillan, Coker). McMillan's ceiling is genuinely capped by Young's limitations, and that's the live debate. A speculative QB; the Panthers offense lives or dies on the Year-3 leap. A meatballers caution: with a loaded 2027 quarterback class coming (Arch Manning, Dante Moore), he is a prime lame-duck-starter candidate. He has to prove it in 2026 or he is among the guys who get replaced by the new wave."},{"n":"D'Andre Swift","p":"RB","t":"Chicago Bears","s":"mixed","o":"Criminally underpriced: RB23/ECR 57, but he was RB16 in PPG even after Monangai's week-9 emergence and bested Monangai in every per-touch efficiency metric. Catches passes, runs behind a good O-line with Ben Johnson as the run-game mastermind, and the Bears project among league leaders in total RB output. It'll be a two-way backfield but Swift is the lead. Pat's pick as the RB2-of-values. Buy the discount."},{"n":"Woody Marks","p":"RB","t":"Houston Texans","s":"neutral","o":"Getting shoved into a clear change-of-pace role: David Montgomery beat him on every per-touch efficiency metric AND as a pass protector last year, and the read is Montgomery remains the every-down back. Marks is overdrafted relative to a backup-RB reality in the Texans backfield. Fade at current cost; he needs a Montgomery injury to matter."},{"n":"Isaac TeSlaa","p":"WR","t":"Detroit Lions","s":"neutral","o":"A freak athlete with a highlight reel of climb-the-ladder catches, learning a new outside role after playing big slot at Arkansas. But it's an around-5% target share on a stacked offense behind Jameson Williams and LaPorta; the explosive plays are fun, just not enough volume to matter unless someone ahead of him gets hurt. A deep dynasty flier the meatballers mostly joke about — but in touchdown-only formats they admit he could quietly produce."},{"n":"Pat Bryant","p":"WR","t":"Denver Broncos","s":"neutral","o":"A glue guy who graded best among these rookies in contested-catch conversion, Courtland Sutton's long-term replacement, and preferred to Troy Franklin for all-around play. Playing time is capped hard by Sutton and Jaylen Waddle; an immediate waiver add in deeper leagues if either misses time."},{"n":"Jalen Royals","p":"WR","t":"Kansas City Chiefs","s":"neutral","o":"Rashee Rice's likely direct backup (Rice is in jail and dealing with knee surgery, though reportedly almost out), which makes him immediately interesting on an offense with Mahomes. But his college profile was screens/crossers/go-balls only, and he's not as good on those staple routes as Rice; the meatballers are more tentative than the offseason hype."},{"n":"Jaylin Noel","p":"WR","t":"Houston Texans","s":"neutral","o":"A sleeper call worth knowing: reportedly the guy C.J. Stroud trusted when the Texans had WR injuries last year, and the staff thinks he outplayed both Christian Kirk and Jayden Higgins. With Houston's revamped O-line giving Stroud cleaner pockets, Noel has a real path to a meaningful role. Can play flanker. A late-round dart with sneaky target upside in a Texans offense that should throw plenty."},{"n":"Gunnar Helm","p":"TE","t":"Tennessee Titans","s":"mixed","o":"A deep dart whose case is pure opportunity: the other Titans TEs are just bodies (Bellinger, Granson), so his route rate could easily double from 38% and he should be a near-every-down player. A decent catch radius, limited YAC, not yet a real run blocker. The cap is the pecking order: likely 4th for targets behind Ridley, Wan'Dale Robinson, and Carnell Tate. Could finish TE16 like AJ Barner did, fitting, since he drafts right next to Barner."},{"n":"Mitchell Evans","p":"TE","t":"Carolina Panthers","s":"neutral","o":"A solid, competitive player clearly better than Ja'Tavion Sanders; could lead all Panthers TEs in snaps if Tommy Tremble misses time or he takes a step. Needs to fill out his frame and isn't a big-ceiling chase, but a name for the deepest dynasty leagues."},{"n":"Jackson Hawes","p":"TE","t":"Buffalo Bills","s":"neutral","o":"Effectively a sixth offensive lineman; once Buffalo drafted him they shifted from extra-OL sets to more two-TE looks. Not a target-share guy, but a few 30-yard darts from Josh Allen are on the menu, so a 5-TD season isn't out of the question."},{"n":"Mark Andrews","p":"TE","t":"Baltimore Ravens","s":"pos","o":"A punt-TE target if you wait: going ECR around 130 (rankers split from 104 to out-at-154). The bull case: in Lamar's seven full seasons as a starter, Ravens TEs have ranked 1st, 5th, 1st, 1st, 10th, 4th in team target share, and Andrews is the red-zone safety valve Lamar always finds, and he's younger than Kittle. The bear case: dead last in YAC per reception last year (an effort/juice concern, not a QB issue), the Ravens drafted WRs who profile as the new targets, and new OC Declan Doyle makes his role an unknown. A late-round TE only; the juice may be gone."},{"n":"Jake Ferguson","p":"TE","t":"Dallas Cowboys","s":"pos","o":"Reasons to avoid. A hot start last year (out-scoring every TE through week 7) then TE31 the rest of the way; a 59-catch, zero-TD 2024 shows the TD volatility. A poor blocker, and the staff likes blocker Brevyn Spann-Ford, so with Lamb, Pickens and a rising Flournoy he may not stay on the field in run sets. Underneath-only usage with no vertical juice."},{"n":"Brenton Strange","p":"TE","t":"Jacksonville Jaguars","s":"mixed","o":"Got paid: a 3-year extension, $25M guaranteed, up to $48M, which signals the Jaguars view him as a real piece (he and Parker Washington were the reported contract priorities). His weeks 12-18 stretch (after returning from injury) showed usable TE production. The cap on his ceiling is the crowded Jacksonville target tree (Meyers, BTJ, Hunter, Washington, plus a 2nd-round rookie TE). A late-round TE dart with a real role secured by the contract."},{"n":"Jonathan Brooks","p":"RB","t":"Carolina Panthers","s":"pos","o":"A bullish bounce-back bet: only 22, a 2nd-round pick by the same staff that believed in him, and they're giving him runway. The Panthers were rightly conservative not rushing him back in 2025 off the ACL (it'll be around 20 months post-injury by 2026). If he takes over the backfield he's a top-15 back; if he just plays the Chuba Hubbard role / becomes this year's Rico Dowdle, there's standalone value. The two ACLs scare the market away, which is exactly where the value lives. A high-upside late-round swing. The meatballers are tempted by the league-winning upside: more talent than the backs drafted around him (hands, lateral shiftiness, finishes through contact) and Carolina barely addressed the position behind him. The giant caveat is two ACL tears in the same knee, so treat it as a best-ball upside swing more than a weekly play, with Chuba Hubbard still in the way."},{"n":"Rashod Bateman","p":"WR","t":"Baltimore Ravens","s":"mixed","o":"Coming off a disappointing 2025 and not practicing (injury), now seemingly eclipsed by rookies in a jumbled room, fine to fade in managed leagues. But in round 20 of best ball, why not bet on a Gabe-Davis-type line (around 450 yards, 8 TDs), which is squarely what he can do."},{"n":"Mike Gesicki","p":"TE","t":"Cincinnati Bengals","s":"mixed","o":"A forgotten contingent-upside piece, barely drafted, often on dynasty waivers. With Noah Fant gone, the early-2024 thesis returns: an every-now-and-then slot player who becomes a true number-two with Higgins-like volume if Higgins or Chase misses time. The cap is Andrei Iosivas (blocking) keeping three true WRs on the field; a situational start, not a weekly one."},{"n":"Deshaun Watson","p":"QB","t":"Cleveland Browns","s":"mixed","o":"Likely the opening starter because Todd Monken's offense (think what he did with Lamar: air it out, win over the middle, create off-platform) fits Watson's peak skills. But it is a huge if after an Achilles tear, the off-field baggage, and 5.88 YPA across 19 Browns starts. If he does not deliver early, Shedeur gets the extended look. Fantasy-relevant only as a deep-league flier tied to the WR/TE values around him."},{"n":"Tyreek Hill","p":"WR","t":null,"s":"neutral","o":"A free agent as of June 2026, released by Miami in February, still unsigned, rehabbing the major knee injury (dislocation plus multiple torn ligaments) that ended his 2025 in Week 4. Entering his age-32 season; nobody signs him until he proves health. The most-discussed landing spots are a Chiefs reunion (Mahomes) or the Raiders. Pure speculation until he signs and shows he can move again. Watch-list only."},{"n":"Tank Bigsby","p":"RB","t":"Philadelphia Eagles","s":"pos","o":"The cheapest genuinely-good handcuff in fantasy. Elite efficiency over two years: 3.7 yards after contact, top-2 in tackles avoided per carry, a double-digit explosive-run rate. The clear Eagles RB2 behind Saquon; if Barkley misses time he is a must-start workhorse. With AJ Brown gone the Eagles should lean into the run. Changed his number from 37 to 8, which is apparently important. A smash pick that late. The meatballers think he may be the single best handcuff in fantasy: after the trade to Philadelphia he ranked RB1 in EPA per carry, RB2 in yards per carry and RB6 in success rate among 60 qualifiers, all ahead of Saquon Barkley. If Saquon misses time, Bigsby steps into a top-15 role."},{"n":"Dallas Goedert","p":"TE","t":"Philadelphia Eagles","s":"pos","o":"A perennial value at TE. Hurts trusts him: whenever Brown or Smith has been out, Goedert seamlessly becomes the number-two target with near top-5 TE production. The boot-rollout pop pass and tush-push wrinkles funnel red-zone TDs his way. Eli Stowers is more of a WR than a true TE rival. Best-ball spike-week appeal. Likely to be a winner from the AJ Brown departure with another OC change."},{"n":"Ryan Flournoy","p":"WR","t":"Dallas Cowboys","s":"pos","o":"A best-ball flyer the meatballers like (121 vs an ADP of 177). Reportedly the WR3 and CeeDee Lamb's right-hand man, versatile (inside/outside, short and deep) unlike the limited Turpin. Projects around 700 yards with double-digit-TD upside in Dallas shootouts, and becomes a fantasy starter if Lamb or Pickens misses time. A great late dart with floor and contingent ceiling. An underrated, potentially startable receiver the meatballers like as a contingency-value pick (around WR183): he went off when CeeDee Lamb missed time last year, and in an 11-personnel Dallas offense he could carve out real snaps."},{"n":"Jaydon Blue","p":"RB","t":"Dallas Cowboys","s":"pos","o":"A free dynasty/best-ball dart. Did everything wrong as a rookie (the Louis Vuitton cleats blisters, benched, never got off IR) but the staff reportedly told him to fix it and he came back a different person, putting distance between himself and Malik Davis. Elite speed; if he turns 8-10 touches into big plays he reaches flex consideration. The meatballers are skeptical of his vision/footwork, just speed. Worth it because he is free."},{"n":"Treylon Burks","p":"WR","t":"Washington Commanders","s":"pos","o":"A change-of-scenery sleeper drawing strong camp buzz: the staff vibe is that despite Dyami Brown, Luke McCaffrey and rookie Antonio Williams, Burks is the one looking the part as the potential WR2 opposite McLaurin. A former first-rounder derailed by injuries; offers an outside, physical skill set no one else on the roster has. Caveat: Washington may still add Aiyuk or Diggs, which would bury him."},{"n":"Kenny Gainwell","p":"RB","t":"Tampa Bay Buccaneers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 107.0, RB37). Baseline entry, no scouting notes yet."},{"n":"KC Concepcion","p":"WR","t":"Cleveland Browns","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 118.0, WR52). Baseline entry, no scouting notes yet."},{"n":"Jauan Jennings","p":"WR","t":"Minnesota Vikings","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 148.0, WR60). Baseline entry, no scouting notes yet."},{"n":"Jalen Nailor","p":"WR","t":"Las Vegas Raiders","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 151.0, WR61). Baseline entry, no scouting notes yet."},{"n":"Tyjae Spears","p":"RB","t":"Tennessee Titans","s":"mixed","o":"Number one in tackles avoided per touch since entering the league and a passable weekly floor as a receiving back — effective if uninspiring, with real standalone value if Pollard slips."},{"n":"Deebo Samuel Sr.","p":"WR","t":"Washington Commanders","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 163.0, WR65). Baseline entry, no scouting notes yet."},{"n":"T.J. Hockenson","p":"TE","t":"Minnesota Vikings","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 164.0, TE22). Baseline entry, no scouting notes yet."},{"n":"Dalton Schultz","p":"TE","t":"Houston Texans","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 169.0, TE23). Baseline entry, no scouting notes yet."},{"n":"Dylan Sampson","p":"RB","t":"Cleveland Browns","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 173.0, RB53). Baseline entry, no scouting notes yet."},{"n":"Germie Bernard","p":"WR","t":"Pittsburgh Steelers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 184.0, WR74). Baseline entry, no scouting notes yet."},{"n":"Calvin Ridley","p":"WR","t":"Tennessee Titans","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 186.0, WR75). Baseline entry, no scouting notes yet."},{"n":"Cade Otton","p":"TE","t":"Tampa Bay Buccaneers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 187.0, TE27). Baseline entry, no scouting notes yet."},{"n":"Tank Dell","p":"WR","t":"Houston Texans","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 189.0, WR77). Baseline entry, no scouting notes yet. The meatballers fear he is done: a gruesome injury on a smaller frame, and Houston's moves (drafting Jaylen Noel, an ideal one-for-one replacement as the smaller super-athletic slot) suggest the team may feel the same. Root for it, but they are betting on Noel."},{"n":"Emmett Johnson","p":"RB","t":"Kansas City Chiefs","s":"mixed","o":"A deep Chiefs sleeper: a Nebraska back who runs with intent and zero wasted motion, gets downhill in a hurry with real power. Style comps to Kareem Hunt. He's the emergency break-glass option behind an oft-banged-up Kenneth Walker, though Emari Demercado has the early edge for passing downs. Monitor how much Kansas City puts on his plate in camp. The meatballers flag the Nebraska rookie as the logical early-down back if Kenneth Walker misses time in Kansas City — a deep sleeper worth a late look."},{"n":"Dontayvion Wicks","p":"WR","t":"Philadelphia Eagles","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 191.0, WR78). Baseline entry, no scouting notes yet."},{"n":"Braelon Allen","p":"RB","t":"New York Jets","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 201.0, RB61). Baseline entry, no scouting notes yet."},{"n":"Darnell Mooney","p":"WR","t":"New York Giants","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 202.0, WR80). Baseline entry, no scouting notes yet."},{"n":"Elijah Sarratt","p":"WR","t":"Baltimore Ravens","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 203.0, WR81). Baseline entry, no scouting notes yet."},{"n":"Troy Franklin","p":"WR","t":"Denver Broncos","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 210.0, WR83). Baseline entry, no scouting notes yet. The meatballers note he was actually second in receiving yards among the deep-sleeper WR group last year and overtook Courtland Sutton down the stretch — a cheap dart (around WR232) in a Denver offense they like."},{"n":"Jordan James","p":"RB","t":"San Francisco 49ers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 213.0, RB64). Baseline entry, no scouting notes yet."},{"n":"Demond Claiborne","p":"RB","t":"Minnesota Vikings","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 218.0, RB66). Baseline entry, no scouting notes yet."},{"n":"Chris Brazzell II","p":"WR","t":"Carolina Panthers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 219.0, WR89). Baseline entry, no scouting notes yet."},{"n":"Tyquan Thornton","p":"WR","t":"Kansas City Chiefs","s":"mixed","o":"A deep-threat sleeper: he was the Chiefs' best downfield receiver last year, and in an offense with Xavier Worthy and a real running game, he's the field-stretcher who can quietly return value on big plays. A late-round dart with spike-week upside if the vertical role sticks."},{"n":"Evan Engram","p":"TE","t":"Denver Broncos","s":"mixed","o":"Stunning value at ~TE19 — when healthy last year he was a top-5 TE in five of his final seven weeks, and he ranked No. 1 among 20+ target players in both total receiving EPA and EPA per target. The Jaguars paid him and lean on 12 personnel, which keeps him on the field over a receiver. Receiving competition is the only real knock."},{"n":"Justice Hill","p":"RB","t":"Baltimore Ravens","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 227.0, RB67). Baseline entry, no scouting notes yet."},{"n":"Kimani Vidal","p":"RB","t":"LA Chargers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 230.0, RB68). Baseline entry, no scouting notes yet. The meatballers expect him to carve out a real role in the Chargers backfield, which caps Keaton Mitchell's standalone appeal even if Omarion Hampton misses time."},{"n":"Kaelon Black","p":"RB","t":"San Francisco 49ers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 233.0, RB69). Baseline entry, no scouting notes yet."},{"n":"Devaughn Vele","p":"WR","t":"New Orleans Saints","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 234.0, WR96). Baseline entry, no scouting notes yet."},{"n":"Andrei Iosivas","p":"WR","t":"Cincinnati Bengals","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 236.0, WR97). Baseline entry, no scouting notes yet."},{"n":"Ja'Kobi Lane","p":"WR","t":"Baltimore Ravens","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 237.0, WR98). Baseline entry, no scouting notes yet."},{"n":"Samaje Perine","p":"RB","t":"Cincinnati Bengals","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 239.0, RB71). Baseline entry, no scouting notes yet."},{"n":"Michael Mayer","p":"TE","t":"Las Vegas Raiders","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 240.0, TE36). Baseline entry, no scouting notes yet."},{"n":"Skyler Bell","p":"WR","t":"Buffalo Bills","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 241.0, WR99). Baseline entry, no scouting notes yet."},{"n":"Zavion Thomas","p":"WR","t":"Chicago Bears","s":"mixed","o":"An intriguing gadget dart — real speed and a running-back feel with the ball (backfield touches, jet sweeps), a potential DJ Moore-style manufactured-touch role and return value. High-risk, spike-week profile that still needs to earn Ben Johnson's trust."},{"n":"Darius Slayton","p":"WR","t":"New York Giants","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 246.0, WR102). Baseline entry, no scouting notes yet."},{"n":"Chimere Dike","p":"WR","t":"Tennessee Titans","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 247.0, WR103). Baseline entry, no scouting notes yet."},{"n":"Ja'Tavion Sanders","p":"TE","t":"Carolina Panthers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 249.0, TE38). Baseline entry, no scouting notes yet."},{"n":"Jack Bech","p":"WR","t":"Las Vegas Raiders","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 250.0, WR104). Baseline entry, no scouting notes yet."},{"n":"DJ Giddens","p":"RB","t":"Indianapolis Colts","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 252.0, RB73). Baseline entry, no scouting notes yet."},{"n":"Devontez Walker","p":"WR","t":"Baltimore Ravens","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 254.0, WR105). Baseline entry, no scouting notes yet."},{"n":"Jaylen Wright","p":"RB","t":"Miami Dolphins","s":"mixed","o":"A sleeper with the physical tools already checked: straight-line speed and a one-cut-and-go style. Despite Miami's front-office turnover the play-caller is still a Shanahan-tree zone guy, and with a designed-run mobile QB (Malik Willis) forcing defenses to honor the read-option, the lanes open up for a runner like Wright. Cheap upside. The meatballers like the straight-line speed and one-cut style behind De'Von Achane; with Malik Willis' designed-run threat stressing defenses, they think the Dolphins' new offense can open big-play lanes for him — one to watch."},{"n":"Jalen Tolbert","p":"WR","t":"Miami Dolphins","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 257.0, WR106). Baseline entry, no scouting notes yet."},{"n":"Ollie Gordon II","p":"RB","t":"Miami Dolphins","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 260.0, RB76). Baseline entry, no scouting notes yet."},{"n":"Chris Brooks","p":"RB","t":"Green Bay Packers","s":"mixed","o":"Added from the 2026 consensus Top-300 (Standard ADP 261.0, RB77). Baseline entry, no scouting notes yet. The meatballers view him more as a fullback and hybrid lead-blocker than a true rusher in Green Bay; the team wants Marshawn Lloyd, not Brooks, as the on, though he avoided surgery."}]},"Tee Higgins":{"summary":"A recurring hamstring history plus rib issues have cost him five games in each of the last two seasons, though he stays highly productive.","timeline":[{"year":"2023","label":"Ribs + Hamstring","games":"Missed 5","detail":"A rib injury cost two games and a hamstring cost three more, then re-aggravated in the finale."},{"year":"2024","label":"Hamstring","games":"Missed 5","detail":"Hamstring trouble cost the first two games and time later, five total."}]},"Jaylen Waddle":{"summary":"Explosive but with a concerning concussion history and periodic knee and hamstring issues.","timeline":[{"year":"2023","label":"Concussion + Back","games":"Missed 1","detail":"A concussion (and a back injury) cost him a game amid a nagging year."},{"year":"2024","label":"Knee + Hamstring","games":"Missed ~2","detail":"A knee injury cost a couple of games, and he managed a hamstring."}]},"Courtland Sutton":{"summary":"A 2020 torn ACL cost nearly the whole season; he has been durable since, becoming a reliable full-time starter.","timeline":[{"year":"2020","label":"Torn ACL","games":"Season-ending","detail":"Tore his ACL in Week 2, ending the season after an AC shoulder sprain the week prior."},{"year":"2021-2024","label":"Durable","games":"Missed ~0","detail":"Largely healthy across four seasons after the ACL recovery."}]},"Jameson Williams":{"summary":"A torn ACL in his final college game delayed his NFL start; he has been more available since, aside from a non-injury 2023 suspension.","timeline":[{"year":"2021","label":"Torn ACL (college)","games":"Missed most (rookie)","detail":"Tore his ACL in the national championship game, delaying his Lions debut until Week 13 of 2022."},{"year":"2023-2024","label":"Durable","games":"Missed ~0","detail":"Healthy on the field once past the ACL, with only minor knocks."}]},"DeVonta Smith":{"summary":"Generally durable, with a 2024 concussion and hamstring the main absences.","timeline":[{"year":"2024","label":"Concussion + Hamstring","games":"Missed ~3","detail":"A concussion cost two games and a hamstring/knee issue cost more time."}]},"Mike Evans":{"summary":"Iron-durable for most of his career (11 straight 1,000-yard seasons), with a 2024 hamstring the rare significant absence.","timeline":[{"year":"2024","label":"Hamstring","games":"Missed 3","detail":"A hamstring injury cost three games, but he still reached 1,000 yards on the final day for an 11th straight season."}]},"Michael Pittman Jr.":{"summary":"Mostly available but gutted through a back injury that sapped his 2024, along with a broken hand.","timeline":[{"year":"2024","label":"Back + Hand","games":"Played hurt","detail":"A back injury lingered all season and he broke his hand, limiting his production even as he stayed largely in the lineup."}]},"Marvin Harrison Jr.":{"summary":"A clean rookie year before a 2025 season derailed by a run of injuries; talented but coming off a lost second year.","timeline":[{"year":"2025","label":"Concussion + Heel","games":"Missed time","detail":"A disappointing year two was derailed by a concussion, an appendectomy and two heel injuries."}]},"Travis Hunter":{"summary":"An iron-man two-way star whose only notable absence was a 2023 lacerated liver from a big hit; otherwise plays nearly every snap on both sides.","timeline":[{"year":"2023","label":"Lacerated liver (college)","games":"Missed 3 (college)","detail":"A hit versus Colorado State lacerated his liver and hospitalized him, costing about three games at Colorado."}]},"James Conner":{"summary":"One of the NFL's more injury-prone backs given his high-contact style, with multiple missed games every pro season, including a 2025 season-ending ankle.","timeline":[{"year":"2018-2020","label":"Assorted (Steelers)","games":"Missed 14 / 4 yrs","detail":"Knee, ankle and quad injuries across his Pittsburgh years cost 14 of a possible 64 games."},{"year":"2023","label":"Nagging injuries","games":"Missed 4","detail" ery."}]},"Nicholas Singleton":{"summary":"A 2026 rookie who broke his foot at the Senior Bowl but was medically cleared; his college durability was solid despite some undisclosed knocks.","timeline":[{"year":"2026","label":"Foot fracture","games":"Foot surgery","detail":"Fractured the fifth metatarsal in his right foot at a Senior Bowl practice and had surgery, but was medically cleared before the draft."},{"year":"College","label":"Assorted knocks","games":"College","detail":"Undisclosed ankle and lower-body knocks and a concussion at Penn State, but no lengthy absences."}]},"Treveyon Henderson":{"summary":"A 2022 broken foot cost five college games; he has been durable otherwise, with a 2025 rookie concussion the main pro ding.","timeline":[{"year":"2022","label":"Broken foot (college)","games":"Missed 5 (college)","detail":"A broken bone in his foot at Ohio State required December surgery and cost five games."},{"year":"2025","label":"Concussion","games":"Missed ~0","detail":"Exited a Week 16 game for a concussion check but cleared protocol and played in the wild-card round."}]},"Kenny Gainwell":{"summary":"Durable early in his career; more recently dealt with rib and concussion issues.","timeline":[{"year":"2021-2022","label":"Fully available","games":"Missed 0","detail":"No injury absences across his first two seasons."},{"year":"2023-2025","label":"Ribs + Concussion","games":"Missed ~1","detail":"A rib injury cost a game and he took a concussion on a kickoff."}]},"Alvin Kamara":{"summary":"Durable relative to his heavy usage, with occasional high-ankle, MCL and rib issues; a 2025 MCL was the costliest.","timeline":[{"year":"2019","label":"Ankle + MCL","games":"Missed 2","detail":"A Grade 2 high-ankle sprain and MCL sprain cost two games."},{"year":"2021-2022","label":"Ribs","games":"Missed 1","detail":"A fractured rib, then rib cartilage in the 2022 opener, cost a game."},{"year":"2025","label":"Knee (MCL)","games":"Missed 6","detail":"An MCL injury cost him the final six games of the season."}]},"James Cook":{"summary":"Durable as a pro, with no significant injury absences in Buffalo; his injury time came in college.","timeline":[{"year":"2019-2020","label":"Ankle/Shoulder (college)","games":"College","detail":"An ankle (surgery) and a shoulder injury at Georgia, but he missed just two college games."},{"year":"2025","label":"Ankle (played through)","games":"Missed 0","detail":"Managed a minor ankle injury late in the year without missing time."}]},"Travis Etienne Jr.":{"summary":"A 2021 Lisfranc foot injury wiped out his entire rookie year; he has been more available since, aside from minor foot sprains.","timeline":[{"year":"2021","label":"Lisfranc (foot)","games":"Missed all","detail":"A Lisfranc injury to his left foot in the preseason required surgery and cost his entire rookie season."},{"year":"2022-2024","label":"Foot sprain","games":"Missed ~1","detail":"Got rolled up on the surgically repaired foot and missed a game, but was otherwise durable."}]},"Aaron Jones":{"summary":"Explosive but with a long history of MCL sprains and hamstring pulls costing a game or two most years.","timeline":[{"year":"2017","label":"MCL (both knees)","games":"Missed 3","detail":"Two MCL sprains, including one that cost the season finale."},{"year":"2018","label":"MCL","games":"Missed 2","detail":"A Week 15 MCL sprain cost the final two games."},{"year":"2021","label":"Hamstring + MCL","games":"Missed 1","detail":"A camp hamstring plus a Week 10 MCL sprain."},{"year":"2023","label":"Hamstring + MCL","games":"Missed ~6","detail":"A Week 1 hamstring and a Week 8 MCL sprain cost roughly six games."}]},"Rhamondre Stevenson":{"summary":"An accumulating foot and ankle history: a 2023 high-ankle sprain ended his season, and toe/foot issues have cost time since.","timeline":[{"year":"2023","label":"High-ankle sprain","games":"Missed ~5","detail":"A high-ankle sprain in Week 13 versus the Chargers ended his season."},{"year":"2025","label":"T able college back whose only notable absence was a late knee injury.","timeline":[{"year":"College","label":"Knee","games":"College","detail":"A knee injury at Washington cost one game, but he played all 13 games as the lead back in 2024."}]},"Kaytron Allen":{"summary":"Extremely reliable in college, appearing in nearly every game across four years; only missed a bowl game with a minor injury.","timeline":[{"year":"College","label":"Iron-durable","games":"College","detail":"Rewrote Penn State's career rushing record while missing only his final bowl game with an unspecified injury."}]},"Jonathan Brooks":{"summary":"A brutal knee history: a college ACL tear delayed his rookie debut, then a second ACL tear in the same knee ended his third pro game and wiped out 2025.","timeline":[{"year":"2023","label":"Torn ACL (college)","games":"College","detail":"Tore his right ACL at Texas in November, requiring a 12-month rehab."},{"year":"2024","label":"ACL recovery","games":"Missed ~10","detail":"The college ACL delayed his rookie debut until Week 12."},{"year":"2024-2025","label":"Re-torn ACL","games":"Season-ending","detail":"Re-tore the same ACL in his third pro game, missing all of 2025."}]},"Jeremiyah Love":{"summary":"A college standout who played through injuries without missing games (a 2024 playoff MCL sprain, a 2025 rib injury), though his lean frame draws durability questions.","timeline":[{"year":"2024","label":"Knee (MCL)","games":"Played through","detail":"A Grade 2 MCL sprain that he played through in the college playoffs."},{"year":"2025","label":"Ribs","games":"Missed 0","detail":"A rib injury in the finale, but he returned with bracing and missed no games."}]},"Brock Purdy":{"summary":"Durable as a starter aside from a 2022 UCL elbow tear he rehabbed without full surgery; 2025 was rough with turf toe and a shoulder issue.","timeline":[{"year":"2022","label":"Elbow (UCL)","games":"Offseason surgery","detail":"Tore the UCL in his throwing elbow in the NFC Champ es (a 2019 shoulder fracture, ankle sprains, various strains) but rarely long absences.","timeline":[{"year":"2019","label":"Shoulder fracture","games":"Missed 3","detail":"A shoulder fracture in Week 7 cost three games."},{"year":"2021","label":"Ankle sprain","games":"Missed 2","detail":"A Week 1 ankle sprain cost two games."},{"year":"2023","label":"Quad strain","games":"Missed 4","detail":"A quad strain in Week 13 cost four games."},{"year":"2025","label":"Knee (bone bruise)","games":"Missed 1","detail":"A knee bone bruise in Week 11 cost one game."}]},"Kenneth Walker":{"summary":"Explosive but injury-prone: a rookie hernia plus recurring oblique, calf and ankle issues, with 2024 the most costly.","timeline":[{"year":"2022","label":"Hernia + Ankle","games":"Missed ~2","detail":"A preseason sports hernia and a later ankle sprain each cost a game."},{"year":"2023","label":"Oblique/Abdomen","games":"Missed 2","detail":"Oblique and abdominal strains cost two games."},{"year":"2024","label":"Oblique/Calf/Ankle","games":"Missed 6","detail":"An early oblique injury then calf and high-ankle issues cost about six games."}]},"Kyren Williams":{"summary":"Two early high-ankle sprains (2022 rookie, 2023) cost significant time, but he was workhorse-durable in 2024.","timeline":[{"year":"2022","label":"High-ankle (surgery)","games":"Missed 8","detail":"A Week 1 high-ankle sprain required surgery and cost eight games as a rookie."},{"year":"2023","label":"High-ankle (IR)","games":"Missed 4","detail":"Another high-ankle sprain in Week 6 sent him to IR for four games."},{"year":"2024","label":"Mostly healthy","games":"Missed 0","detail":"Managed a minor ankle issue but carried it 316 times for over 1,100 yards."}]},"David Montgomery":{"summary":"A physical back with a scattered injury sheet; a 2021 knee issue and a 2024 MCL sprain were the notable ones, but he is generally available.","timeline":[{"year":"2021","label":"Knee","games":"Missed 4","detail":"A knee injury cost four games."},{"year":"2023","label":"Ribs + Thigh","games":"Missed 3","detail":"Rib cartilage cost two games and a thigh contusion one."},{"year":"2024","label":"Knee (MCL)","games":"Played through","detail":"An MCL sprain in December avoided surgery, and he returned for the playoffs."}]},"Jaylen Warren":{"summary":"A compact, durable back whose main dings were a 2024 preseason hamstring and a 2025 knee that cost one game.","timeline":[{"year":"2024","label":"Hamstring (preseason)","games":"Missed 0","detail":"A preseason hamstring cost multiple practice weeks, but he played Week 1."},{"year":"2025","label":"Knee","games":"Missed 1","detail":"A knee injury cost him the Week 4 game before the bye."}]},"Jonathon Brooks":{"summary":"A brutal knee history: a college ACL tear delayed his rookie debut, then a second ACL tear in the same knee ended his third pro game and wiped out 2025.","timeline":[{"year":"2023","label":"Torn ACL (college)","games":"College","detail":"Tore his right ACL at Texas in November, requiring a 12-month rehab."},{"year":"2024","label":"ACL recovery","games":"Missed ~10","detail":"The college ACL delayed his rookie debut until Week 12."},{"year":"2024-2025","label":"Re-torn ACL","games":"Season-ending","detail":"Re-tore the same ACL in his third pro game, missing all of 2025."}]},"Rachaad White":{"summary":"Durable, with just one career game missed (a 2024 foot issue); occasional groin tweaks otherwise.","timeline":[{"year":"2024","label":"Foot","games":"Missed 1","detail":"A minor foot injury cost one game."},{"year":"2025","label":"Groin (preseason)","games":"Played through","detail":"A preseason groin injury left him day-to-day but did not cost regular-season time."}]},"Kenneth Gainwell":{"summary":"Durable early in his career; more recently dealt with rib and concussion issues.","timeline":[{"year":"2021-2022","label":"Fully available","games":"Missed 0","detail":"No injury absences across his first two seasons."},{"year":"2023-2025","label":"Ribs
