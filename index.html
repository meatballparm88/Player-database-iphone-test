<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meatballparm">
<meta name="theme-color" content="#0c0d0b">
<meta name="format-detection" content="telephone=no">
<title>Meatballparm</title>
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
/* ============================================================
   MEATBALLPARM — iPhone build. iOS HIG: safe areas, 44pt targets,
   bottom tab bar, sheets, momentum scroll, system type.
   ============================================================ */
:root{
  --bg:#0c0d0b; --surface:#141513; --surface2:#1b1c19; --surface3:#232520;
  --border:#2a2b27; --border2:#37393333; --hair:rgba(255,255,255,.08);
  --tx:#f2f1ea; --t2:#a9a99f; --t3:#6d7067;
  --accent:#c8f55a; --accent-ink:#0c0d0b;
  --qb:#f5a524; --rb:#34d399; --wr:#60a5fa; --te:#c084fc;
  --pos:#34d399; --neg:#ff6b6b; --mix:#f5a524;
  --sheet:#171815;
  --nav-h:44px; --tab-h:50px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.32,.72,0,1);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%; margin:0; overscroll-behavior:none}
body{
  background:var(--bg); color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  font-size:17px; line-height:1.4; -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  user-select:none; -webkit-user-select:none;
}
button{font:inherit; color:inherit; background:none; border:0; padding:0; cursor:pointer}
.mono{font-family:ui-monospace,'SF Mono',Menlo,monospace; font-variant-numeric:tabular-nums}

/* ---------- App shell ---------- */
#app{height:100%; display:flex; flex-direction:column}
.page{flex:1; display:none; flex-direction:column; min-height:0}
.page.on{display:flex}

/* Nav bar (iOS large title) */
.nav{
  position:sticky; top:0; z-index:20; padding-top:var(--sat);
  background:rgba(12,13,11,.78); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--hair); transition:border-color .2s;
}
.nav-in{height:var(--nav-h); display:flex; align-items:center; justify-content:center; position:relative; padding:0 12px}
.nav-title{font-size:17px; font-weight:600; letter-spacing:-.01em; opacity:0; transition:opacity .22s var(--ease)}
.nav.shrunk .nav-title{opacity:1}
.nav-act{position:absolute; right:12px; top:50%; transform:translateY(-50%); min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:flex-end; color:var(--accent); font-size:15px; font-weight:600}
.nav-back{position:absolute; left:6px; top:50%; transform:translateY(-50%); min-width:44px; min-height:44px; display:flex; align-items:center; color:var(--accent); font-size:16px; font-weight:600; gap:2px}
.large{padding:2px 16px 10px; font-size:34px; font-weight:800; letter-spacing:-.028em; line-height:1.1}
.large .sub{display:block; font-size:13px; font-weight:500; color:var(--t3); letter-spacing:0; margin-top:3px}

/* Scroll body */
.scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain}
.scroll::-webkit-scrollbar{display:none}
.pad-b{height:calc(var(--tab-h) + var(--sab) + 18px)}

/* Segmented control (iOS) */
.seg{display:flex; margin:4px 16px 12px; background:var(--surface2); border-radius:9px; padding:2px; gap:2px}
.seg button{
  flex:1; min-height:32px; border-radius:7px; font-size:13px; font-weight:600; color:var(--t2);
  transition:background .18s var(--ease), color .18s;
}
.seg button.on{background:var(--surface3); color:var(--tx); box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* Filter chip row */
.chips{display:flex; gap:8px; padding:0 16px 12px; overflow-x:auto; -webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:none; min-height:32px; padding:0 13px; border-radius:16px; background:var(--surface2);
  border:.5px solid var(--border); font-size:13px; font-weight:600; color:var(--t2);
  display:flex; align-items:center; gap:5px; white-space:nowrap;
}
.chip.on{background:var(--accent); border-color:var(--accent); color:var(--accent-ink)}

/* ---------- Player list rows ---------- */
.rows{padding:0 0 4px}
.row{
  display:flex; align-items:center; gap:12px; padding:9px 16px; min-height:64px;
  position:relative; transition:background .12s;
}
.row:active{background:var(--surface2)}
.row+.row::before{content:""; position:absolute; left:76px; right:0; top:0; height:.5px; background:var(--hair)}
.pic{
  width:48px; height:48px; border-radius:12px; flex:none; overflow:hidden; position:relative;
  background:linear-gradient(160deg,var(--surface3),var(--surface2)); display:flex; align-items:flex-end; justify-content:center;
}
.pic img{width:100%; height:100%; object-fit:cover; display:none}
.pic .ini{font-size:15px; font-weight:700; color:var(--t3); align-self:center}
.pic .stripe{position:absolute; left:0; right:0; bottom:0; height:2.5px}
.row-main{flex:1; min-width:0}
.row-nm{font-size:16px; font-weight:600; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.row-sub{font-size:12.5px; color:var(--t3); margin-top:2px; display:flex; align-items:center; gap:6px}
.pill{font-size:10px; font-weight:800; padding:1.5px 5px; border-radius:4px; letter-spacing:.02em}
.row-right{flex:none; text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:3px}
.rk{font-size:15px; font-weight:700; letter-spacing:-.01em}
.vd{font-size:9.5px; font-weight:800; padding:2px 6px; border-radius:5px; letter-spacing:.04em}
.vd.buy{color:var(--pos); background:rgba(52,211,153,.14)}
.vd.sell{color:var(--neg); background:rgba(255,107,107,.14)}
.vd.hold{color:var(--mix); background:rgba(245,165,36,.14)}
.chev{color:var(--t3); font-size:16px; margin-left:2px}

/* ---------- Search ---------- */
.searchbar{padding:0 16px 10px}
.sfield{
  display:flex; align-items:center; gap:8px; height:38px; padding:0 10px;
  background:var(--surface2); border-radius:10px;
}
.sfield input{
  flex:1; background:none; border:0; outline:0; color:var(--tx); font-size:17px;
  user-select:text; -webkit-user-select:text;
}
.sfield input::placeholder{color:var(--t3)}
.sfield .ico{color:var(--t3); font-size:15px}
.hint{padding:0 16px; color:var(--t3); font-size:13px; line-height:1.6}
.hint b{color:var(--t2); font-weight:600}
.egs{display:flex; flex-wrap:wrap; gap:8px; padding:12px 16px}
.eg{padding:7px 12px; background:var(--surface2); border:.5px solid var(--border); border-radius:14px; font-size:13px; color:var(--t2)}
.eg:active{background:var(--surface3)}

/* ---------- Teams grid ---------- */
.tgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:0 16px}
.tcard{
  aspect-ratio:1/.82; border-radius:14px; background:var(--surface2); border:.5px solid var(--border);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; transition:transform .12s var(--ease);
}
.tcard:active{transform:scale(.955); background:var(--surface3)}
.tcard img{width:34px; height:34px; object-fit:contain}
.tcard .ab{font-size:11px; font-weight:700; color:var(--t2); letter-spacing:.04em}
.tcard .ct{font-size:10px; color:var(--t3)}

/* ---------- Empty / loading ---------- */
.empty{padding:56px 32px; text-align:center; color:var(--t3); font-size:14px; line-height:1.6}
.empty .big{font-size:34px; margin-bottom:10px; opacity:.5}

/* ---------- Tab bar ---------- */
.tabbar{
  flex:none; display:flex; padding-bottom:var(--sab); z-index:30;
  background:rgba(12,13,11,.82); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--hair);
}
.tab{
  flex:1; height:var(--tab-h); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  color:var(--t3); transition:color .15s;
}
.tab.on{color:var(--accent)}
.tab svg{width:24px; height:24px}
.tab span{font-size:10px; font-weight:600; letter-spacing:.01em}

/* ---------- Player sheet ---------- */
.scrim{position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .3s var(--ease); z-index:40}
.scrim.on{opacity:1; pointer-events:auto}
.sheet{
  position:fixed; left:0; right:0; bottom:0; top:0; z-index:50;
  background:var(--sheet); border-radius:14px 14px 0 0;
  transform:translateY(100%); transition:transform .42s var(--ease);
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
}
.sheet.on{transform:translateY(0)}
.sheet.drag{transition:none}
.grab{flex:none; height:22px; display:flex; align-items:center; justify-content:center; padding-top:6px; touch-action:none}
.grab i{width:36px; height:5px; border-radius:3px; background:#4a4d45; display:block}
.sheet-nav{
  flex:none; display:flex; align-items:center; justify-content:space-between; padding:2px 12px 8px; gap:8px;
}
.sheet-nav .done{min-height:44px; display:flex; align-items:center; padding:0 4px; color:var(--accent); font-size:16px; font-weight:600}
.sheet-body{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain}
.sheet-body::-webkit-scrollbar{display:none}

.hero{display:flex; gap:14px; padding:4px 16px 14px; align-items:center}
.hero .pic{width:76px; height:88px; border-radius:14px}
.hero .pic .ini{font-size:24px}
.hero-info{flex:1; min-width:0}
.hero-nm{font-size:26px; font-weight:800; letter-spacing:-.026em; line-height:1.12}
.hero-sub{display:flex; align-items:center; gap:7px; margin-top:6px; color:var(--t3); font-size:13px}
.hero-sub img{width:17px; height:17px; object-fit:contain}
.hero-rk{display:flex; gap:14px; margin-top:9px}
.hero-rk div{font-size:11px; color:var(--t3)}
.hero-rk b{display:block; font-size:17px; color:var(--tx); font-weight:700; margin-top:1px}

.verdict{
  margin:0 16px 14px; padding:11px 13px; border-radius:12px; display:flex; align-items:center; gap:10px;
  border:.5px solid; font-size:13.5px; line-height:1.45;
}
.verdict .tag{font-size:12px; font-weight:800; padding:3px 9px; border-radius:7px; letter-spacing:.04em; flex:none}

.sec{padding:0 16px 18px}
.sec h3{
  font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--t3);
  margin:0 0 8px;
}
.card{background:var(--surface2); border-radius:13px; padding:13px 14px; font-size:14.5px; line-height:1.55; color:var(--t2)}
.card b{color:var(--tx); font-weight:600}
.li{display:flex; gap:9px; padding:7px 0; font-size:14px; line-height:1.5; color:var(--t2); border-top:.5px solid var(--hair)}
.li:first-child{border-top:0}
.li i{flex:none; font-style:normal; font-weight:800; margin-top:1px}
.mets{display:grid; grid-template-columns:1fr 1fr; gap:9px}
.met{background:var(--surface2); border-radius:12px; padding:10px 11px}
.met .v{font-size:19px; font-weight:800; line-height:1}
.met .k{font-size:10.5px; color:var(--t3); margin-top:4px; text-transform:uppercase; letter-spacing:.03em}
.met .bar{height:4px; border-radius:3px; background:rgba(255,255,255,.08); margin-top:7px; overflow:hidden}
.met .bar i{display:block; height:100%; border-radius:3px}
.inj{background:var(--surface2); border-radius:13px; padding:4px 14px}
.inj .it{padding:11px 0; border-top:.5px solid var(--hair); font-size:14px; line-height:1.5; color:var(--t2)}
.inj .it:first-child{border-top:0}
.inj .yr{font-weight:700; color:var(--tx); font-size:13px; display:block; margin-bottom:2px}

/* Sheet action bar */
.acts{
  flex:none; display:flex; gap:9px; padding:10px 16px calc(10px + var(--sab));
  border-top:.5px solid var(--hair); background:rgba(23,24,21,.9); backdrop-filter:blur(20px);
}
.act{
  flex:1; min-height:46px; border-radius:12px; font-size:15px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:6px; transition:transform .1s;
}
.act:active{transform:scale(.97)}
.act.tgt{background:var(--accent); color:var(--accent-ink)}
.act.tgt.on{background:var(--pos); color:#04120c}
.act.fade{background:var(--surface3); color:var(--t2)}
.act.fade.on{background:var(--neg); color:#2a0808}
.act.share{flex:none; width:52px; background:var(--surface3); color:var(--t2)}

/* Swipe-to-delete on targets */
.swipe{position:relative; overflow:hidden}
.swipe .row{transition:transform .22s var(--ease); background:var(--bg)}
.swipe .del{
  position:absolute; right:0; top:0; bottom:0; width:88px; background:var(--neg); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700;
}
@media (prefers-reduced-motion:reduce){ *{transition:none!important; animation:none!important} }
</style>
</head>
<body>
<div id="app">

  <!-- ============ PLAYERS ============ -->
  <section class="page on" id="p-players">
    <div class="nav" id="nav-players">
      <div class="nav-in"><span class="nav-title">Players</span></div>
    </div>
    <div class="scroll" id="sc-players">
      <div class="large">Players<span class="sub" id="pl-count">—</span></div>
      <div class="seg" id="seg-pos"></div>
      <div class="chips" id="chips-sort"></div>
      <div class="rows" id="list-players"></div>
      <div class="pad-b"></div>
    </div>
  </section>

  <!-- ============ SEARCH ============ -->
  <section class="page" id="p-search">
    <div class="nav" id="nav-search"><div class="nav-in"><span class="nav-title">Search</span></div></div>
    <div class="scroll" id="sc-search">
      <div class="large">Search</div>
      <div class="searchbar">
        <div class="sfield">
          <span class="ico">􀊫</span>
          <input id="q" type="search" placeholder="Players, notes, stats…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" enterkeyhint="search">
          <button id="q-clear" style="display:none;color:var(--t3);min-width:28px;min-height:28px">✕</button>
        </div>
      </div>
      <div id="s-empty">
        <p class="hint">Search names, the <b>meatballers' notes</b>, or stats. Try a concept, a team, or a filter:</p>
        <div class="egs" id="egs"></div>
      </div>
      <div class="rows" id="list-search"></div>
      <div class="pad-b"></div>
    </div>
  </section>

  <!-- ============ TARGETS ============ -->
  <section class="page" id="p-targets">
    <div class="nav" id="nav-targets"><div class="nav-in"><span class="nav-title">My Targets</span></div></div>
    <div class="scroll" id="sc-targets">
      <div class="large">My Targets<span class="sub" id="tg-count">—</span></div>
      <div class="seg" id="seg-tgt"></div>
      <div class="rows" id="list-targets"></div>
      <div class="pad-b"></div>
    </div>
  </section>

  <!-- ============ TEAMS ============ -->
  <section class="page" id="p-teams">
    <div class="nav" id="nav-teams">
      <div class="nav-in"><span class="nav-title" id="teams-title">Teams</span><button class="nav-back" id="teams-back" style="display:none">‹ Teams</button></div>
    </div>
    <div class="scroll" id="sc-teams">
      <div class="large" id="teams-large">Teams<span class="sub">32 rosters</span></div>
      <div class="tgrid" id="grid-teams"></div>
      <div class="rows" id="list-team"></div>
      <div class="pad-b"></div>
    </div>
  </section>

  <!-- ============ TAB BAR ============ -->
  <nav class="tabbar" id="tabbar"></nav>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" aria-modal="true" role="dialog">
  <div class="grab" id="grab"><i></i></div>
  <div class="sheet-nav">
    <button class="done" id="sheet-close">Done</button>
    <div class="seg" id="seg-tab" style="flex:1;margin:0 0 0 8px"></div>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="acts" id="sheet-acts"></div>
</div>

<script>
/* =====================================================================
   DATA (baked in — fully offline, no network required)
   ===================================================================== */
const DB = {"players":[{"n":"Trevor Lawrence","p":"QB","t":"Jacksonville Jaguars","s":"pos","o":"Jacksonville is primed to be an offseason hype center (the BTJ-Lawrence highlight reel, Tuten rising) but the actual on-field gel is unproven: Lawrence and BTJ still haven't clicked in any capacity, and Lawrence historically works best with slot guys over outside WRs. The discount on the Jaguars pass-catchers exists for a reason. As a QB he's fine but the offense has to actually come together. A speculative buy on the hype, with real haven't-seen-it-yet risk. The meatballers buy the Liam Cohen breakout as real, not a fluke — 25.4 fantasy points per game and the No. 1 QB from Week 12 on, with inside-the-five carries and four good pass-catchers (Brian Thomas Jr., Parker Washington, Jakobi Meyers, Travis Hunter). Their devil's-advocate case: he could be the one Jaguars 'smash' who tanks all their own receivers by spreading it around and rushing for scores. The meatballers put hard numbers to the Liam Cohen breakout: over his first 10 games he averaged 215 passing yards, 1.1 touchdowns and 16.6 fantasy points per game (79.4 rating); over his final seven he averaged 265 yards, 2.6 touchdowns and 26.6 fantasy points per game (108.6 rating), and he added 359 rushing yards with nine rushing scores. They now count Cohen among the play-callers they will simply hitch themselves to."},{"n":"AD Mitchell","p":"WR","t":"New York Jets","s":"mixed","o":"Up about 34 spots in the last month on camp buzz that his rapport with Geno Smith has been better than Garrett Wilson's, and he's locked into the number two receiver role. He's talented and the change of scenery from the Colts was good for him, but the Jets offense has a ton of volatility with Garrett Wilson the clear focal point, so the meatballers are skeptical as his price creeps up toward the rookies."},{"n":"Omar Cooper Jr.","p":"WR","t":"New York Jets","s":"neutral","o":"A bold-prediction pick to lead all rookie receivers in targets — the Jets project to lose a lot and play from behind (garbage-time volume). But Garrett Wilson is the entrenched alpha, and the Jets drafted another rookie receiver too, so even leading his own team's rookie targets is uncertain. More a mid-to-late-season waiver watch than an early contributor."},{"n":"Kenyon Sadiq","p":"TE","t":"New York Jets","s":"neutral","o":"The meatballers' overreaction warning: don't draft a rookie tight end just because we've had three great years in a row (Warren, Loveland, Bowers, Fannin). Sadiq's college numbers are alarming — his yards per route run rank only above Hayden Hurst among first-round tight ends in a decade, his dominator rating only above Hurst and O.J. Howard, and his yards per team pass attempt was the lowest of any first-round tight end in 10 years. He's not a Bowers/Warren/Loveland-caliber prospect, he's behind Garrett Wilson for targets, and he'll be overdrafted on recent tight end hype. As the meatballers put it: don't overreact to Kenyon Sadiq."},{"n":"Garrett Wilson","p":"WR","t":"New York Jets","s":"pos","o":"The meatballers' third-round WR1 in the mock. They took him over Luther Burden and Tee Higgins because they wanted a lead receiver with 150-target upside. He was dominant last year with Justin Fields, and Geno Smith should be an upgrade. The offense has some fun weapons and projects as okay — enough to support Wilson's target floor. The meatballers park him in the 'wide range of outcomes' tier — the talent flashes WR1 seasons, but the results have ebbed and flowed. The meatballers call the talent underrated but capped by the Jets' quarterback carousel — Geno Smith is an upgrade but unlikely to fully unlock him, and they name him a real bust candidate at his ADP. The flashes are real (33% target share, WR9 through seven weeks last year), so there is WR1 upside if you do not lean on him as your No. 1."},{"n":"Breece Hall","p":"RB","t":"New York Jets","s":"neutral","o":"The meatballers have him 19 overall, well ahead of market. A true three-down back people will not draft because it is the Jets. Behind a good offensive line with Geno Smith bringing real QB stability, all it takes is the Jets being mildly competitive for Hall to smash. Risk: a Jets win total around 5.5, they were 29th in TDs, and new OC Frank Reich does not inspire confidence; if the QB play is shaky Hall sinks with it."},{"n":"Jerry Jeudy","p":"WR","t":"Cleveland Browns","s":"neutral","o":"The meatballers' most-drafted player (around 67% of drafts). Had 1,200 yards in 2024; only 11 WRs hit 1,200 over the last two years and 9 of them go top-15, yet Jeudy goes WR74. His catchable-ball rate cratered to 60% with dreadful Browns QB play (Shedeur/Gabriel were near the bottom of the league); even modest QB improvement helps. Andrew Berry called him the bellcow after drafting KC Concepcion and Denzel Boston. Massive money guaranteed, so a trade only raises his value. A round-16 lottery ticket with real upside."},{"n":"Chris Rodriguez Jr.","p":"RB","t":"Jacksonville Jaguars","s":"pos","o":"Underwhelming, a JAG (just-a-guy) who graded as a bottom-10 rusher last year, dead last in elusive rating (tied with washed Aaron Jones). He grinds between the tackles with a high success rate and some goal-line work, but that's the ceiling. He was a complete afterthought until Brian Robinson got cut. The Liam Coen coaching connection is real but overblown; Tuten did everything Rodriguez does, better, against a tougher backfield last year. Fade; he's the reason to be slightly cautious on Tuten's volume, nothing more."},{"n":"Bhayshul Tuten","p":"RB","t":"Jacksonville Jaguars","s":"pos","o":"A wild-card breakout call. In limited work the advanced metrics popped: fifth in rush success rate, fifth in yards after contact, 11th in forced missed-tackle rate. Liam Coen's backs have historically seen big workloads — Etienne had 260 carries and 52 targets, Bucky Irving 207 and 52 — and Tuten profiles for the receiving role. Jacksonville didn't draft a replacement for Travis Hunter's touches, and Chris Rodriguez, reunited with Coen from Kentucky, has just six career catches, so he's a poor fit for that passing-down work. The meatballers see the more explosive half of the Jacksonville committee, in line for passing-down and change-of-pace work, but he has to prove it; Chris Rodriguez looks like the more trusted early-down and goal-line option for now. The meatballers tab him as maybe the biggest ADP riser from this year to next: with Travis Etienne allowed to walk, he is the RB1 of Liam Cohen's offense, going just outside the top 24 now but with a real shot at the top 12 next year if the audition goes well."},{"n":"Greg Dulcich","p":"TE","t":"Miami Dolphins","s":"pos","o":"Up about 26 spots and the meatballers are on board. He's locked in as the starting tight end in a thin Dolphins pass-catching group and could lead the team in targets; projected for 83 targets, 56 catches, 547 yards and three touchdowns. He's cheap and the smartest bet to benefit from any solid Malik Willis passing season, so pair him with Willis."},{"n":"Malik Willis","p":"QB","t":"Miami Dolphins","s":"neutral","o":"The meatballers' pick as the best season-long single-QB click for pure upside, even with a brutal Dolphins WR room. In his three Packers starts he rushed for 41/60/73 and was a top-7 QB twice; in the two games he had 20+ attempts he scored 25 and 31 points. Fantasy scoring is broken enough that the rushing alone gives a floor; he just needs to hit as a passer (200 yards and a TD is plenty). Throw the dart and lean on streaming if it goes south. The meatballers note the appeal as a late dual-threat, but temper it: Miami has no weapons around him, so the realistic ceiling is a Justin Fields-type line that does not move the needle much. The meatballers' rushing-only QB2 flier: he is one of the few projected for 100-plus carries, so if he ever hits as a passer there is a ceiling — but the Miami receiver room makes that an extreme long shot."},{"n":"Harold Fannin Jr.","p":"TE","t":"Cleveland Browns","s":"pos","o":"The most receiving yards by a rookie TE picked after 34th overall (the spot was Sam LaPorta), a LaPorta-type receiver who explodes out of his breaks with outstanding YAC and nearly a 25% target share in the five games without Njoku. The catch: a poor blocker (a boy out there) on a messy Browns roster with a traditional Todd Monken. But he's the only real TE on the team, so the role is there; a clear TE1-mix piece with a ceiling to outdo this ADP. The meatballers note he was basically Cleveland's No. 1 receiver at times last year — a short-range chain-mover who could keep eating targets, especially if Deshaun Watson leans on the underneath game."},{"n":"Casey Concepcion","p":"WR","t":"Cleveland Browns","s":"neutral","o":"The meatballers love the value. A first-round receiver falling to Rounds 8-10 on the 'this rookie class stinks' narrative, into a Todd Monken offense that fits his skill set (a Zay Flowers archetype). Cleveland's depth chart is open, with Jerry Jeudy and Cedric Tillman the competition. The best comp is how Monken used Ladd McConkey at Georgia — he could lead Cleveland in targets by Week 1. The meatballers call him 'a different cat' talent-wise, but with no quarterback future in Cleveland it is very much a 'what do you believe' dynasty flier. The meatballers' favorite Browns sleeper: a Garrett-Wilson-in-2022-type value — a potential Round-1-caliber prospect landing on a bleak team as a likely immediate No. 1 pass-catcher, with a Zay Flowers comp under Todd Monken and Stefon Diggs-like toughness at 196 pounds. The sleeper case is quarterback-dependent (a Deshaun Watson slot role fits best), but they see legitimate superstar upside at a WR5/6 price and expect him to be Cleveland's best receiver by year's end."},{"n":"Denzel Boston","p":"WR","t":"Cleveland Browns","s":"neutral","o":"A Browns rookie WR generating real local camp buzz; viewed as the second-tier rookie WR to chase if Jerry Jeudy is a non-factor. The Browns skill group (Harold Fannin, Jeudy, Boston, Casey Concepcion) is more dangerous than the QB room suggests. A deep dart with offense-dependent upside. The meatballers' size and catch-point sleeper on the Browns — his case is tied to Shedeur Sanders winning the job (Sanders will throw it up and let the big man climb the ladder); more of a bet than Casey Concepcion, but real upside if the quarterback fits."},{"n":"Dalton Kincaid","p":"TE","t":"Buffalo Bills","s":"neutral","o":"A tier 2 TE but a real divider, ranked TE8 by some, lower by others. Bull case: Buffalo's pass game is back to being good; he's the missing top target. Bear case: he missed 5 games and only managed around 6 fantasy PPG over the last 5, plus Dawson Knox is still around and tight with Allen. The Kincaid experience is drop-and-pick-up volatility week to week. A caution from the meatballers: Buffalo added DJ Moore to a room with no vacated targets, so Kincaid now has more competition — and he drew only six red-zone targets last year."},{"n":"Quentin Johnston","p":"WR","t":"LA Chargers","s":"mixed","o":"A heavy industry buy: top-36 WR in back-to-back years with 8 receiving TDs each season, drafted as WR38-47 because the bust label from a brutal rookie year (an Easton Stick offense, everyone hurt) stuck unfairly. Now Mike McDaniel is the play-caller and has gushed about protecting his drive phase; a YAC machine who had 50%+ of college yards after the catch. McDaniel comped him to Julio Jones on skill set. ADP climbed two rounds in two weeks. If he just repeats, he smashes. The meatballers note improving efficiency (yards per target up all three years) but a low target floor (3.6-3.7 catches per game) — he has not yet proven he can be a volume receiver."},{"n":"Ladd McConkey","p":"WR","t":"LA Chargers","s":"pos","o":"A prime bounce-back/breakout candidate after a down sophomore year (only six fewer targets but a big yardage drop, hurt by O-line injuries and Justin Herbert's broken hand). Keenan Allen's team-leading, third-down-heavy targets are now vacated, and the Mike McDaniel offense fits his short-intermediate, YAC game perfectly. Heavy tight-end personnel (Njoku, Gadsden, Kolar) means more one- and two-receiver sets and a spiked target rate — he could hit around 130 targets and a WR1 per-game finish. The meatballers give him a mulligan on a down sophomore year: the Chargers' line was wrecked (Slater and Alt lost) once Herbert got banged up. With a rebuilt line, a Mike McDaniel crossers-heavy scheme, and more heavy personnel to consolidate targets, they are excited about his target share. Really good, still young. The meatballers are trending up — Betts' research and a more positive Chargers hype train have them projecting a tier jump and an awesome year. The one question is whether he is clearly the WR2 over Quentin Johnston if the offense leans into two-tight-end sets, but he has already shown he can win from outside and two-receiver looks."},{"n":"DJ Moore","p":"WR","t":"Buffalo Bills","s":"mixed","o":"The meatballers are well ahead of consensus. Josh Allen has said he just wants a receiver who can get open because he trusts his arm — that's Moore. He left Chicago because Ben Johnson lost confidence in him and the scheme didn't fit, and with Khalil Shakir coming off an Achilles procedure there's opportunity. One read (a Bears fan) notes Moore was finally clicking late in Chicago. He fits the chip-on-the-shoulder archetype — A.J. Brown's trade year, Brandon Marshall to the Jets, T.O. after every trade. Bottom line: a very motivated player. The meatballers plant a flag: DJ Moore finishes as a top-12 receiver. In Buffalo he adds a proven red-zone target (13 end-zone looks last year) to a room with no vacated targets — great for him, a squeeze on Dalton Kincaid. The flip side, from another meatballer who is out: back-to-back seasons under a 7% first-downs-per-route rate and below 1.5 yards per route are ugly for a top-30 receiver, and while the Josh Allen fit is fun, he is not sure DJ Moore is the player people think he is."},{"n":"Christian McCaffrey","p":"RB","t":"San Francisco 49ers","s":"pos","o":"A genuine first-round divider: ranked as high as 7 overall, as low as 19. The fade case is the historical pattern: you fade the guy who led the NFL in touches the prior year, especially at 450, especially CMC (he's led the league in touches twice and finished nowhere near RB1-overall the following seasons). The buy case is the maximize-upside-over-minimize-downside philosophy: when healthy he's still elite, and SF is projected top-4 in points. Health and the workload cliff are the whole question at a first-round price. The meatballers are not fading him: a healthy Christian McCaffrey is the best player in fantasy football and belongs in the 1.01/1.02 conversation with Bijan Robinson and Jahmyr Gibbs. He is only sliding because of the injury scare, so they are happy to take him right at ADP."},{"n":"Drake London","p":"WR","t":"Atlanta Falcons","s":"pos","o":"The meatballers have him at WR4 — ahead of CeeDee Lamb and Justin Jefferson. He's posted a 29%-plus target share in three of the last four seasons, and before a PCL injury he was on a six-week run of 109 yards and a touchdown per game. With Darnell Mooney gone and Zachariah Branch not real competition, his situation may have improved. A more cautious read has him WR7–8 on volume-sustainability questions, but the meatballers are bullish overall — 'a legitimate chance to be the overall WR1 this year.' The meatballers rate the talent highly but note he has finished top-12 just once in four years — touchdowns and quarterback play have held him back, and he still costs a ton in dynasty."},{"n":"Derrick Henry","p":"RB","t":"Baltimore Ravens","s":"mixed","o":"The meatballers rank him just outside the top 10 and 'feel terrible about it' — nothing on film says he should be RB11. He leads the NFL in 20-plus-yard carries every year and is a couple of seasons from the all-time rushing record. They'd put him top-five if they could silence the actuary in their heads — a Hall of Famer destroying the age curve, best treated like Jerry Rice, where the normal aging rules just don't apply."},{"n":"Jonathan Taylor","p":"RB","t":"Indianapolis Colts","s":"mixed","o":"Ranked RB3 and third in fantasy points over replacement per game; he was the RB1 through 13 healthy Daniel Jones weeks, about 1.5 points per game clear of Christian McCaffrey. Some regression is fair to expect (Michael Pittman gone, Jones returning from injury), but if Jones is less effective passing, that simply funnels more carries to Taylor. In his prime with a trusted infrastructure."},{"n":"De'Von Achane","p":"RB","t":"Miami Dolphins","s":"mixed","o":"The clear focal point of the Miami offense: over 1,300 yards and 5.6 YPC last year on a poor offense (25th in points, mediocre O-line). The case for him is volume plus a 100-target receiving role (lines up as a receiver, McDaniel's scheme cooks for sub-200 RBs, Gibbs/Ekeler comps). The case against: the offense is questionable with Tua's situation and Malik Willis possibly under center, and the O-line/weapons around him are thin. Some prefer Omarion Hampton in the Herbert offense over Achane in this one. A first-round price needs near-perfect health and the Miami offense not cratering. The meatballers' scariest fade: elite talent, but the coaching switch away from Mike McDaniel and a Miami roster with essentially zero pass-catching help make a second-round price hard to stomach, even knowing the offense runs through him."},{"n":"Kenneth Walker","p":"RB","t":"Kansas City Chiefs","s":"pos","o":"The reads here are all bullish (top-10), unlike the fade on the 'avoid' segment. They love the Chiefs fit — Kansas City needs an explosive back, and there's no Charbonnet to split with. Since entering the league, in games with 14-plus touches he averages 15 points (RB7 pace) and has hit double digits all but seven times. Emari Demercado and Emmett Johnson take some passing-down work, and Mahomes' injury could shift the early load, but he's the clear lead — worth a mid-second-round pick. (The 'bust'-segment reads disagree on durability.) The meatballers flag the make-or-break: he is going in the second round with lofty expectations, and while the bull case (Bieniemy back, a goal-line role, a bag from KC) points to a monster year, he has never handled a huge workload, so the injury risk is real. High-variance at that price. Now in Kansas City, the meatballers doubt he is a true every-down back — he has been banged up (practiced just four times last summer) and has never gone wire-to-wire as a lead back — so they expect the Chiefs to lean on a committee, with Emmett Johnson the name to watch behind him."},{"n":"Cam Akers","p":"RB","t":"New York Giants","s":"pos","o":"The meatballers are on board as a strong pick in the early fourth. He's coming off an awful injury but the team didn't add to the backfield, and over his final six healthy games (weeks two through seven) he was the RB8 in points per game at 19.1 with more than 17 touches a game. Getting goal-line carries and catching passes gives him a wide path to success."},{"n":"Rome Odunze","p":"WR","t":"Chicago Bears","s":"pos","o":"A player to forgive — the meatballers have him ahead of Luther Burden in early rankings (WR25 vs WR27). He got hurt and missed the last four games, but he was a WR3-to-5 to start the year, and Chicago's offense projects top-five. If Burden is the Amon-Ra of this offense, Odunze might be the Jameson Williams, and the meatballers project more touchdowns for him. Current ADP has Burden much higher (WR17–21 vs WR28–30) — a big value gap the meatballers are happy to exploit. The meatballers give him the benefit of the doubt with DJ Moore gone, but temper it: Chicago has a lot of mouths (Loveland, Burden), so he could end up third in the pecking order as the Alec Pierce-style deeper guy. The real winner of the target spread is Caleb Williams. The meatballers will not jump ship, but they are a touch more cautious than the Burden crowd: the foot issue is real, he has shown it mostly in a five-week stretch, and the Zap model had Nabers and Marvin Harrison Jr. a clear tier above him. Colston Loveland and Luther Burden both threaten his target share."},{"n":"Jayden Daniels","p":"QB","t":"Washington Commanders","s":"pos","o":"The case starts with his legs: nine rushes a game and 148 carries as a rookie. Of the 27 quarterbacks with 100-plus rush attempts in a season, 26 finished top-12 in points per game, and 78% finished top-six. His receivers' 11% drop rate led the NFL and should regress in his favor. The risk is health — he missed time with knee, hamstring, and elbow issues — but he's cheaper this year after a down finish. The meatballers rank him anywhere from QB3 to QB8 depending on scoring, with Year 3 passing growth as another factor. The meatballers are bullish: across his full sample (including the 2024 playoffs) he has averaged 22.3 fantasy points per game, and he did it without elite weapons. A true break-the-league dual threat with 750-rush upside they would buy now before he is a Round-4 pick next year; the only knock is the durability question from his running style. The dynasty caution from the meatballers: he 'runs around like a crash-test dummy' — a slim, supremely talented RG3-style athlete who has to develop Lamar Jackson's self-preservation (sliding, getting out of bounds) or the injuries will pile up. The ceiling is a league-breaker; the durability is the whole bet."},{"n":"Jalen Hurts","p":"QB","t":"Philadelphia Eagles","s":"pos","o":"His rushing touchdowns hit a multi-year low last year — just eight, with his fewest carries inside the five since 2021 — so strong positive touchdown regression is coming. The mobile-QB floor is still elite; historically, quarterbacks with 100-plus rush attempts finish top-12 in points per game at close to a 100% rate. Without A.J. Brown, Philadelphia may run even more, which helps Hurts. The meatballers have him QB5–QB6, and he went in the sixth round of the mock — a discount. The meatballers stay in on the Year-7 dual threat — the closest thing to Josh Allen for consistency — and like the coordinator change to Shawn Manion (McVay/Shanahan tree = more motion and play-action). Losing A.J. Brown stings, but the data says he's a better passer than the narrative, and the tush-push keeps his rushing-TD floor high. The dynasty worry from the meatballers: his rushing production slipped (421 yards, eight rushing scores) as the goal-line work drifted to Dallas Goedert shovel passes instead of the tush push — and because he is not in the elite pure-passer group, the aging transition is much harder for him than it will be for Lamar Jackson, who can simply throw more as the legs go."},{"n":"Tyler Warren","p":"TE","t":"Indianapolis Colts","s":"neutral","o":"Strong value at TE. Through week 10 last year (before Daniel Jones got hurt) he averaged 6.7 targets and 62 yards, second in TE scoring behind McBride. Pittman traded away opens the intermediate middle of the field that is his bread and butter; Downs plays outside so they complement rather than overlap. Daniel Jones back and less target competition. Ranked 61 overall vs an ADP around 104. The cautious counter: a limited man-coverage route runner, maybe top 3-5 rather than TE1, but the price is the point. The meatballers like his safety and upside: with Michael Pittman's targets not really replaced in Indianapolis, the rookie tight end's role looks secure, and he is a big part of why they buy Daniel Jones' offense."},{"n":"Josh Downs","p":"WR","t":"Indianapolis Colts","s":"pos","o":"Multiple analysts well above market (the meatballers 68 overall vs an ADP of 99). Pittman traded to Pittsburgh and Alec Pierce coming off surgery he did not want; reports say Steichen will move Downs all over and play him in two-WR sets, which he has barely done in his career (only 33 routes in 1-2 WR sets ever). If he plays every down the ADP is just wrong. Risk: at 5-9 171 will they actually trust him outside, and a possible Keenan Allen signing would overlap his role. The meatballers have been standing on the table for years and think this is finally the year, an easy breakout call if the Colts' passing game takes a step. The meatballers see a breakout setup: Michael Pittman's 24% target share is vacated, and Downs is moving inside and outside rather than being stuck in the slot — with Daniel Jones' high-powered offense, this could be the year it clicks."},{"n":"Alec Pierce","p":"WR","t":"Indianapolis Colts","s":"neutral","o":"One of the meatballers has him WR17 while another is closer to 30-40, so it's big conviction here. Back-to-back seasons of 6+ TDs and 20+ yards per catch, a 19-yard average depth of target, 87% of catches went for first downs (number one in the NFL over 75 targets), and the lowest drop rate in the league (1.2%). Got paid $115M, the highest-paid WR free agent move, then Indy traded Michael Pittman Jr. away (frees about 80 catches). Projects to 105 targets, a 20% share, 7 TDs. He just has to add 2-3 short/intermediate targets a game. Massive value at WR40 if Daniel Jones plays well. The meatballers peg him as a pure field-stretcher; his aDOT last year was 21, and only Mike Evans (twice) and Sammy Watkins have hit 15 points per game on an aDOT above 15 in the last decade."},{"n":"Jaxson Dart","p":"QB","t":"New York Giants","s":"pos","o":"Promising: 13th in EPA/play, 17th in success rate, and the 2nd-most rushing EPA in the NFL (behind only Allen) as a top-10 athlete among starters. A Russell Wilson stylistic comp (a tick less velocity), 9th in big-time-throw rate, accurate and aggressive. Warts: horrific red-zone splits, worst-in-league vs two-high, dropped eyes, 14 INTs forcing plays. The new under-center, play-action Nagy offense is a real transition, so don't bank on a huge year-2 leap; the mobility is the floor and 2027 is the upside year. A great single-QB upside dart if he falls. The meatballers like him as an earlier late-round dual-threat: even in a shaky situation, Brian Daboll has some QB-whisperer in him, and Dart offers the run-a-little floor you want if you are punting the position (the Matt Nagy influence is the wild card). The meatballers want the Year-2 dual threat: he averaged nearly 20 fantasy points per game without Malik Nabers on a bad team, and while Matt Nagy is a scary play-caller, Jim Harbaugh and Greg Roman (who unlocked Justin Herbert's designed runs) are the guardrails. A top-12 upside swing you can pair with a streamer. Dynasty QB10-11 for the meatballers, and they think he was a better passer than he got credit for — 15 touchdowns to five interceptions in 14 games, plus 487 rushing yards and nine rushing scores. The flag: he runs like a crash-test dummy and would never survive 17 games playing that way, so the running has to be ratcheted back."},{"n":"DK Metcalf","p":"WR","t":"Pittsburgh Steelers","s":"pos","o":"Stays in Pittsburgh as Mike McCarthy installs a heavy three-WR, shotgun, Aaron-Rodgers-driven offense. He's expected to go back to the downfield role while Pittman handles the short/possession work. Roughly a coin flip with Pittman for fantasy value. McCarthy's Cowboys teams were top-8 in plays per game all five years, so the volume should be there even if the ceiling is modest. The meatballers are cooler on the short-term fit: he turns 29 and pairs with Aaron Rodgers, who they see as a poor match, and last year's catch-and-run production feels like a fluke that is not really his game. The better bet may be 2027, when Pittsburgh has a quarterback who can push it downfield."},{"n":"Jordan Addison","p":"WR","t":"Minnesota Vikings","s":"pos","o":"The falling-ADP player managers may regret ignoring, a genuinely good receiver whose price is dinged by off-field noise and Juwan Jennings' arrival in Minnesota. With Kyler Murray now throwing, there's bounce-back value at the discount."},{"n":"Keaton Mitchell","p":"RB","t":"LA Chargers","s":"pos","o":"Explosive in a tiny sample, but has just one career game over 10 carries and is a couple years removed from a major injury. The baseline is around 7 carries to Hampton's around 14; a 40-lb weight difference means Hampton gets the goal line. A best-ball dart; the 40-yard TDs are coming, you just can't predict when. The pick the meatballers take over Oronde Gadsden II in that 12th-round range. The meatballers love the explosive fit but see him as a best-ball play more than a redraft one; behind Omarion Hampton (with Kimani Vidal also in the mix), it is nearly impossible to predict when his big-play games will come."},{"n":"Omarion Hampton","p":"RB","t":"LA Chargers","s":"neutral","o":"A heavy year-2 breakout pick, with rankers uncomfortably all in. A three-down all-purpose back; he flashed with a 79%+ snap share in 4 games (about 18 ppg half-PPR, 17.3 touches). 7th in receptions/game among RBs as a rookie, 8th-best rush grade, 11th in YAC/attempt, despite a gutted O-line and an injured Herbert. McDaniel's RB target shares (3rd/7th/3rd/3rd) plus vacated Keenan Allen targets point to a peppered role. Keaton Mitchell is just the change-of-pace lightning. A brutal schedule means shootouts, which means volume. The more the summer goes on, the more the meatballers want him: a first-round back handed a long runway in a great system, he essentially has to fall on his face or get hurt for it not to hit."},{"n":"Aaron Rodgers","p":"QB","t":"Pittsburgh Steelers","s":"pos","o":"The 42-year-old prism the entire Pittsburgh backfield must be viewed through: very little mobility left, and last year he stopped standing in the pocket to take hits, meaning he needs a back who can block AND be a safety valve. That's the lens for the Warren-vs-Dowdle debate: if Rodgers stays check-down-Charlie, the receiving back (likely Warren) gains value. Not a fantasy QB target himself; matters as the backfield-usage determinant."},{"n":"Juwan Johnson","p":"TE","t":"New Orleans Saints","s":"neutral","o":"Added from the 2026 consensus Top-300 (Standard ADP 155.0, TE20). Baseline entry, no scouting notes yet."},{"n":"Antonio Williams","p":"WR","t":"Washington Commanders","s":"pos","o":"A third-round pick by Washington the meatballers are very bullish on — the GM has specifically talked up his opportunity. If Brandon Aiyuk signs (no longer a sure thing), some of that disappears; without him, Williams has a real shot to be the WR2 on a good offense with Jayden Daniels and Terry McLaurin. The meatballers rank him as their 12th rookie, 'back of the first round.' One caution: 93% of his college routes were from the slot, a possible Jayden Reed-type limit on his matchup value. Strong opportunity regardless."},{"n":"Nicholas Singleton","p":"RB","t":"Tennessee Titans","s":"pos","o":"A fun late rookie pick the meatballers made as a bring-back with the Steelers stack. There's an ambiguous backfield if Najee Harris-type incumbents get hurt, so he's a decent bet on a young team."},{"n":"Pat Freiermuth","p":"TE","t":"Pittsburgh Steelers","s":"neutral","o":"Foundational to the offense (a strong run blocker whose play-action seam threat makes everything work) but that role caps the fantasy ceiling (best finish was around TE16-18). With McCarthy leaning into more two-TE sets he's the move/big-slot piece; some contingent upside if a receiver goes down, but not a weekly start."},{"n":"Cooper Kupp","p":"WR","t":"Seattle Seahawks","s":"neutral","o":"Flagged as a good veteran mold to layer into a team as a source of catches while younger receivers get up to speed."},{"n":"Xavier Worthy","p":"WR","t":"Kansas City Chiefs","s":"neutral","o":"Could be more of a thorn in Rashee Rice's side than a year ago: was really good over the second half of his rookie year when Rice was suspended/hurt. With Rice's suspension/injury risk looming and Mahomes back, Worthy's role expands in those windows. Still likely behind a healthy Rice as the Chiefs' top WR, but the late-round upside is real and tied to Rice missing time. A dart with a clear path if Rice is out. The meatballers are bullish on a year-two breakout, and simply being healthy entering the season (unlike last year) is a meaningful boost in a thin Chiefs receiving group. In dynasty the meatballers would take him over DJ Moore right now: the back half of 2024 (before injuries) was convincing, similar to the Bucky Irving story. The one hitch is that Rashee Rice is now an obstacle he did not have when he was the lead receiver."},{"n":"Carnell Tate","p":"WR","t":"Tennessee Titans","s":"neutral","o":"A real divide on him. Bull case: the 4th overall pick of the 2026 NFL draft, still at WR30 ADP, getting Titans #1-WR usage. Bear case: a brand-new offense, brand-new coaching staff, a miserable projected O-line, and Cam Ward's film raised concerns. Could be a Rome Odunze rookie season (target volume without efficiency) more easily than a McMillan-style debut. The meatballers are taking a leap of faith on the fourth-overall rookie: a downfield type who may not rack up 150-target seasons, but the ceiling is higher than the Zay Flowers, Tee Higgins and Waddle group even if the floor is much lower. The market already buys in, with Keep Trade Cut listing him inside its top 12. A young receiver the meatballers say would not shock anyone as a top-10 breakout a year from now; they lean toward him seeing more targets and yards than fellow rookies."},{"n":"Jordyn Tyson","p":"WR","t":"New Orleans Saints","s":"neutral","o":"A rookie 'overperform' pick — the NFL hid its enthusiasm until late, then the Saints took him eighth. He's a primary receiver with Chris Olave (Devaughn Vele the No. 3, turning 29): a good route runner who makes tough catches and blocks (Hines Ward taught him), 6-foot-2 and athletic, with a brother who's an NBA lottery pick. A 2022 knee injury and a re-injured collarbone unfairly got him tagged 'injury-prone.' Tyler Shough is an aggressive downfield thrower (8.3 aDOT), so there's a chance he pops right away. The meatballers (well, one loud voice) call him their WR1 of the rookie class, and the beauty is he will not have to be a No. 1 right away, sliding in as the clear No. 2 opposite Chris Olave in a Saints offense investing to win now. The meatballers are buzzing — one compared how he moves and separates to Justin Jefferson — and see real upside to leapfrog Chris Olave for the Saints' target share. His ADP is dinged by college injury history, which they call a value; another had him as an awesome mid-round best-ball pick over Courtland Sutton."},{"n":"Darnell Washington","p":"TE","t":"Pittsburgh Steelers","s":"neutral","o":"A 24-year-old unicorn just given a long-term deal: 6'7/311 with soft hands who is essentially untackleable (drags gangs of defenders) and McCarthy is moving toward more two-TE sets to feature. The mystery-box appeal is real (everyone in a dynasty room wants him); the question is whether he's on the field enough, but the ceiling is something the league rarely sees."},{"n":"Josh Jacobs","p":"RB","t":"Green Bay Packers","s":"mixed","o":"The meatballers are split. One read has him at RB8, calling him 'idiot-proof' — the injury was a bone bruise, not structural, he was RB7 through Week 15, and LaFleur has never used a true workhorse except Jacobs, so another double-digit-touchdown season is likely. The other has him RB14, admitting some emotional bias from a rough December. The consensus: calling him declining is 'the height of hubris' — a Derrick Henry-type where people keep writing eulogies and he keeps producing. The meatballers flag real off-field risk: the DA's investigation could land him on the commissioner's exempt list, and domestic-violence-related bans have historically run around six games. That, plus his age and hard-nosed style, is what makes Marshawn Lloyd a live handcuff. Aging note from the meatballers: this is his age-29 season and Year 8, and for his hard-nosed archetype the production cliff tends to arrive fast — one more reason, on top of the off-field cloud, that they see Marshawn Lloyd as a live handcuff and think Green Bay is quietly planning around him. A more bullish counter from the meatballers: they are warming up on him, noting that if the off-field situation clears and it comes out that he is fine for the season, his price jumps straight to an early-third-round pick."},{"n":"Emanuel Wilson","p":"RB","t":"Seattle Seahawks","s":"neutral","o":"Had one big 22-touch game last year that briefly had people calling to bench Josh Jacobs, but the meatballers caution against overrating that. The meatballers note he has been Green Bay's secondary rusher the past couple of seasons, which matters if the Josh Jacobs situation or a Marshawn Lloyd stumble opens the door."},{"n":"Matthew Golden","p":"WR","t":"Green Bay Packers","s":"pos","o":"A real riser: even the skeptics who left him for dead last year are now recommending him. The case: Romeo Doubs is gone, the Packers should consolidate the five-man WR rotation, and Golden's deeper route metrics are surprisingly strong among 109 qualifying WRs. The bull bet is that Green Bay finally produces two around-80% route-share WRs instead of spreading it five ways. Either Golden or Christian Watson breaks out, and Golden's the cheaper path. Mid-round upside."},{"n":"Jayden Reed","p":"WR","t":"Green Bay Packers","s":"neg","o":"Well ahead of consensus. With Wicks and Doubs gone and Green Bay extending him on draft day, the team's committed — and he's now playing 33%-plus outside snaps in over half his games, not just the slot. The Packers didn't draft a receiver despite the talk; they extended Reed instead. Worth taking two rounds ahead of ADP to get him on every roster — one of the most mispriced players in fantasy, with consensus at WR52 while the meatballers are inside the top 45. The meatballers call him the biggest bargain on the board: with Doubs and Wicks gone, Green Bay clearly trusts him alongside Christian Watson, yet he goes about two rounds later (around WR45). A top-30 fantasy receiver in each of his first two years despite limited snaps."},{"n":"Jacoby Brissett","p":"QB","t":"Arizona Cardinals","s":"neutral","o":"The TE-friendly, McBride-supporting variable in Arizona: when he played last year he outplayed an inaccurate Kyler and was QB6 over a 12-game stretch, and his presence is part of why Trey McBride's volume held up. The catch: nobody knows if he starts Week 1, Week 4, or hands off to Carson Beck mid-season. If you could guarantee Brissett the full year, drafting the Cardinals offense (Harrison, McBride, Wilson) gets a lot more appealing. Useful context, uncertain role."},{"n":"Carson Beck","p":"QB","t":"Arizona Cardinals","s":"neutral","o":"The Cardinals QB-of-the-future risk that hangs over the whole Arizona offense: if/when the offense turns over from Brissett to Beck, the panel's worried McBride and the WRs lose their difference-maker. The meatballers watched his film and came away unimpressed (they don't need to see Carson Beck, they're not impressed). Deep dynasty only; his arrival is a downside trigger for the Cardinals skill players, not an upside one."},{"n":"Marvin Harrison Jr.","p":"WR","t":"Arizona Cardinals","s":"pos","o":"Two years in and we still haven't seen it: the pedigree's there but the production isn't, and the read is more than likely he's not that dude they were praying he was. His presence is mostly relevant as the thing that could cap Trey McBride or boost Michael Wilson (who had big games when Harrison was hurt last year). If Harrison takes a year-3 step it changes Arizona's target math, but the market's pricing in hope. A skeptical buy at best; the ceiling exists but two years of evidence says fade the hype. In dynasty the meatballers are closer to sell: it has felt like wish-casting. Drew Petzing misused him as a designated lid-lifter running too many deep routes; he needs the easy, manufactured targets (bubble screens, quick stuff) the Bengals feed Ja'Marr Chase. This is close to a make-or-break year, with Trey McBride also eating volume. Three years in, the meatballers concede it has been a 'failure' relative to the hype — the market is now roughly a single first-round pick — though they note he has posted better peripherals than some peers and still has time to right the ship. Most would swap him for Malik Nabers straight up."},{"n":"Michael Wilson","p":"WR","t":"Arizona Cardinals","s":"pos","o":"The Cardinals Puka-role WR, but that role only matters if Wilson can actually be Puka, and the read is skeptical. He had a lot of big games when Marvin Harrison was injured last year, which both shows he can produce AND warns that a healthy Harrison suppresses him (Harrison's shown he's the alpha between the two). The whole Arizona pass game also hinges on Brissett-vs-Beck at QB. Wilson's a contingency dart tied to a Harrison injury, not a standalone target. The meatballers point to night-and-day splits: with Marvin Harrison Jr. out of the lineup he ate, and with MHJ in it you did not want him near your starting lineup. A useful piece, but role-dependent. The meatballers are cautious despite last year's finish (WR2 over the final eight weeks and the new staff's designated Z): a healthy Marvin Harrison Jr. and Trey McBride plus a weak offense make a repeat unlikely, so they like the cheap price (around WR39) more than the ceiling."},{"n":"Trey McBride","p":"TE","t":"Arizona Cardinals","s":"mixed","o":"Getting irrational hate on the fantasy circuit right now, which makes him a buy; no sane argument exists that he can't be an elite TE. The concern people raise: his monster target volume last year came partly because Kyler skipped his first reads and dumped to McBride (McBride himself said he was often the second read). With the Arizona QB situation murky (Brissett week 1? Carson Beck eventually?), some worry he won't be the same difference-maker. But he's locked among the highest-paid TEs and the talent is unquestioned. Going around 22 overall; the debate is the cost, not the player. Still the clear TE value behind Bowers. The meatballers are cautious at his price: he ran the second-most routes of any tight end last year (about 22 games' worth), so on a normal route volume his elite per-route rate would translate to roughly 3.2 fewer PPR points per game. Regression is baked in — they want a nuclear ceiling to justify a top-of-draft tight end in best ball."},{"n":"Kendrick Bourne","p":"WR","t":"Arizona Cardinals","s":"neg","o":"A complete flyer as the projected number three receiver. He understands this Shanahan-tree offense and has familiarity with Jacoby Brissett from New England, but we know what he is at this point and the chances have come and gone for him to break out."},{"n":"Reggie Virgil","p":"WR","t":"Arizona Cardinals","s":"neutral","o":"A rookie the meatballers liked in the rookie guide (a sixth-round landing), but he's a complete flyer who needs to beat out Kendrick Bourne for the number three role."},{"n":"Elijah Higgins","p":"TE","t":"Arizona Cardinals","s":"neutral","o":"Could be interesting as a former Stanford slot receiver turned tight end if the Cardinals lean into using him like Isaiah Likely as a fourth versatile piece in two-tight-end sets."},{"n":"Jeremiah Love","p":"RB","t":"Arizona Cardinals","s":"mixed","o":"The No. 3 overall pick, and the meatballers think Arizona drafting him after just signing Tyler Allgeier and with James Conner on the roster was foolish ('the Cardinals are so freaking stupid'). Allgeier and Conner are the biggest losers, and the meatballers expect Love at RB15, below ADP — a disappointing Year 1 in a three-back committee where Allgeier vultures touchdowns and Conner takes goal-line work. Long term, though, it's a great landing spot: a good offense with weapons (McBride, Harrison, Wilson) and an improving line. He went in the second round (208) of the mock — massive talent, and top-15 picks average 290 touches historically. If he gets that, he's a top-10 back."},{"n":"Tyler Allgeier","p":"RB","t":"Arizona Cardinals","s":"mixed","o":"One of the biggest losers of the draft. He came to Arizona expecting to be the starter, then the Cardinals took Jeremiah Love third overall. He's been displaced, and now projects as a touchdown-and-goal-line vulture off Love. The meatballers feel for him — a good player who deserved his shot — but in redraft he only matters as a TD vulture."},{"n":"James Conner","p":"RB","t":"Arizona Cardinals","s":"neutral","o":"The Cardinals' captain, coming off a contract restructure, who'll still get goal-line reps and catch passes. He's a major loser of the Jeremiah Love pick — best case, he and Allgeier split whatever work Love doesn't take. In dynasty, the meatballers say trade him as soon as you can."},{"n":"Trey Benson","p":"RB","t":"Arizona Cardinals","s":"neg","o":"The meatballers would not be surprised if he's released or traded -- everything points that direction and he seems to have lost the organization's faith, with questions last year about his injuries and availability."},{"n":"Matthew Stafford","p":"QB","t":"LA Rams","s":"neg","o":"The meatballers are the wet blanket here. Coming off an MVP-caliber year with his best-ever touchdown rate and second-best interception rate, and those tend to regress toward career norms. With no rushing upside, being an elite fantasy accumulator requires threading the efficiency needle again. Ranked QB11 with 35 touchdown passes; they'd rather take cheaper rushing quarterbacks like Jayden Daniels, Jalen Hurts or Bo Nix at his backend-QB1 price. The meatballers are fading the touchdown tax: he was the reigning MVP with 46 scores and 4,700 yards, yet that only made him the QB5, so that is basically his ceiling, and regression is coming, especially if Davante Adams's goal-line role turns into more Blake Corum and Kyren Williams carries. With one rushing touchdown since 2017 and no scramble equity, they would rather take a Tyler Shough or Jared Goff at a similar price. The meatballers like the ceiling bet in the QB2 range: with Puka Nacua and Davante Adams around him in Sean McVay's scheme he flashed a top finish, and they would stack him if they roster his pass-catchers; the down years came amid heavy offensive-line injuries."},{"n":"Ty Simpson","p":"QB","t":"LA Rams","s":"neutral","o":"Drafted 13th overall by the Rams, which shocked people. McVay reportedly held secret pre-draft meetings with him and kept them quiet, and his subdued podium demeanor was out of respect for Stafford, not disappointment. The meatballers think that if Simpson sits two years behind Stafford under McVay, he develops into a good quarterback — a Jordan Love-type path that's disruptive short-term but right long-term. They took him in the second round of a dynasty draft, 'building for 2028.' A quarterback to stash."},{"n":"Puka Nacua","p":"WR","t":"LA Rams","s":"pos","o":"One ranker's WR1 overall (over Chase). A league-high 129 catches and 107 rec yds/game in 2025; the best per-game yardage average of all time over 3 seasons, 3+ YPRR for his career. Destroys man and zone, plays every down all-out. Concerns: off-field issues and rehab this offseason, TD volume (19 TD in 44 games), shared targets with Davante Adams (Stafford's preferred red-zone option), and Sean Payton's multi-TE sets capping his snaps. A redraft WR1; a best-ball risk until he's locked in. The meatballers marvel at the efficiency: 3.57 yards per route run last year, and he is the only active player over three for his career. The kamikaze style carries injury risk, but that is the cost of a top-three dynasty asset. An untouchable-tier receiver for the meatballers — a player they simply would not trade in dynasty."},{"n":"Davante Adams","p":"WR","t":"LA Rams","s":"pos","o":"The meatballers have him in the WR17-32 range, with the age-and-decline debate at 33/34 years old. Elite at the goal line last year: 14 TDs, 27 end-zone targets, the best inside-the-five season ever. But only a 53% catch rate and just 68.5% of his targets were catchable (everyone else on the Rams 86-93%) despite playing with MVP Stafford. The meatballers bet the catch rate regresses up hard with Puka commanding coverage; the disconnect lands on a declining 33-year-old. Only 5.5% of top-24 PPG seasons since 2010 came from receivers 33+. The meatballers bet on the touchdown machine at cost (WR22-24): 117 career scores, 14 TDs in 14 games last year, and the best goal-line receiver in football on a Rams team that lives in the red zone — the age cliff simply has not applied to him."},{"n":"Terrance Ferguson","p":"TE","t":"LA Rams","s":"pos","o":"A deep-league dart with quantum-leap potential — an athletic freak (4.63 forty, 39-inch vertical at 6-foot-5.5) with second-round draft capital. He's stuck in a Rams tight-end logjam (Parkinson, Higbee, Allen, plus rookie Max Clark), but Sean McVay is at the forefront of multi-tight-end usage — Rams tight ends combined for 150 targets and 17 touchdowns last year. If Ferguson seizes a big share with Stafford (who led the NFL in yards and touchdowns), a big year is possible. He 'moves differently.'"},{"n":"Colby Parkinson","p":"TE","t":"LA Rams","s":"neutral","o":"The meatballers' preferred Rams TE over Terrance Ferguson on a baseline-outcome basis, a big-bodied red-zone threat (20 RZ targets and 6 RZ scores last year, TE17 overall) who blocks and runs the play-action flat stuff. Undrafted but projects better than the flashier Ferguson; you'd only take Ferguson for the 95th-percentile outcome."},{"n":"Tyler Higbee","p":"TE","t":"Los Angeles Rams","s":"neutral","o":"Reliable veteran who had a bit of a resurgence last year, part of the Rams' heavy tight-end packages."},{"n":"Max Klare","p":"TE","t":"LA Rams","s":"neutral","o":"A second-round rookie with a good, productive-college profile who backfills the tight-end room; a former primary receiver at Purdue who learns to be a supporting piece, letting the Rams lean into featuring Ferguson."},{"n":"Kyren Williams","p":"RB","t":"LA Rams","s":"pos","o":"The annual divisive Rams back: can finish top-15 even with Blake Corum in the fold (had 54% of goal-line carries last year, 20th among RBs), and McVay's run-script juggernaut props up his floor. But his points-per-game fell off from 2024 even though he was more efficient, and the worry is a bigger Corum role as a year-3 back leaves Kyren managers holding the bag. He's been an around-RB10 ceiling guy the last two seasons with no receiving workload to fall back on (last in RB target share). A fine starter, capped ceiling."},{"n":"Blake Corum","p":"RB","t":"LA Rams","s":"mixed","o":"One of the most valuable handcuff/secondary-RB investments you can make: showed last year he can coexist with Kyren Williams and be productive, especially on touchdowns. McVay's trust grew over the back half (Kyren can't be a 90%-snap workhorse forever). Going around RB30 with Monangai/Harvey. The added wrinkle: if McVay turns up Corum's usage as a year-3 back, the Kyren managers are the ones left holding the bag. Real standalone-plus-handcuff value on an offensive juggernaut."},{"n":"Brock Purdy","p":"QB","t":"San Francisco 49ers","s":"pos","o":"The engine of a top-4 projected-points offense: the Purdy-to-Mike-Evans connection has been healthy and every SF report is glowing about it (the same Dak-Pickens match-made-in-heaven logic). Purdy throws the TDs that make Evans a touchdown machine. A streaming-plus QB whose value is tied to the weapons staying healthy (CMC, Kittle, Evans, Pearsall). A solid QB1 if you wait at the position. The meatballers' favorite value in the mid-QB tier: over Weeks 1-17 he was second in fantasy points per game behind only Josh Allen, yet he is going around QB12, and he has never finished outside the top 12 in points per game. New weapon Mike Evans (Shanahan always feeds the X), a hopefully healthy Ricky Pearsall, George Kittle and CMC round it out. He won people titles in last year's fantasy playoffs (QB3, QB1, QB1). The meatballers call him one of the best values on the board — he has out-scored Justin Herbert in points per game three years running, plays in Kyle Shanahan's scheme, and now has Mike Evans joining Kittle and CMC for maybe the league's best red-zone group. The only worry is the 49ers' age and injury fragility; if they stay healthy he smashes his QB13 price."},{"n":"Mike Evans","p":"WR","t":"San Francisco 49ers","s":"neg","o":"The value pick of the offseason on the 49ers: yes, he's old (turning 33), changed teams, and was injured last year, all of which scares the room, but the Shanahan scheme is a glove fit. SF runs two-WR sets often (great for fantasy, not bad), and when Evans has been in two-WR sets he's dominated, the same logic as the George Pickens/Dak match-made-in-heaven argument. What Purdy does plus what Shanahan dials up plus what Evans does equals touchdown equity. Health over a full season is the only real question. Buy at his discounted ADP; he's sandwiched value between Adams and Egbuka in the early ECR. The meatballers note the rare profile: he is one of only three receivers in the last decade (Sammy Watkins the other) to average 15 points per game on an aDOT above 15, and he did it twice. On the pods the meatballers frame his move to San Francisco as a red-zone and mentor role in the twilight of his career, part of why the 49ers can afford to bring the young De'Vion Stribling along slowly. The meatballers happily buy the floor in Round 5: 11 straight 1,000-yard seasons, and now a red-zone jump-ball role in a great 49ers scoring offense with Kittle and CMC. Age and injury mean you may only get about 12 games, so they would handcuff him late, but the historical ceiling is worth the price."},{"n":"Ricky Pearsall","p":"WR","t":"San Francisco 49ers","s":"pos","o":"A black-cloud-early career but there's a path: Mike Evans is the WR1 ahead of him, Aiyuk's gone, Jennings likely gone, so targets exist. The bull case: SF's offense works (it clicked with Purdy and with Pearsall before). The bear case: the injury risk is priced in but the upside isn't, AND in a room with McCaffrey, Kittle, Evans, and rookie Stribling, carving out a consistent role if everyone's healthy is genuinely hard. Only played 9 games last year (PCL sprain). A boom-bust dart, not a target. The meatballers still hold him down: two freak injuries (the rookie-year shooting, then a knee) have masked a good player who was healthy his whole college career. But 2026 shapes up as make-or-break, with De'Vion Stribling breathing down his neck for the 49ers WR1 job. The meatballers see a strong Mike Evans contingency in San Francisco — they believe in the offense and he was productive when healthy, and Evans in a vertical-X role actually frees him up. The knock: he is one of the worst tackle-breakers they have charted, so he needs the easy layup targets to shine."},{"n":"De'Vion Stribling","p":"WR","t":"San Francisco 49ers","s":"pos","o":"San Francisco traded up in the second round for him, saying they'd have taken him in the first if they'd had the pick. The meatballers' concern: Shanahan has a history of reaching for skill players who don't pan out, and Stribling went well ahead of consensus. They're split — one read respects the draft capital, the other won't 'go to that place' given the 49ers' track record developing Day 2 skill players. He went in the third round of dynasty drafts and competes with Pearsall, Evans, and Kirk. The meatballers love the late-round swing: a 33rd-overall pick with a 95th-percentile athletic score, and the historical hit rate for big athletic receivers taken 32nd to 50th (Deebo, Sutton, and plenty of near-misses just outside) is boom-or-bust but league-altering when it lands. He gets to learn behind Mike Evans, and with Ricky Pearsall unproven he could be a 49ers WR1 by midseason. Shaky floor, huge ceiling, going round 16-plus."},{"n":"Christian Kirk","p":"WR","t":"San Francisco 49ers","s":"neg","o":"Signed a 1-year deal with the 49ers; profiles as the WR3 behind Mike Evans and Ricky Pearsall, with rookie De'Zhaun Stribling also competing for snaps. Didn't do much of note in Houston last year (Jaylin Noel reportedly outplayed him down the stretch). Mostly a depth/dynasty-veteran piece at this point in his age-30 season; the slot role in Kyle Shanahan's offense with Brock Purdy is the only thing that makes him interesting at his cost."},{"n":"George Kittle","p":"TE","t":"San Francisco 49ers","s":"pos","o":"A top-tier route runner (8th in separation, 3rd in route win rate, one of the best in the NFL) locked into a potential top-10 offense. The offseason workout videos are encouraging and he should play Week 1 (maybe starts camp on PUP as a free release, but that doesn't mean missed games). The caveat: at his age coming off the injury, full strength is the skeptical part. The Niners' TD distribution is crowded (CMC, Evans, Pearsall). A usable TE1 but the age/health gives pause; wait and let the value come."},{"n":"Jake Tonges","p":"TE","t":"San Francisco 49ers","s":"neutral","o":"A deep round-20 flyer who has looked like about 90% of George Kittle in that role when Kittle is out, worth a stash in case Kittle doesn't fully bounce back."},{"n":"Sam Darnold","p":"QB","t":"Seattle Seahawks","s":"pos","o":"The meatballers' third straight year calling him one of the best dynasty buys, still stuck as a QB2 despite a near-MVP year in Minnesota and a Super Bowl in Seattle. He embraces masking his weaknesses in the Shanahan-McVay tree, and with Jaxon Smith-Njigba, Rashaad Penny-type pieces and cheap late-draft cost, a slight positive efficiency swing turns him into a QB1. Only 29, with a Jared Goff-style trajectory still ahead."},{"n":"Jaxon Smith-Njigba","p":"WR","t":"Seattle Seahawks","s":"mixed","o":"A massive breakout the meatballers nailed last year and one of their clear top-five receivers, but they won't draft him fifth overall. His NFL-record 36% target share ran pure with Clint Kubiak gone, Rashid Shaheed getting a full offseason and Elijah Arroyo emerging, so a dip to a 29% share in a low-volume offense matters. They'd rather take Amon-Ra St. Brown at eight or nine for similar production. In dynasty the meatballers slot him as a clear top-three receiver: he commanded a 35.8% target share and basically WAS the Seattle passing game last year. That will not repeat, but even at 28-29% he is a stud, and if a run-heavy offense throws more he could push right back up. On the dynasty pods the meatballers now slot him as a top-3 receiver (up from WR12 a year ago), but caution that the breakout was 'outlier perfect' — elite yards per target with nearly every deep shot completed — so some regression is coming even if he stays a locked-in top asset."},{"n":"Rashid Shaheed","p":"WR","t":"Seattle Seahawks","s":"pos","o":"The meatballers like him as a value this year. Camp buzz says a bigger route tree and more involvement in a two-receiver offense after he joined mid-season last year; he already showed his value with a key kick return and big plays in the comeback against the Rams. The meatballers are buying the late value: the drumbeat is he is the clear WR2 now with Cooper Kupp's time up, and the plan is to feature him in the short-to-intermediate areas rather than just deep, in a Kubiak-style system. He got paid, and at a pick-135-ish price the upside is worth it, especially if Seattle throws more. The meatballers expect a bigger role this season — enough that some who were early on him feel vindicated (one host even staked a jersey bet on him hitting double-digit touchdowns)."},{"n":"Tory Horton","p":"WR","t":"Seattle Seahawks","s":"neutral","o":"Flashed in his role (red-zone and tough downfield grabs) before getting injured, then Seattle re-signed Rashid Shaheed. He's Shaheed's backup; the more interesting outcome is if JSN misses time and he and Shaheed split that target spike. A best-ball name rather than a must-draft."},{"n":"AJ Barner","p":"TE","t":"Seattle Seahawks","s":"neutral","o":"The meatballers' late-round TE: really good all-around and the clear winner of the Seattle job over Elijah Arroyo (who can run but has blocking issues and didn't play enough). On the field in all sets on the defending champs, which means real touchdown chances; teetering on top-10-ish all-around TE value."},{"n":"Elijah Arroyo","p":"TE","t":"Seattle Seahawks","s":"pos","o":"A round-20 and dynasty throw-in nobody is drafting, but the meatballers love the athletic, vertical, seam-busting upside. A second-round pick whose rookie year was wrecked by injuries (Senior Bowl, groin, then a season-ending knee), he's the piece that could take this offense up a level in year two if healthy; projected around a 12% target share."},{"n":"Jadarian Price","p":"RB","t":"Seattle Seahawks","s":"mixed","o":"A first-round pick by Seattle — a rare back drafted that high. With Zach Charbonnet projected for only eight games due to injury, Price gets the ball right away, and the Seahawks are committed enough that he doesn't need to be great to keep the carries. The meatballers comp him to Josh Jacobs (the last back with under 700 total yards to go that high). Great landing spot on a contender; he won't offer much as a receiver (five career catches at Utah) but the volume will be there. Locked in at 1.05 in rookie drafts. The Notre Dame rookie speedster has the superior physical talent, but the meatballers caution he arrived with very few college touches, so the pass-pro and route-running ramp-up may be steeper than a typical early pick — George Holani could lead the Seattle backfield early on trust alone. Dynasty-value angle from the meatballers: with Zach Charbonnet an unrestricted free agent after the season, Seattle's first-round capital in Price points to a real early-down leash, where his college pro
